<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0ea5a4">
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" href="icon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="icon.svg">
<title>Mounjaro Tracker</title>
<style>
  :root{
    --bg:#f3f5f7; --card:#ffffff; --soft:#f6f8fa; --input:#ffffff;
    --headbg:rgba(243,245,247,.92);
    --ink:#0f172a; --muted:#64748b; --line:#e2e8f0;
    --brand:#0ea5a4; --brand-dk:#0b827f; --accent:#6366f1;
    --good:#16a34a; --warn:#f59e0b; --bad:#dc2626; --info:#0284c7;
    --warnbg:#fff7ed; --warnline:#fed7aa; --warnink:#9a3412;
    --radius:16px; --shadow:0 1px 3px rgba(15,23,42,.08),0 8px 24px rgba(15,23,42,.05);
  }
  :root[data-theme="dark"]{
    --bg:#0b1220; --card:#16202e; --soft:#1c2838; --input:#1c2838;
    --headbg:rgba(11,18,32,.92);
    --ink:#e8eef5; --muted:#94a3b8; --line:#2b3a4d;
    --brand:#14b8b6; --brand-dk:#5eead4;
    --warnbg:#3a2a14; --warnline:#7c5418; --warnink:#fbbf24;
    --shadow:0 1px 3px rgba(0,0,0,.4),0 8px 24px rgba(0,0,0,.3);
  }
  html{transition:background .2s,color .2s}
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background:var(--bg); color:var(--ink); line-height:1.5;
    -webkit-text-size-adjust:100%; padding-bottom:84px;
  }
  a{color:var(--brand-dk)}
  .wrap{max-width:760px;margin:0 auto;padding:16px}
  header.app{
    position:sticky;top:0;z-index:20;background:var(--headbg);backdrop-filter:blur(8px);
    border-bottom:1px solid var(--line);
  }
  .head-inner{max-width:760px;margin:0 auto;padding:12px 16px;display:flex;align-items:center;gap:10px}
  .logo{display:flex;align-items:center;gap:8px;font-weight:800;font-size:18px;white-space:nowrap}
  #installBtn{padding:7px 10px;font-size:13px;white-space:nowrap;flex-shrink:0}
  @media(max-width:430px){ .head-inner{gap:7px} .logo{font-size:15px} .logo .dot{width:11px;height:11px} }
  .logo .dot{width:14px;height:14px;border-radius:50%;background:var(--brand);box-shadow:0 0 0 4px rgba(14,165,164,.18)}
  .spacer{flex:1}
  .iconbtn{border:1px solid var(--line);background:var(--card);color:var(--ink);width:38px;height:34px;border-radius:999px;cursor:pointer;font-size:16px;line-height:1}
  .lang{display:flex;border:1px solid var(--line);border-radius:999px;overflow:hidden;background:var(--card)}
  .lang button{border:0;background:transparent;padding:6px 12px;font-weight:700;color:var(--muted);cursor:pointer;font-size:13px}
  .lang button.on{background:var(--brand);color:#fff}

  .card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);padding:18px;margin:0 0 16px}
  .card h2{margin:0 0 4px;font-size:17px}
  .card .sub{margin:0 0 14px;color:var(--muted);font-size:13px}
  h1.page{font-size:22px;margin:4px 0 14px}

  label{display:block;font-size:13px;font-weight:600;color:var(--muted);margin:0 0 6px}
  input,select,textarea{
    width:100%;padding:11px 12px;border:1px solid var(--line);border-radius:12px;font-size:16px;
    background:var(--input);color:var(--ink);font-family:inherit;
  }
  input:focus,select:focus,textarea:focus{outline:2px solid rgba(14,165,164,.35);border-color:var(--brand)}
  .grid{display:grid;gap:12px}
  .g2{grid-template-columns:1fr 1fr}
  .g3{grid-template-columns:1fr 1fr 1fr}
  @media(max-width:600px){.g2,.g3{grid-template-columns:1fr}}
  .field{margin:0 0 12px}

  /* tap-to-choose chips (pen strength) */
  .chips{display:grid;grid-template-columns:repeat(6,1fr);gap:8px;margin:0 0 12px}
  @media(max-width:560px){.chips{grid-template-columns:repeat(3,1fr)}}
  .chip{appearance:none;cursor:pointer;border:1px solid var(--line);background:var(--soft);
    border-radius:12px;padding:10px 4px;text-align:center;color:var(--ink);
    transition:border-color .15s,background .15s,box-shadow .15s}
  .chip .cv{display:block;font-weight:800;font-size:16px;line-height:1.1}
  .chip .cu{display:block;font-size:11px;color:var(--muted);margin-top:2px}
  .chip.on{border-color:var(--brand);background:rgba(14,165,164,.10);box-shadow:0 0 0 1px var(--brand) inset}

  /* compact price tiles (per-pen costs) */
  .pcgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
  @media(max-width:560px){.pcgrid{grid-template-columns:repeat(2,1fr)}}
  .pcitem{display:flex;flex-direction:column;gap:4px;background:var(--soft);border:1px solid var(--line);border-radius:10px;padding:8px}
  .pcitem label{margin:0;font-size:12px;font-weight:700;color:var(--ink);display:flex;justify-content:space-between;align-items:baseline;gap:6px}
  .pcitem input{padding:7px 8px;font-size:14px;border-radius:8px}
  /* segmented toggle */
  .seg{display:inline-flex;border:1px solid var(--line);border-radius:10px;overflow:hidden;background:var(--soft);margin:0 0 12px}
  .seg button{border:0;background:transparent;padding:8px 14px;font-weight:700;font-size:13px;color:var(--muted);cursor:pointer}
  .seg button.on{background:var(--brand);color:#fff}

  /* travel comparison: full-width cards on mobile, multi-column on desktop */
  .tgrid{display:grid;gap:10px;grid-template-columns:1fr;margin:0 0 8px}
  @media(min-width:620px){ .tgrid{grid-template-columns:repeat(3,1fr)} .tgrid.two{grid-template-columns:repeat(2,1fr)} }
  .tcard{background:var(--soft);border:1px solid var(--line);border-radius:12px;padding:14px}
  .tcard h3{margin:0 0 6px;font-size:14px}
  .tcard .ex{margin:0 0 10px;font-size:12.5px;color:var(--muted);line-height:1.45}
  .tcard .big{font-size:21px;font-weight:800;line-height:1.1}
  .tcard .big small{font-size:12px;font-weight:600;color:var(--muted)}
  .tcard .meta{margin-top:6px;font-size:12px;color:var(--muted);line-height:1.5}
  .tcard.verdict{border-width:1px}
  .tcard .vmsg{font-size:15px;font-weight:800;margin:0 0 8px}
  /* per shot / week / month figure row */
  .pers{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin:8px 0 4px}
  .pers.two{grid-template-columns:repeat(2,1fr)}
  .per{background:var(--card);border:1px solid var(--line);border-radius:9px;padding:7px 6px;text-align:center}
  .per b{display:block;font-size:14px;font-weight:800;line-height:1.15}
  .per span{display:block;font-size:10.5px;color:var(--muted);margin-top:2px}
  .tsub{font-size:13px;font-weight:700;color:var(--muted);margin:6px 0 8px}
  /* faded currency code after an amount */
  .cur{color:var(--muted);font-weight:600;font-size:.82em;opacity:.85}
  .row{display:flex;gap:10px;flex-wrap:wrap;align-items:center}

  button.btn{
    border:0;border-radius:12px;padding:12px 16px;font-size:15px;font-weight:700;cursor:pointer;
    background:var(--brand);color:#fff;transition:filter .15s,transform .05s;
  }
  button.btn:hover{filter:brightness(1.05)}
  button.btn:active{transform:translateY(1px)}
  button.btn.ghost{background:var(--soft);color:var(--ink);border:1px solid var(--line)}
  button.btn.danger{background:#fee2e2;color:var(--bad)}
  button.btn.sm{padding:8px 12px;font-size:13px}
  /* Full/Half pattern toggles: fixed width so switching label never shifts layout */
  button.fracBtn{min-width:104px;text-align:center}

  .toggle{display:inline-flex;align-items:center;gap:8px;cursor:pointer;user-select:none}
  .switch{width:44px;height:26px;border-radius:999px;background:#cbd5e1;position:relative;transition:background .2s}
  .switch::after{content:"";position:absolute;top:3px;left:3px;width:20px;height:20px;border-radius:50%;background:#fff;transition:left .2s;box-shadow:0 1px 2px rgba(0,0,0,.2)}
  .toggle input{display:none}
  .toggle input:checked + .switch{background:var(--brand)}
  .toggle input:checked + .switch::after{left:21px}

  /* range sliders for the daily symptom diary */
  .slider{margin:10px 0 4px}
  .slider .slhead{display:flex;justify-content:space-between;align-items:baseline;gap:8px;font-size:14px;font-weight:700}
  .slider .slval{font-variant-numeric:tabular-nums;font-weight:800;color:var(--brand);min-width:2ch;text-align:right}
  .slider input[type=range]{width:100%;margin:6px 0 0;accent-color:var(--brand);height:26px}
  .metricrow{display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid var(--line)}
  .metricrow .mname{flex:1;min-width:0}
  .metricrow.arch{opacity:.5}
  /* segment switcher (substances) */
  .seg{display:flex;gap:6px;background:var(--soft);border:1px solid var(--line);border-radius:12px;padding:4px;margin-bottom:14px}
  .seg button{flex:1;border:0;background:transparent;color:var(--muted);font-weight:700;font-size:14px;padding:9px 6px;border-radius:9px;cursor:pointer}
  .seg button.on{background:var(--card);color:var(--ink);box-shadow:0 1px 3px rgba(0,0,0,.08)}
  /* progress bar (TRT cadence / peptide cycle) */
  .pbar{height:14px;border-radius:999px;background:var(--soft);border:1px solid var(--line);overflow:hidden;margin:6px 0}
  .pbar>span{display:block;height:100%;border-radius:999px;transition:width .3s}
  .pbwrap .pblabels{display:flex;justify-content:space-between;font-size:13px;font-weight:700;margin-top:2px}
  /* body map */
  .bodymap{max-width:280px;margin:6px auto 2px;display:block}
  .bodymap .site{cursor:pointer}
  .maplegend{display:flex;gap:14px;justify-content:center;flex-wrap:wrap;font-size:12px;color:var(--muted);margin-top:4px}
  .maplegend i{display:inline-block;width:10px;height:10px;border-radius:50%;margin-right:4px;vertical-align:middle}
  .pill{display:inline-block;padding:3px 10px;border-radius:999px;font-size:12px;font-weight:700}
  .muted{color:var(--muted)}
  .small{font-size:13px}
  .tiny{font-size:12px}
  .center{text-align:center}
  .stat{display:flex;flex-direction:column;gap:2px;background:var(--soft);border:1px solid var(--line);border-radius:12px;padding:12px}
  .stat .k{font-size:12px;color:var(--muted);font-weight:600}
  .stat .v{font-size:20px;font-weight:800}
  .stats{display:grid;gap:10px;grid-template-columns:repeat(auto-fit,minmax(120px,1fr))}

  table{width:100%;border-collapse:collapse;font-size:14px}
  th,td{text-align:left;padding:8px 6px;border-bottom:1px solid var(--line)}
  th{font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:.03em}
  td.num,th.num{text-align:right;font-variant-numeric:tabular-nums}
  .scroll{overflow-x:auto}

  .note{background:var(--soft);border:1px solid var(--line);border-radius:12px;padding:10px 12px;font-size:13px;color:var(--muted)}
  .warnbox{background:var(--warnbg);border:1px solid var(--warnline);color:var(--warnink);border-radius:12px;padding:10px 12px;font-size:13px}
  .banner{background:var(--warnbg);border:1px solid var(--warnline);color:var(--warnink);border-radius:12px;padding:10px 12px;font-size:13px;margin-bottom:12px}

  /* tabs */
  nav.tabs{position:fixed;bottom:0;left:0;right:0;z-index:30;background:var(--card);border-top:1px solid var(--line);
    display:flex;padding:6px max(8px,env(safe-area-inset-left)) calc(6px + env(safe-area-inset-bottom));}
  nav.tabs a{flex:1;text-decoration:none;color:var(--muted);text-align:center;font-size:11px;font-weight:700;
    padding:6px 2px;border-radius:12px;display:flex;flex-direction:column;align-items:center;gap:3px}
  nav.tabs a .ic{display:flex;align-items:center;justify-content:center}
  nav.tabs a .ic svg{width:23px;height:23px;display:block}
  nav.tabs a.on{color:var(--brand);background:rgba(14,165,164,.10)}

  /* On wider screens the tab bar moves to the top, sitting directly under the
     header as a self-contained segmented bar (instead of a fixed bottom bar). */
  @media(min-width:760px){
    body{padding-bottom:24px;display:flex;flex-direction:column;min-height:100vh}
    header.app{order:1}
    nav.tabs{order:2;position:static;width:100%;max-width:760px;margin:16px auto 4px;border:1px solid var(--line);
      border-radius:var(--radius);box-shadow:var(--shadow);padding:8px}
    nav.tabs a{font-size:12px}
    main.wrap{order:3}
  }

  /* BMI gauge */
  .gauge{margin:6px 0 4px}
  .gauge .track{position:relative;height:26px;border-radius:999px;overflow:hidden;display:flex;border:1px solid var(--line)}
  .gauge .seg{height:100%}
  .gauge .marker{position:absolute;top:-8px;transform:translateX(-50%);transition:left .6s cubic-bezier(.22,1,.36,1)}
  .gauge .marker .tri{width:0;height:0;border-left:9px solid transparent;border-right:9px solid transparent;border-top:12px solid var(--ink);margin:0 auto}
  .gauge .marker .bubble{position:absolute;bottom:14px;left:50%;transform:translateX(-50%);background:var(--ink);color:var(--bg);
    font-size:12px;font-weight:800;padding:3px 8px;border-radius:8px;white-space:nowrap}
  .gauge .ticks{display:flex;justify-content:space-between;font-size:10px;color:var(--muted);margin-top:8px}
  .gauge .labels{display:flex;font-size:10px;color:var(--muted);margin-top:4px;text-align:center}
  .gauge .labels span{flex:1}

  svg.ring{width:min(260px,72%);height:auto;display:block;margin:8px auto 4px}
  svg.chart{width:100%;height:auto;display:block;touch-action:pan-y}
  .legend{display:flex;gap:14px;flex-wrap:wrap;font-size:12px;color:var(--muted);margin-top:8px}
  .legend i{display:inline-block;width:12px;height:12px;border-radius:3px;margin-right:5px;vertical-align:-1px}
  .empty{padding:30px 10px;text-align:center;color:var(--muted)}

  footer.app{max-width:760px;margin:8px auto 0;padding:14px 16px 0;color:var(--muted);font-size:12px}
  .hidden{display:none !important}
</style>
</head>
<body>
<header class="app">
  <div class="head-inner">
    <div class="logo"><span class="dot"></span><span>Mounjaro Tracker</span></div>
    <div class="spacer"></div>
    <button class="btn sm" id="installBtn" hidden>📲 <span data-i="install.btn">Zainstaluj</span></button>
    <button class="iconbtn" id="themeBtn" title="Dark / light" aria-label="Toggle dark mode">🌙</button>
    <div class="lang" id="langSwitch">
      <button data-lang="pl">PL</button>
      <button data-lang="en">EN</button>
    </div>
  </div>
</header>

<main class="wrap">
  <div id="storeBanner" class="banner hidden"></div>
  <div id="app"></div>
  <footer class="app" id="footer"></footer>
</main>

<nav class="tabs" id="tabs">
  <a href="#pulpit" data-tab="pulpit"><span class="ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><path d="M9 22V12h6v10"/></svg></span><span data-i="tab.pulpit">Pulpit</span></a>
  <a href="#diary" data-tab="diary"><span class="ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2Z"/><path d="M9 7h7M9 11h5"/></svg></span><span data-i="tab.diary">Dziennik</span></a>
  <a href="#weight" data-tab="weight"><span class="ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 17 13.5 8.5 8.5 13.5 2 7"/><polyline points="16 17 22 17 22 11"/></svg></span><span data-i="tab.weight">Waga</span></a>
  <a href="#bp" data-tab="bp"><span class="ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12h4l2 5 4-12 2 7h6"/></svg></span><span data-i="tab.bp">Ciśnienie</span></a>
  <a href="#optimizer" data-tab="optimizer"><span class="ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><rect width="16" height="20" x="4" y="2" rx="2"/><line x1="8" x2="16" y1="6" y2="6"/><line x1="16" x2="16" y1="14" y2="18"/><path d="M8 10h.01M12 10h.01M16 10h.01M8 14h.01M12 14h.01M8 18h.01M12 18h.01"/></svg></span><span data-i="tab.optimizer">Kalkulator</span></a>
  <a href="#settings" data-tab="settings"><span class="ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><line x1="21" x2="14" y1="4" y2="4"/><line x1="10" x2="3" y1="4" y2="4"/><line x1="21" x2="12" y1="12" y2="12"/><line x1="8" x2="3" y1="12" y2="12"/><line x1="21" x2="16" y1="20" y2="20"/><line x1="12" x2="3" y1="20" y2="20"/><line x1="14" x2="14" y1="2" y2="6"/><line x1="8" x2="8" y1="10" y2="14"/><line x1="16" x2="16" y1="18" y2="22"/></svg></span><span data-i="tab.settings">Ustawienia</span></a>
</nav>

    // ---- correlations ----
    "corr.title":{pl:"Korelacje",en:"Correlations"},
    "corr.sub":{pl:"Nałóż dwie dowolne serie na wspólnej osi czasu (dwie osie Y).",en:"Overlay any two series on a shared timeline (two Y axes)."},

/* =========================================================================
   DOMAIN — pure pen / click / cost math + optimizer (no DOM, no storage)
   ========================================================================= */
var DOMAIN = (function(){
  var CLICKS_PER_PEN = 240, CLICKS_PER_DOSE = 60, DOSES_PER_PEN = 4;
  function round(n){ return Math.round(n); }
  function r3(n){ return Math.round(n*1000)/1000; }

  function mgPerClick(S){ return S/CLICKS_PER_DOSE; }
  function clicksForDose(D,S){ return Math.max(0, Math.round(D*CLICKS_PER_DOSE/S)); }
  function mgForClicks(c,S){ return c*S/CLICKS_PER_DOSE; }
  function totalMgPerPen(S){ return DOSES_PER_PEN*S; }
  function budgetClicks(golden){ return CLICKS_PER_PEN + (golden && golden.enabled ? Math.max(0, golden.extraClicks||0) : 0); }

  function cost(P,S){
    return {
      perClick: P/CLICKS_PER_PEN,
      perMg: P/(DOSES_PER_PEN*S),
      perLabeledDose: P/DOSES_PER_PEN,
      perPen: P
    };
  }

  // Stretch mode: closed form
  function stretch(S, D, P, golden){
    var budget = budgetClicks(golden);
    var c = clicksForDose(D,S);
    if(c<=0) return {error:"badInput"};
    var weeks = Math.floor(budget/c);
    var leftover = budget - weeks*c;
    var actual = mgForClicks(c,S);
    var pc = (P!=null) ? P/CLICKS_PER_PEN : null;
    return {
      clicksPerWeek:c, weeks:weeks, leftover:leftover, actualMg:r3(actual),
      requestedMg:D, deltaMg:r3(actual-D),
      costPerWeek: pc!=null ? c*pc : null,
      baselineWeeks: DOSES_PER_PEN, // 4
      baselineCostPerWeek: P!=null ? P/DOSES_PER_PEN : null,
      extraWeeks: weeks - DOSES_PER_PEN,
      savingPerWeek: P!=null ? (P/DOSES_PER_PEN - c*pc) : null,
      budget:budget
    };
  }

  // Regimen planner: base dose + repeating full/half pattern, on a custom day interval.
  // fractions: array of multipliers (1 = full, 0.5 = half). intervalDays: days between shots.
  function planRegimen(S, baseDose, fractions, intervalDays, P, golden){
    if(!baseDose || baseDose<=0) return {error:"badInput"};
    if(!fractions || !fractions.length) fractions=[1];
    if(!intervalDays || intervalDays<=0) intervalDays=7;
    var budget = budgetClicks(golden);
    var pc = (P!=null) ? P/CLICKS_PER_PEN : null;

    var shots = fractions.map(function(f){
      var dose = r3(baseDose*f);
      var clicks = clicksForDose(dose, S);
      return { fraction:f, dose:dose, clicks:clicks, actualMg:r3(mgForClicks(clicks,S)),
               costPerShot: pc!=null ? clicks*pc : null };
    });
    var cycleClicks = shots.reduce(function(a,b){return a+b.clicks;},0);
    var cycleShots = shots.length;
    var cycleMg = shots.reduce(function(a,b){return a+b.actualMg;},0);

    // smallest shot must fit at least once
    var minClicks = Math.min.apply(null, shots.map(function(x){return x.clicks;}));
    if(minClicks<=0 || minClicks>budget){
      return { infeasible:true, budget:budget, shots:shots, minClicks:minClicks };
    }

    // fill sequentially through the repeating pattern
    var fullCycles = Math.floor(budget / cycleClicks);
    var used = fullCycles * cycleClicks;
    var totalShots = fullCycles * cycleShots;
    var i = 0;
    while(used + shots[i % cycleShots].clicks <= budget){
      used += shots[i % cycleShots].clicks; totalShots++; i++;
    }
    var leftover = budget - used;
    var totalDays = totalShots * intervalDays;
    var weeks = totalDays/7, months = totalDays/30.44;

    var weeklyClicks = cycleClicks/(cycleShots*intervalDays)*7;
    return {
      budget:budget, shots:shots, cycleClicks:cycleClicks, cycleShots:cycleShots,
      totalShots:totalShots, clicksUsed:used, leftover:leftover,
      totalDays:totalDays, weeks:weeks, months:months,
      intervalDays:intervalDays,
      avgWeeklyMg: r3(cycleMg/(cycleShots*intervalDays)*7),
      totalCost: P!=null ? P : null,
      weeklyCost: pc!=null ? weeklyClicks*pc : null,
      monthlyCost: pc!=null ? weeklyClicks*pc*30.44/7 : null,
      baselineWeeklyCost: P!=null ? P/DOSES_PER_PEN : null,
      savingPerWeek: pc!=null ? (P/DOSES_PER_PEN - weeklyClicks*pc) : null,
      extraDays: totalDays - (DOSES_PER_PEN*7)
    };
  }

  // Build discrete dose levels from A to B by step inc (mg)
  function buildLevels(A,B,inc){
    var levels=[];
    for(var mg=A; mg < B - 1e-9; mg = r3(mg+inc)) levels.push(r3(mg));
    levels.push(r3(B));
    return levels;
  }

  // Finest ladder A..B (multiples of inc) whose one-week-per-level cost fits the budget.
  function fittingLadder(A,B,inc,S,budget){
    for(var m=1; m<=400; m++){
      var levels = buildLevels(A,B,inc*m);
      var w = levels.map(function(mg){ return Math.max(1, clicksForDose(mg,S)); });
      var sum = w.reduce(function(a,b){return a+b;},0);
      if(sum<=budget) return {levels:levels, w:w, sum:sum, step:r3(inc*m), coarsened:(m>1)};
    }
    return null;
  }

  // Slow progression schedules. Returns {feasible, budget, candidates:[...]}
  function progression(A,B,S,inc,golden,P){
    if(B<=A) return {error:"targetGt"};
    if(inc<=0) inc=0.25;
    var budget = budgetClicks(golden);
    var wA = Math.max(1, clicksForDose(A,S));
    var wB = Math.max(1, clicksForDose(B,S));

    // Minimum feasible progression = 1 week at A + 1 week at B.
    if(wA + wB > budget){
      return { feasible:false, minNeed:wA+wB, budget:budget };
    }
    var pc = (P!=null) ? P/CLICKS_PER_PEN : null;

    function pack(levels, w, dwell, coarsenStep){
      var used=0, weeks=0, sched=[];
      for(var i=0;i<levels.length;i++){
        var wk=dwell[i];
        used += wk*w[i]; weeks += wk;
        sched.push({mg:levels[i], clicks:w[i], weeks:wk});
      }
      return {
        schedule:sched, totalWeeks:weeks, clicksUsed:used, leftover:budget-used,
        totalCost: P!=null ? P : null,
        costPerWeek: pc!=null && weeks>0 ? (P/weeks) : null,
        coarsenStep: coarsenStep||null
      };
    }

    // 1) LONGEST: maximize total weeks. Optimum is to dwell at the cheapest dose (A)
    //    as long as possible, then a single week at B (a non-decreasing sequence
    //    must end at B; any intermediate dose only costs more clicks per week).
    var kA = Math.floor((budget - wB) / wA);
    var longest = pack([A,B], [wA,wB], [kA,1]);

    // 2) GENTLE: walk up a ladder (auto-coarsened to fit), 1 week per step,
    //    then spend the leftover at the LOWEST dose to lengthen the slow phase.
    var lad = fittingLadder(A,B,inc,S,budget);
    var gentle=null, reach=null;
    if(lad){
      var dG = lad.w.map(function(){return 1;});
      dG[0] += Math.floor((budget - lad.sum) / lad.w[0]);
      gentle = pack(lad.levels, lad.w, dG, lad.coarsened?lad.step:null);

      // 3) REACH THEN MAINTAIN: same ladder, leftover spent at the TARGET dose.
      var dR = lad.w.map(function(){return 1;});
      dR[lad.levels.length-1] += Math.floor((budget - lad.sum) / lad.w[lad.levels.length-1]);
      reach = pack(lad.levels, lad.w, dR, lad.coarsened?lad.step:null);
    }

    var candidates = [];
    if(gentle) candidates.push({key:"gentle", res:gentle});
    candidates.push({key:"longest", res:longest});
    if(reach) candidates.push({key:"reach", res:reach});

    return { feasible:true, budget:budget, candidates:candidates };
  }

  // ---- gradual titration planner (time-based, not crammed into one pen) ----
  // Build the ladder of weekly doses for a fixed step size.
  function rampLevelsByStep(from, to, step){
    if(!(to>from) || !(step>0)) return null;
    var levels=[], d=from, guard=0;
    while(d < to - 1e-9 && guard<400){ levels.push(r3(d)); d+=step; guard++; }
    levels.push(r3(to));
    return levels;
  }
  // Build an evenly-spaced ladder that reaches the target in exactly `weeks` weeks.
  function rampLevelsByWeeks(from, to, weeks){
    weeks=Math.max(2, Math.round(weeks));
    if(!(to>from)) return null;
    var step=(to-from)/(weeks-1), levels=[];
    for(var i=0;i<weeks;i++) levels.push(r3(from+i*step));
    levels[weeks-1]=r3(to);
    return { levels:levels, step:r3(step) };
  }
  // Turn a list of weekly doses into a costed schedule. weeksPerStep = how long
  // each dose is held. Each step is gradual, so there's never an infeasible jump.
  function rampSchedule(levels, weeksPerStep, S, golden, P){
    if(!levels || !levels.length) return {error:"badInput"};
    weeksPerStep=Math.max(1, Math.round(weeksPerStep||1));
    var pc=(P!=null)?P/CLICKS_PER_PEN:null, budget=budgetClicks(golden);
    var sched=levels.map(function(mg){
      var clicks=clicksForDose(mg,S);
      return { mg:r3(mg), weeks:weeksPerStep, clicks:clicks,
        feasible: clicks<=budget, costPerWeek: pc!=null?r3(clicks*pc):null };
    });
    var totalWeeks=levels.length*weeksPerStep;
    var weeksToTarget=(levels.length-1)*weeksPerStep+1;
    var totalMg=0,totalCost=0;
    for(var i=0;i<levels.length;i++){ totalMg+=levels[i]*weeksPerStep; if(pc!=null) totalCost+=sched[i].clicks*weeksPerStep*pc; }
    return { schedule:sched, totalWeeks:totalWeeks, weeksToTarget:weeksToTarget,
      target:r3(levels[levels.length-1]), totalMg:r3(totalMg), totalCost:pc!=null?r3(totalCost):null, budget:budget };
  }

  function bmi(weightKg, heightCm){
    if(!weightKg || !heightCm) return null;
    var h = heightCm/100;
    return weightKg/(h*h);
  }
  function bmiCategory(b){
    if(b < 18.5) return {key:"bmi.cat.under", color:"#0284c7"};
    if(b < 25)   return {key:"bmi.cat.normal",color:"#16a34a"};
    if(b < 30)   return {key:"bmi.cat.over",  color:"#f59e0b"};
    if(b < 35)   return {key:"bmi.cat.ob1",   color:"#f97316"};
    if(b < 40)   return {key:"bmi.cat.ob2",   color:"#dc2626"};
    return {key:"bmi.cat.ob3", color:"#991b1b"};
  }
  function healthyWeightRange(heightCm){
    if(!heightCm) return null;
    var h=heightCm/100;
    return { min: 18.5*h*h, max: 24.9*h*h };
  }

  // Travel / import comparison: stretch a home pen vs buying in a destination
  // country. All home-currency amounts; destination prices converted via rate
  // (1 home = rate destination). Any scenario whose inputs are missing → null.
  function travelCompare(o){
    var budget = budgetClicks(o.golden), D=o.dose, S=o.homeStrength;
    var monthDays = o.monthDays || 30.4, interval = Math.max(1, o.intervalDays||7);
    var rate = (o.rate!=null && o.rate>0) ? o.rate : null;
    function shots(str){ var cps=clicksForDose(D,str); return cps>0 ? Math.floor(budget/cps) : 0; }
    function scenario(str, priceHome){
      if(priceHome==null || !(D>0) || !(str>0)) return null;
      var sp=shots(str); if(sp<=0) return null;
      var per=priceHome/sp;
      return { strength:str, priceHome:r3(priceHome), shotsPerPen:sp,
        perShot:r3(per), perWeek:r3(per*7/interval), perMonth:r3(per*monthDays/interval),
        coverWeeks:r3(sp*interval/7), coverMonths:r3(sp*interval/monthDays) };
    }
    function toHome(p){ return (p!=null && rate) ? p/rate : null; }
    var home=scenario(S, o.homePrice), same=scenario(S, toHome(o.destPriceSame)), rx=scenario(o.rxStrength, toHome(o.destPriceRx));
    function dS(x){ return (home&&x)?r3(x.perShot-home.perShot):null; }
    function dW(x){ return (home&&x)?r3(x.perWeek-home.perWeek):null; }
    function dM(x){ return (home&&x)?r3(x.perMonth-home.perMonth):null; }
    // Trip planner: how many whole pens to cover a trip of o.tripDays, and the
    // total trip cost for each route (you buy whole pens).
    var trip=null;
    if(o.tripDays && o.tripDays>0){
      var shotsTrip=Math.max(1,Math.ceil(o.tripDays/interval));
      function leg(sc){ if(!sc) return null; var pens=Math.max(1,Math.ceil(shotsTrip/sc.shotsPerPen)); return { pens:pens, cost:r3(pens*sc.priceHome) }; }
      var lh=leg(home), ls=leg(same), lr=leg(rx);
      trip={ days:o.tripDays, shots:shotsTrip, home:lh, same:ls, rx:lr,
        saveSame:(lh&&ls)?r3(ls.cost-lh.cost):null, saveRx:(lh&&lr)?r3(lr.cost-lh.cost):null };
    }
    return { home:home, same:same, rx:rx, needRate:!rate, trip:trip,
      saveVsSame:dS(same), saveVsSameWeek:dW(same), saveVsSameMonth:dM(same),
      saveVsRx:dS(rx), saveVsRxWeek:dW(rx), saveVsRxMonth:dM(rx) };
  }

  // ---- health-tracking expansion: pure series + rhythm helpers ----
  // Everything trackable becomes a time series [{date,value}] sorted ascending.
  // sourceId formats: "metric:<id>", "inj:<substance>", "vital:sys|dia|pulse"
  // (read from bp.log), "weight", "mounjaroDose".
  function seriesFor(state, sourceId){
    if(!state||!sourceId) return [];
    var parts=String(sourceId).split(":"), kind=parts[0], key=parts[1], out=[];
    if(kind==="metric"){
      (state.dailyLog||[]).forEach(function(e){
        if(e && e.values && e.values[key]!=null && e.values[key]!=="")
          out.push({date:e.date, value:Number(e.values[key])});
      });
    } else if(kind==="inj"){
      (state.injLog||[]).forEach(function(e){
        if(e && e.substance===key && e.dose!=null && e.dose!=="")
          out.push({date:e.date, value:Number(e.dose)});
      });
    } else if(kind==="vital"){
      (state.bp && state.bp.log ? state.bp.log : []).forEach(function(e){
        if(e && e[key]!=null && e[key]!=="" && e.ts)
          out.push({date:String(e.ts).slice(0,10), value:Number(e[key])});
      });
    } else if(sourceId==="weight"){
      (state.weightLog||[]).forEach(function(e){
        if(e && e.weightKg!=null) out.push({date:e.date, value:Number(e.weightKg)});
      });
    } else if(sourceId==="mounjaroDose"){
      (state.weightLog||[]).forEach(function(e){
        if(e && e.doseMg!=null) out.push({date:e.date, value:Number(e.doseMg)});
      });
    }
    return out.filter(function(p){return !isNaN(p.value);})
              .sort(function(a,b){ return a.date<b.date?-1:a.date>b.date?1:0; });
  }

  // Rotation: suggest the site whose most-recent use is oldest (across ALL
  // substances), so the same spot isn't hit twice in a row. Never-used wins.
  function suggestSite(injLog, siteIds){
    if(!siteIds||!siteIds.length) return null;
    var lastUse={};
    (injLog||[]).forEach(function(e){
      if(e && e.site){ if(!lastUse[e.site] || e.date>lastUse[e.site]) lastUse[e.site]=e.date; }
    });
    var best=siteIds[0], bestKey=lastUse[siteIds[0]]||"";
    for(var i=0;i<siteIds.length;i++){
      var k=lastUse[siteIds[i]]||""; // "" (never used) sorts before any date
      if(k<bestKey){ bestKey=k; best=siteIds[i]; }
    }
    return best;
  }

  // Peptide cycle progress. cfg:{cycleDays,cycleStart}. Returns null if no start.
  function cycleProgress(cfg, todayISOstr){
    if(!cfg || !cfg.cycleStart || !cfg.cycleDays) return null;
    var total=Math.max(1, cfg.cycleDays);
    var dayN=Math.max(0, Math.round((new Date(todayISOstr+"T12:00:00")-new Date(cfg.cycleStart+"T12:00:00"))/86400000))+1;
    var done=dayN>total;
    return { dayN:Math.min(dayN,total), total:total, frac:Math.max(0,Math.min(1,dayN/total)), done:done };
  }

  // TRT interval progress: how the bar fills from one shot to the next.
  function intervalProgress(lastDate, intervalDays, todayISOstr){
    if(!lastDate) return null;
    var every=Math.max(1, intervalDays||3);
    var elapsed=Math.round((new Date(todayISOstr+"T12:00:00")-new Date(lastDate+"T12:00:00"))/86400000);
    var remaining=every-elapsed;
    return { remaining:remaining, every:every, elapsed:elapsed,
             frac:Math.max(0,Math.min(1, elapsed/every)) };
  }

  return {
    CLICKS_PER_PEN:CLICKS_PER_PEN, CLICKS_PER_DOSE:CLICKS_PER_DOSE, DOSES_PER_PEN:DOSES_PER_PEN,
    mgPerClick:mgPerClick, clicksForDose:clicksForDose, mgForClicks:mgForClicks,
    totalMgPerPen:totalMgPerPen, budgetClicks:budgetClicks, cost:cost,
    stretch:stretch, planRegimen:planRegimen, progression:progression, bmi:bmi, bmiCategory:bmiCategory,
    healthyWeightRange:healthyWeightRange, travelCompare:travelCompare,
    rampLevelsByStep:rampLevelsByStep, rampLevelsByWeeks:rampLevelsByWeeks, rampSchedule:rampSchedule,
    seriesFor:seriesFor, suggestSite:suggestSite, cycleProgress:cycleProgress, intervalProgress:intervalProgress
  };
})();

function doseColor(mg){
  if(mg==null) return "#94a3b8";
  var t = Math.max(0, Math.min(1, mg/15));
  // interpolate teal -> amber -> red
  var stops=[[14,165,164],[245,158,11],[220,38,38]];
  var seg = t*(stops.length-1), i=Math.floor(seg), f=seg-i;
  if(i>=stops.length-1){ i=stops.length-2; f=1; }

  var r=Math.round(a[0]+(b[0]-a[0])*f), g=Math.round(a[1]+(b[1]-a[1])*f), bl=Math.round(a[2]+(b[2]-a[2])*f);

/* =========================================================================
   CHART — inline SVG weight trend + dose colouring
   ========================================================================= */
var CHART = (function(){
  function render(log){
    var data = log.slice().filter(function(e){return e.weightKg!=null;})
                  .sort(function(a,b){ return a.date<b.date?-1:a.date>b.date?1:0; });
    if(data.length===0){
      return '<div class="empty">'+esc(I18N.t("weight.empty"))+'</div>';
    }
    var W=320, H=200, mL=38, mR=14, mT=14, mB=26;
    var iw=W-mL-mR, ih=H-mT-mB;
    var xs = data.map(function(e){ return new Date(e.date+"T12:00:00").getTime(); });
    var minX=Math.min.apply(null,xs), maxX=Math.max.apply(null,xs);
    var ys = data.map(function(e){ return e.weightKg; });
    var minY=Math.min.apply(null,ys), maxY=Math.max.apply(null,ys);
    if(minY===maxY){ minY-=1; maxY+=1; }
    var padY=(maxY-minY)*0.12; minY-=padY; maxY+=padY;
    function X(t){ return maxX===minX ? mL+iw/2 : mL + (t-minX)/(maxX-minX)*iw; }
    function Y(v){ return mT + (1-(v-minY)/(maxY-minY))*ih; }

    var svg='<svg class="chart" viewBox="0 0 '+W+' '+H+'" role="img" aria-label="weight chart">';
    // gridlines + y ticks
    var rows=4;
    for(var r=0;r<=rows;r++){
      var val = minY + (maxY-minY)*r/rows;
      var y = Y(val);
      svg+='<line x1="'+mL+'" y1="'+y.toFixed(1)+'" x2="'+(W-mR)+'" y2="'+y.toFixed(1)+'" stroke="#e2e8f0" stroke-width="1"/>';
      svg+='<text x="'+(mL-6)+'" y="'+(y+3).toFixed(1)+'" font-size="9" fill="#94a3b8" text-anchor="end">'+val.toFixed(1)+'</text>';
    }

    function dlabel(t){ var d=new Date(t); return (d.getDate())+"."+(d.getMonth()+1); }
    var idxs = data.length<=3 ? data.map(function(_,i){return i;}) : [0, Math.floor((data.length-1)/2), data.length-1];
    idxs.forEach(function(i){
      var x=X(xs[i]);

    });
    // trend line
    if(data.length>1){
      var pts = data.map(function(e,i){ return X(xs[i]).toFixed(1)+","+Y(e.weightKg).toFixed(1); }).join(" ");
      svg+='<polyline points="'+pts+'" fill="none" stroke="#0ea5a4" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>';
    }
    // points coloured by dose, with native tooltip
    data.forEach(function(e,i){
      var x=X(xs[i]).toFixed(1), y=Y(e.weightKg).toFixed(1);
      var c=doseColor(e.doseMg);
      var tip = e.date+" · "+e.weightKg+" kg"+(e.doseMg!=null?" · "+e.doseMg+" mg":"")+(e.note?" · "+e.note:"");
      svg+='<circle cx="'+x+'" cy="'+y+'" r="4.5" fill="'+c+'" stroke="#fff" stroke-width="1.5">'
         +'<title>'+esc(tip)+'</title></circle>';
    });
    svg+='</svg>';
    return svg;
  }

  // Blood-pressure chart: systolic + diastolic (+ pulse) over time, irregular timestamps OK.
  function renderBP(log){
    var data = log.slice().filter(function(e){return e.sys!=null&&e.dia!=null;})
                  .sort(function(a,b){ return a.ts<b.ts?-1:a.ts>b.ts?1:0; });
    if(data.length===0) return '<div class="empty">'+esc(I18N.t("bp.empty"))+'</div>';
    var W=320,H=210,mL=30,mR=12,mT=12,mB=26, iw=W-mL-mR, ih=H-mT-mB;
    var xs=data.map(function(e){ return new Date(e.ts).getTime(); });
    var minX=Math.min.apply(null,xs), maxX=Math.max.apply(null,xs);
    var vals=[]; data.forEach(function(e){ vals.push(e.sys,e.dia); if(e.pulse!=null) vals.push(e.pulse); });
    var minY=Math.min.apply(null,vals), maxY=Math.max.apply(null,vals);
    if(minY===maxY){ minY-=10; maxY+=10; }
    var padY=(maxY-minY)*0.12; minY-=padY; maxY+=padY;
    function X(t){ return maxX===minX ? mL+iw/2 : mL+(t-minX)/(maxX-minX)*iw; }
    function Y(v){ return mT+(1-(v-minY)/(maxY-minY))*ih; }
    var svg='<svg class="chart" viewBox="0 0 '+W+' '+H+'" role="img" aria-label="blood pressure chart">';
    var rows=4;
    for(var r=0;r<=rows;r++){
      var val=minY+(maxY-minY)*r/rows, y=Y(val);
      svg+='<line x1="'+mL+'" y1="'+y.toFixed(1)+'" x2="'+(W-mR)+'" y2="'+y.toFixed(1)+'" stroke="#e2e8f0" stroke-width="1"/>';
      svg+='<text x="'+(mL-5)+'" y="'+(y+3).toFixed(1)+'" font-size="9" fill="#94a3b8" text-anchor="end">'+Math.round(val)+'</text>';
    }
    function dlabel(t){ var d=new Date(t); return d.getDate()+"."+(d.getMonth()+1); }
    var idxs = data.length<=3 ? data.map(function(_,i){return i;}) : [0,Math.floor((data.length-1)/2),data.length-1];
    idxs.forEach(function(i){ svg+='<text x="'+X(xs[i]).toFixed(1)+'" y="'+(H-8)+'" font-size="9" fill="#94a3b8" text-anchor="middle">'+dlabel(xs[i])+'</text>'; });
    function line(key,color,dash){
      var pts=data.filter(function(e){return e[key]!=null;});
      if(pts.length>1){
        var p=pts.map(function(e){ return X(new Date(e.ts).getTime()).toFixed(1)+","+Y(e[key]).toFixed(1); }).join(" ");
        svg+='<polyline points="'+p+'" fill="none" stroke="'+color+'" stroke-width="2.2" stroke-linejoin="round" stroke-linecap="round"'+(dash?' stroke-dasharray="4 3"':'')+'/>';
      }
    }
    line("pulse","#94a3b8",true);
    line("dia","#0284c7",false);
    line("sys","#dc2626",false);
    data.forEach(function(e,i){
      var x=X(xs[i]).toFixed(1);
      var tip=fmtDateTime(e.ts)+" · "+e.sys+"/"+e.dia+(e.pulse!=null?" · "+e.pulse+" bpm":"")+(e.fasting?" · "+I18N.t("bp.fastingTag"):"")+(e.doseMg!=null?" · "+e.doseMg+" mg":"")+(e.note?" · "+e.note:"");
      svg+='<g><title>'+esc(tip)+'</title>';
      svg+='<circle cx="'+x+'" cy="'+Y(e.sys).toFixed(1)+'" r="3.6" fill="#dc2626" stroke="#fff" stroke-width="1.2"/>';
      svg+='<circle cx="'+x+'" cy="'+Y(e.dia).toFixed(1)+'" r="3.6" fill="#0284c7" stroke="#fff" stroke-width="1.2"/>';
      if(e.pulse!=null) svg+='<circle cx="'+x+'" cy="'+Y(e.pulse).toFixed(1)+'" r="3" fill="#94a3b8" stroke="#fff" stroke-width="1.2"/>';
      svg+='</g>';
    });
    svg+='</svg>';
    return svg;
  }
  // Two independent series on a shared time axis with two Y scales (left=A, right=B).
  function renderDual(a, b, labA, labB, colA, colB){
    a=(a||[]).slice(); b=(b||[]).slice();
    if(!a.length && !b.length) return '<div class="empty">'+esc(I18N.t("corr.empty"))+'</div>';
    var W=320, H=210, mL=34, mR=34, mT=12, mB=42, iw=W-mL-mR, ih=H-mT-mB;
    function t(d){ return new Date(d+"T12:00:00").getTime(); }
    var allX=a.concat(b).map(function(p){return t(p.date);});
    var minX=Math.min.apply(null,allX), maxX=Math.max.apply(null,allX);
    function X(tm){ return maxX===minX ? mL+iw/2 : mL+(tm-minX)/(maxX-minX)*iw; }
    function yScale(arr){
      if(!arr.length) return null;
      var ys=arr.map(function(p){return p.value;}), mn=Math.min.apply(null,ys), mx=Math.max.apply(null,ys);
      if(mn===mx){ mn-=1; mx+=1; } var pad=(mx-mn)*0.12; mn-=pad; mx+=pad;
      return function(v){ return mT+(1-(v-mn)/(mx-mn))*ih; };
    }
    var Ya=yScale(a), Yb=yScale(b);
    var svg='<svg class="chart" viewBox="0 0 '+W+' '+H+'" role="img" aria-label="correlation chart">';
    var rows=4;
    for(var r=0;r<=rows;r++){ var y=mT+ih*r/rows; svg+='<line x1="'+mL+'" y1="'+y.toFixed(1)+'" x2="'+(W-mR)+'" y2="'+y.toFixed(1)+'" stroke="#e2e8f0" stroke-width="1"/>'; }
    function dlabel(tm){ var d=new Date(tm); return d.getDate()+"."+(d.getMonth()+1); }
    [minX, (minX+maxX)/2, maxX].forEach(function(tm){ var x=X(tm); svg+='<text x="'+x.toFixed(1)+'" y="'+(H-26)+'" font-size="9" fill="#94a3b8" text-anchor="middle">'+dlabel(tm)+'</text>'; });
    function plot(arr, Y, col){
      if(!arr.length||!Y) return;
      if(arr.length>1){ var pts=arr.map(function(p){return X(t(p.date)).toFixed(1)+","+Y(p.value).toFixed(1);}).join(" ");
        svg+='<polyline points="'+pts+'" fill="none" stroke="'+col+'" stroke-width="2.4" stroke-linejoin="round" stroke-linecap="round"/>'; }
      arr.forEach(function(p){ svg+='<circle cx="'+X(t(p.date)).toFixed(1)+'" cy="'+Y(p.value).toFixed(1)+'" r="3.4" fill="'+col+'" stroke="#fff" stroke-width="1.2"><title>'+esc(p.date+" · "+p.value)+'</title></circle>'; });
    }
    plot(a, Ya, colA); plot(b, Yb, colB);
    // legend
    svg+='<g font-size="10" font-weight="700">'
      +'<circle cx="'+(mL)+'" cy="'+(H-10)+'" r="4" fill="'+colA+'"/><text x="'+(mL+8)+'" y="'+(H-6.5)+'" fill="#64748b">'+esc(labA)+'</text>'
      +'<circle cx="'+(mL+ (iw/2))+'" cy="'+(H-10)+'" r="4" fill="'+colB+'"/><text x="'+(mL+(iw/2)+8)+'" y="'+(H-6.5)+'" fill="#64748b">'+esc(labB)+'</text>'
      +'</g>';
    svg+='</svg>';
    return svg;
  }
  return { render:render, renderBP:renderBP, renderDual:renderDual };
})();

  /* ============ JAB (next-shot countdown ring) ============ */
  // Urgency palette: green (just injected) -> amber -> red (shot due).
  var RING_GREEN="#16a34a", RING_AMBER="#f59e0b", RING_RED="#dc2626";
  function hex2rgb(h){ h=h.replace("#",""); return [parseInt(h.slice(0,2),16),parseInt(h.slice(2,4),16),parseInt(h.slice(4,6),16)]; }
  function lerpRGB(a,b,t){ return [Math.round(a[0]+(b[0]-a[0])*t),Math.round(a[1]+(b[1]-a[1])*t),Math.round(a[2]+(b[2]-a[2])*t)]; }
  function rgbCss(c){ return "rgb("+c[0]+","+c[1]+","+c[2]+")"; }
  var GREEN_RGB=hex2rgb(RING_GREEN), AMBER_RGB=hex2rgb(RING_AMBER), RED_RGB=hex2rgb(RING_RED);
  // Continuous green -> amber -> red. Input 0 = green, 0.5 = amber, 1 = red.
  function urgencyColor(m){
    m=Math.max(0,Math.min(1,m));
    return m<0.5 ? lerpRGB(GREEN_RGB,AMBER_RGB,m/0.5)
                 : lerpRGB(AMBER_RGB,RED_RGB,(m-0.5)/0.5);
  }
  function ringSVG(frac, big, sub){
    frac=Math.max(0,Math.min(1,frac));
    // Hot colour tracks frac directly so the cap is a live progress readout:
    // it shifts a little every day (green -> amber -> red), never flat-green.
    var R=85, cx=100, cy=100, hot=urgencyColor(frac), hotCss=rgbCss(hot);
    // The blend runs ALONG the arc (relative to the ring's own path), not across
    // the screen: green on the freshly-injected trailing end, fluidly blending
    // to the hot colour at the moving leading cap. Built from many short arc
    // segments coloured by position p in [0,1] along the drawn arc — an SVG
    // linearGradient can only interpolate along a straight screen line.
    function pt(t){ var ang=(-90+t*frac*360)*Math.PI/180; return [cx+R*Math.cos(ang),cy+R*Math.sin(ang)]; }
    function colorAt(p){ return rgbCss(lerpRGB(GREEN_RGB,hot,p)); }
    var arc="";
    if(frac>0){
      var N=Math.max(2,Math.ceil(frac*96));

          +'fill="none" stroke="'+colorAt((t0+t1)/2)+'" stroke-width="14" stroke-linecap="round"/>';
      }
    }
    return '<svg class="ring" viewBox="0 0 200 200" role="img">'
      +'<circle cx="100" cy="100" r="85" fill="none" stroke="var(--line)" stroke-width="14"/>'
      +arc
      +'<text x="100" y="98" text-anchor="middle" font-size="46" font-weight="800" fill="'+hotCss+'" '
        +'style="transition:fill .8s ease">'+esc(big)+'</text>'
      +'<text x="100" y="126" text-anchor="middle" font-size="12" fill="var(--muted)">'+esc(sub)+'</text>'

  function renderBMI(h,w){
    if(!h||!w||h<=0||w<=0) return '<div class="empty">'+esc(I18N.t("bmi.needHeight"))+'</div>';
    var b = DOMAIN.bmi(w,h);
    var cat = DOMAIN.bmiCategory(b);
    var range = DOMAIN.healthyWeightRange(h);
    // gauge maps BMI 15..40 -> 0..100%
    var lo=15, hi=40;
    var pct = Math.max(0, Math.min(100, (b-lo)/(hi-lo)*100));
    // segment widths across 15..40: under(15-18.5),normal(18.5-25),over(25-30),ob1(30-35),ob2/3(35-40)
    function segW(a,bnd){ return (bnd-a)/(hi-lo)*100; }
    var segs=[
      {w:segW(15,18.5),c:"#0284c7"},
      {w:segW(18.5,25),c:"#16a34a"},
      {w:segW(25,30),c:"#f59e0b"},
      {w:segW(30,35),c:"#f97316"},
      {w:segW(35,40),c:"#dc2626"}
    ];
    var segHtml = segs.map(function(x){ return '<div class="seg" style="width:'+x.w+'%;background:'+x.c+'"></div>'; }).join("");
    var html=''
    +'<div class="stats" style="margin-bottom:14px">'
    +'<div class="stat"><span class="k">'+esc(I18N.t("bmi.your"))+'</span><span class="v" style="color:'+cat.color+'">'+fmtNum(b,1)+'</span></div>'
    +'<div class="stat"><span class="k">'+esc(I18N.t("bmi.category"))+'</span><span class="v" style="font-size:16px;color:'+cat.color+'">'+esc(I18N.t(cat.key))+'</span></div>'
    +'</div>'
    +'<div class="gauge">'
    +'<div class="track">'+segHtml
    +'<div class="marker" style="left:'+pct.toFixed(1)+'%"><div class="bubble">'+fmtNum(b,1)+'</div><div class="tri"></div></div>'
    +'</div>'
    +'<div class="ticks"><span>15</span><span>18.5</span><span>25</span><span>30</span><span>35</span><span>40</span></div>'
    +'<div class="labels"><span>'+esc(I18N.t("bmi.cat.under"))+'</span><span>'+esc(I18N.t("bmi.cat.normal"))+'</span><span>'+esc(I18N.t("bmi.cat.over"))+'</span><span>'+esc(I18N.t("bmi.cat.ob1"))+'</span><span>'+esc(I18N.t("bmi.cat.ob2"))+'+</span></div>'
    +'</div>';
    if(range){
      html+='<div class="note" style="margin-top:14px">'+esc(I18N.t("bmi.healthyRange"))+': <b>'+fmtNum(range.min,1)+'–'+fmtNum(range.max,1)+' kg</b></div>';
    }
    return html;
  }

  /* ============ DIARY (daily symptom log + editable metric registry) ============ */
  function metricMax(type){ return type==="scale10"?10:(type==="scale5"?5:null); }
  function starterMetrics(){
    return [
      {name:"Ból łokcia", type:"scale10"},
      {name:"Zapalenie oczu", type:"scale5"},
      {name:"Rumień (różowate)", type:"scale5"},
      {name:"Mieszki włosowe", type:"scale5"},
      {name:"Brain fog", type:"scale10"},
      {name:"Przebodźcowanie", type:"scale10"},
      {name:"Niepokój / kołatanie", type:"scale10"},
      {name:"Napęd (baseline)", type:"scale10"}
    ];
  }
  function dailyEntryFor(st, dISO){
    for(var i=0;i<st.dailyLog.length;i++){ if(st.dailyLog[i].date===dISO) return st.dailyLog[i]; }
    return null;
  }
  function viewDiary(){
    var st=s(), today=todayISO();
    var entry=dailyEntryFor(st, today), vals=(entry&&entry.values)||{};
    var daily=st.metrics.filter(function(m){ return m.daily && !m.archived; });

    var html='<h1 class="page">'+esc(I18N.t("diary.title"))+'</h1>';

    // --- daily ratings ---
    html+='<div class="card"><p class="sub">'+esc(I18N.t("diary.sub"))+'</p>';
    if(!daily.length){
      html+='<div class="empty">'+esc(I18N.t("diary.noDaily"))+'</div>';
    } else {
      daily.forEach(function(m){
        var v=vals[m.id];
        if(m.type==="bool"){
          html+='<div class="slider"><div class="slhead"><span>'+esc(m.name)+'</span></div>'
            +'<label class="toggle"><input type="checkbox" class="dInput" data-m="'+m.id+'" data-t="bool"'+(v?" checked":"")+'><span class="switch"></span></label></div>';
        } else if(m.type==="number"){
          html+='<div class="slider"><div class="slhead"><span>'+esc(m.name)+'</span></div>'
            +'<input type="number" inputmode="decimal" class="dInput" data-m="'+m.id+'" data-t="number" value="'+(v!=null?v:"")+'"></div>';
        } else {
          var mx=metricMax(m.type), cur=(v!=null?v:0);
          html+='<div class="slider"><div class="slhead"><span>'+esc(m.name)+'</span><span class="slval" id="slv-'+m.id+'">'+cur+'</span></div>'
            +'<input type="range" class="dInput" data-m="'+m.id+'" data-t="'+m.type+'" min="0" max="'+mx+'" step="1" value="'+cur+'"></div>';
        }
      });
      html+='<div class="field" style="margin-top:10px"><label>'+esc(I18N.t("diary.note"))+' <span class="muted tiny">('+esc(I18N.t("common.optional"))+')</span></label><input type="text" id="dNote" maxlength="120" value="'+esc((entry&&entry.note)||"")+'"></div>';
      html+='<div class="row"><button class="btn" id="dSave">'+esc(I18N.t("diary.save"))+'</button>';
      if(entry) html+='<span class="pill" style="background:var(--soft);color:var(--muted)">'+esc(I18N.t("diary.todayDone"))+'</span>';
      html+='</div>';
    }
    html+='<div class="note" style="margin-top:12px"><a href="#bp" style="color:var(--brand);font-weight:700;text-decoration:none">'+esc(I18N.t("diary.bpLink"))+'</a></div>';
    html+='</div>';

    // --- metric registry ---
    function metricRowHTML(m, isArch){
      var typeLbl=I18N.t("metric.type."+m.type);
      return '<div class="metricrow'+(isArch?" arch":"")+'">'
        +'<span class="mname"><b>'+esc(m.name)+'</b> <span class="muted tiny">'+esc(typeLbl)+(m.daily?" · "+esc(I18N.t("metric.daily")):"")+'</span></span>'
        +'<button class="btn ghost sm mRen" data-id="'+m.id+'">'+esc(I18N.t("metric.rename"))+'</button>'
        +'<button class="btn ghost sm mArch" data-id="'+m.id+'">'+esc(isArch?I18N.t("metric.restore"):I18N.t("metric.archive"))+'</button>'
        +'</div>';
    }
    html+='<div class="card"><h2>'+esc(I18N.t("metric.section"))+'</h2><p class="sub">'+esc(I18N.t("metric.sub"))+'</p>';
    var active=st.metrics.filter(function(m){ return !m.archived; });
    var archived=st.metrics.filter(function(m){ return m.archived; });
    if(!st.metrics.length) html+='<div class="empty">'+esc(I18N.t("metric.empty"))+'</div>';
    active.forEach(function(m){ html+=metricRowHTML(m,false); });
    if(archived.length){
      html+='<div class="tsub" style="margin-top:10px">'+esc(I18N.t("metric.archived"))+'</div>';
      archived.forEach(function(m){ html+=metricRowHTML(m,true); });
    }
    html+='<div class="grid g3" style="margin-top:12px">'
      +'<div class="field"><label>'+esc(I18N.t("metric.name"))+'</label><input type="text" id="mNewName" maxlength="40" placeholder="'+esc(I18N.t("metric.namePh"))+'"></div>'
      +'<div class="field"><label>'+esc(I18N.t("metric.type"))+'</label><select id="mNewType">'
        +'<option value="scale10">'+esc(I18N.t("metric.type.scale10"))+'</option>'
        +'<option value="scale5">'+esc(I18N.t("metric.type.scale5"))+'</option>'
        +'<option value="number">'+esc(I18N.t("metric.type.number"))+'</option>'
        +'<option value="bool">'+esc(I18N.t("metric.type.bool"))+'</option>'
      +'</select></div>'
      +'<div class="field"><label>'+esc(I18N.t("metric.daily"))+'</label><label class="toggle" style="margin-top:6px"><input type="checkbox" id="mNewDaily" checked><span class="switch"></span></label></div>'
      +'</div>'
      +'<div class="row"><button class="btn" id="mAdd">'+esc(I18N.t("metric.add"))+'</button>'
      +'<button class="btn ghost" id="mSeed">'+esc(I18N.t("metric.seed"))+'</button></div>';
    html+='</div>';

    app.innerHTML=html;

    $all("input.dInput[type=range]").forEach(function(r){
      r.addEventListener("input",function(){ var l=$("#slv-"+r.getAttribute("data-m")); if(l) l.textContent=r.value; });
    });
    if($("#dSave")) $("#dSave").addEventListener("click",function(){
      var values={};
      $all(".dInput").forEach(function(inp){
        var id=inp.getAttribute("data-m"), t=inp.getAttribute("data-t");
        if(t==="bool"){ values[id]=inp.checked?1:0; }
        else if(inp.value!==""){ var n=parseFloat(inp.value); if(!isNaN(n)) values[id]=n; }
      });
      var note=($("#dNote")?$("#dNote").value:"").trim(), e=dailyEntryFor(st, today);
      if(e){ e.values=values; e.note=note; }
      else { st.dailyLog.push({ id:uid(), date:today, values:values, note:note }); }
      st.dailyLog.sort(function(a,b){ return a.date<b.date?1:a.date>b.date?-1:0; });
      STORE.save(); toast(I18N.t("common.saved")); viewDiary();
    });
    $("#mAdd").addEventListener("click",function(){
      var name=($("#mNewName").value||"").trim(); if(!name){ $("#mNewName").focus(); return; }
      st.metrics.push({ id:uid(), name:name, type:$("#mNewType").value, daily:$("#mNewDaily").checked, archived:false });
      STORE.save(); viewDiary();
    });
    $("#mSeed").addEventListener("click",function(){
      var have={}; st.metrics.forEach(function(m){ have[m.name.toLowerCase()]=true; });
      starterMetrics().forEach(function(sm){
        if(!have[sm.name.toLowerCase()]) st.metrics.push({ id:uid(), name:sm.name, type:sm.type, daily:true, archived:false });
      });
      STORE.save(); toast(I18N.t("common.saved")); viewDiary();
    });
    $all(".mArch").forEach(function(b){ b.addEventListener("click",function(){
      var id=b.getAttribute("data-id");
      st.metrics.forEach(function(m){ if(m.id===id) m.archived=!m.archived; });
      STORE.save(); viewDiary();
    });});
    $all(".mRen").forEach(function(b){ b.addEventListener("click",function(){
      var id=b.getAttribute("data-id"), m=null;
      st.metrics.forEach(function(x){ if(x.id===id) m=x; });
      if(!m) return;
      var nn=prompt(I18N.t("metric.rename"), m.name); if(nn==null) return; nn=nn.trim();
      if(nn){ m.name=nn; STORE.save(); viewDiary(); }
    });});
  }

  /* ============ INJECTIONS (Mounjaro / TRT / peptides) + body map ============ */
  // Subcutaneous, abdomen-centric site map (arms deferred). Coords on a 0 0 200 250 viewBox.
  var INJ_SITES=[
    {id:"belly_ul", x:88,  y:112},
    {id:"belly_ur", x:112, y:112},
    {id:"belly_ll", x:88,  y:137},
    {id:"belly_lr", x:112, y:137},
    {id:"love_l1",  x:62,  y:110},
    {id:"love_l2",  x:62,  y:134},
    {id:"love_r1",  x:138, y:110},
    {id:"love_r2",  x:138, y:134},
    {id:"thigh_l",  x:86,  y:206},
    {id:"thigh_r",  x:114, y:206}
  ];
  var SITE_IDS=INJ_SITES.map(function(s){return s.id;});
  var SUBSTANCE_COLORS={ mounjaro:"#0ea5a4", trt:"#6366f1", peptide:"#f59e0b" };

  // Most recent injection (any substance) per site, for colouring + recency fade.
  function lastUseBySite(injLog){
    var by={};
    (injLog||[]).forEach(function(e){
      if(e && e.site){ if(!by[e.site] || e.date>by[e.site].date) by[e.site]={date:e.date, substance:e.substance}; }
    });
    return by;
  }
  function bodyMapSVG(st, selSite){
    var injLog=st.injLog||[], by=lastUseBySite(injLog);
    var suggested=DOMAIN.suggestSite(injLog, SITE_IDS);
    var today=todayISO();
    var svg='<svg class="bodymap" viewBox="0 0 200 250" role="img" aria-label="injection sites">';
    // silhouette
    svg+='<g fill="var(--soft)" stroke="var(--line)" stroke-width="1.6" stroke-linejoin="round">'
      +'<circle cx="100" cy="26" r="15"/>'
      +'<path d="M68 46 Q100 38 132 46 L150 92 L140 100 L142 158 Q100 170 58 158 L60 100 L50 92 Z"/>'
      +'<path d="M62 160 L58 240 L88 240 L96 165 Z"/>'
      +'<path d="M138 160 L142 240 L112 240 L104 165 Z"/>'
      +'</g>';
    // sites
    INJ_SITES.forEach(function(s){
      var u=by[s.id], isSel=(selSite===s.id), isSug=(!selSite && s.id===suggested);
      var fill="#cbd5e1", op=1;
      if(u){ fill=SUBSTANCE_COLORS[u.substance]||"#94a3b8";
             var age=Math.max(0, daysBetweenISO(u.date, today));
             op=Math.max(0.35, 1-age/30); }
      svg+='<g class="site" data-site="'+s.id+'">';
      if(isSel) svg+='<circle cx="'+s.x+'" cy="'+s.y+'" r="13" fill="none" stroke="var(--brand)" stroke-width="3"/>';
      else if(isSug) svg+='<circle cx="'+s.x+'" cy="'+s.y+'" r="13" fill="none" stroke="var(--brand)" stroke-width="2" stroke-dasharray="3 3"/>';
      svg+='<circle cx="'+s.x+'" cy="'+s.y+'" r="8.5" fill="'+fill+'" fill-opacity="'+op.toFixed(2)+'" stroke="#fff" stroke-width="1.5"/>';
      svg+='<title>'+esc(I18N.t("site."+s.id))+(u?" · "+u.date:"")+'</title></g>';
    });
    svg+='</svg>';
    var leg='<div class="maplegend">'
      +'<span><i style="background:'+SUBSTANCE_COLORS.mounjaro+'"></i>Mounjaro</span>'
      +'<span><i style="background:'+SUBSTANCE_COLORS.trt+'"></i>TRT</span>'
      +'<span><i style="background:'+SUBSTANCE_COLORS.peptide+'"></i>'+esc(I18N.t("inj.seg.peptide"))+'</span></div>';
    return svg+leg;
  }
  function progressBar(frac, color, leftLabel, rightLabel){
    frac=Math.max(0,Math.min(1,frac||0));
    return '<div class="pbwrap"><div class="pbar"><span style="width:'+(frac*100).toFixed(1)+'%;background:'+color+'"></span></div>'
      +'<div class="pblabels"><span>'+esc(leftLabel||"")+'</span><span>'+esc(rightLabel||"")+'</span></div></div>';
  }
  function lastInjDate(st, substance){
    var d=null;
    (st.injLog||[]).forEach(function(e){ if(e.substance===substance && (!d || e.date>d)) d=e.date; });
    return d;
  }

  var injSeg="mounjaro", injSel=null;  // selected site (null => use suggested)
  function viewInject(){
    var st=s(), today=todayISO();
    if(["mounjaro","trt","peptide"].indexOf(injSeg)<0) injSeg="mounjaro";
    var color=SUBSTANCE_COLORS[injSeg];

    var html='<h1 class="page">'+esc(I18N.t("inj.title"))+'</h1>';
    html+='<div class="seg" data-seg>'
      +['mounjaro','trt','peptide'].map(function(k){
          return '<button type="button" data-k="'+k+'" class="'+(injSeg===k?"on":"")+'">'+esc(I18N.t("inj.seg."+k))+'</button>';
        }).join("")
      +'</div>';

    html+='<div class="card">';

    // ---- rhythm widget per substance ----
    if(injSeg==="mounjaro"){
      var hist=(st.jab.history||[]).slice().sort(), last=hist.length?hist[hist.length-1]:null;
      var every=Math.max(1, st.calc.intervalDays||7);
      if(last){
        var elapsed=daysBetweenISO(last,today), remaining=every-elapsed, frac=Math.max(0,Math.min(1,elapsed/every));
        var big, sub;
        if(remaining>0){ big=String(remaining); sub=I18N.t("jab.daysLeft"); }
        else if(remaining===0){ big="0"; sub=I18N.t("jab.dueToday"); frac=1; }
        else { big=String(remaining); sub=Math.abs(remaining)+" "+I18N.t("inj.daysShort")+" "+I18N.t("inj.overdue"); frac=1; }
        html+=ringSVG(frac, big, sub);
      } else {
        html+='<div class="empty">'+esc(I18N.t("jab.firstHint"))+'</div>';
      }
      html+='<div class="field" style="max-width:220px;margin:8px auto 0"><label>'+esc(I18N.t("inj.intervalSet"))+'</label><input type="number" inputmode="numeric" id="mjEvery" min="1" value="'+every+'"></div>';
    } else if(injSeg==="trt"){
      var iv=Math.max(1, st.inj.trt.intervalDays||3), lt=lastInjDate(st,"trt");
      var ip=DOMAIN.intervalProgress(lt, iv, today);
      if(ip){
        var rl=ip.remaining>0?(I18N.t("inj.nextIn")+" "+ip.remaining+" "+I18N.t("inj.daysShort")):(ip.remaining===0?I18N.t("inj.due"):Math.abs(ip.remaining)+" "+I18N.t("inj.daysShort")+" "+I18N.t("inj.overdue"));
        html+=progressBar(ip.frac, color, lt, rl);
      } else { html+='<div class="empty">'+esc(I18N.t("inj.empty"))+'</div>'; }
      html+='<div class="field" style="max-width:220px"><label>'+esc(I18N.t("inj.intervalSet"))+'</label><input type="number" inputmode="numeric" id="trtEvery" min="1" value="'+iv+'"></div>';
    } else {
      var cfg=st.inj.peptide, cp=DOMAIN.cycleProgress(cfg, today);
      if(cp){
        html+=progressBar(cp.frac, color, I18N.t("inj.cycleDay")+" "+cp.dayN+"/"+cp.total, (cp.total-cp.dayN)+" "+I18N.t("inj.daysShort"));
      } else { html+='<div class="note">'+esc(I18N.t("inj.cycleNone"))+'</div>'; }
      html+='<div class="grid g2">'
        +'<div class="field"><label>'+esc(I18N.t("inj.cycleLen"))+'</label><input type="number" inputmode="numeric" id="pepLen" min="1" value="'+(cfg.cycleDays||56)+'"></div>'
        +'<div class="field"><label>'+esc(I18N.t("inj.cycleStart"))+'</label><input type="date" id="pepStart" value="'+(cfg.cycleStart||"")+'"></div>'
        +'</div>';
    }

    // ---- dose + body map + log ----
    var unit=(injSeg==="peptide")?I18N.t("inj.unitsUnit"):I18N.t("inj.mgUnit");
    var dosePh=(injSeg==="mounjaro"&&st.calc.strengthMg!=null)?st.calc.strengthMg:(injSeg==="peptide"?"10":"");
    html+='<div class="field"><label>'+esc(I18N.t("inj.dose"))+' ('+esc(unit)+') <span class="muted tiny">('+esc(I18N.t("common.optional"))+')</span></label>'
      +'<input type="number" inputmode="decimal" step="0.1" id="injDose" placeholder="'+esc(String(dosePh))+'"></div>';
    var selForMap = injSel;
    html+='<p class="sub" style="margin-bottom:0">'+esc(I18N.t("inj.pickSite"))+'</p>';
    html+=bodyMapSVG(st, selForMap);
    var shownSite = injSel || DOMAIN.suggestSite(st.injLog, SITE_IDS);
    html+='<div class="center small muted">'+esc(I18N.t("inj.selected"))+': <b style="color:var(--ink)">'+esc(I18N.t("site."+shownSite))+'</b>'
      +(!injSel?' <span class="muted tiny">('+esc(I18N.t("inj.suggested"))+')</span>':'')+'</div>';
    html+='<button class="btn" id="injLog" style="margin-top:10px">'+esc(I18N.t("inj.logBtn"))+'</button>';
    html+='</div>';

    // ---- history for this substance ----
    var hlist=(st.injLog||[]).filter(function(e){return e.substance===injSeg;})
                 .slice().sort(function(a,b){return a.date<b.date?1:a.date>b.date?-1:0;});
    if(hlist.length){
      html+='<div class="card"><h2>'+esc(I18N.t("inj.history"))+'</h2><div class="scroll"><table><tbody>';
      hlist.forEach(function(e){
        html+='<tr><td>'+esc(e.date)+'</td><td>'+esc(I18N.t("site."+e.site))+'</td>'
          +'<td class="num">'+(e.dose!=null?esc(e.dose+" "+(e.unit||"")):"—")+'</td>'
          +'<td class="num"><button class="btn ghost sm injDel" data-id="'+esc(e.id)+'">✕</button></td></tr>';
      });
      html+='</tbody></table></div></div>';
    }

    app.innerHTML=html;

    // segment switch
    $all('[data-seg] button').forEach(function(b){ b.addEventListener("click",function(){
      injSeg=b.getAttribute("data-k"); injSel=null; viewInject();
    });});
    // site pick
    $all(".site").forEach(function(g){ g.addEventListener("click",function(){
      injSel=g.getAttribute("data-site"); viewInject();
    });});
    // config inputs
    if($("#mjEvery")) $("#mjEvery").addEventListener("change",function(){ st.calc.intervalDays=Math.max(1,parseInt(this.value,10)||7); STORE.save(); viewInject(); });
    if($("#trtEvery")) $("#trtEvery").addEventListener("change",function(){ st.inj.trt.intervalDays=Math.max(1,parseInt(this.value,10)||3); STORE.save(); viewInject(); });
    if($("#pepLen")) $("#pepLen").addEventListener("change",function(){ st.inj.peptide.cycleDays=Math.max(1,parseInt(this.value,10)||56); STORE.save(); viewInject(); });
    if($("#pepStart")) $("#pepStart").addEventListener("change",function(){ st.inj.peptide.cycleStart=this.value||null; STORE.save(); viewInject(); });
    // log
    $("#injLog").addEventListener("click",function(){
      var site=injSel || DOMAIN.suggestSite(st.injLog, SITE_IDS);
      var dv=$("#injDose").value, dose=dv===""?null:parseFloat(dv);
      var unitCode=(injSeg==="peptide")?"j":"mg";
      st.injLog.push({ id:uid(), date:today, substance:injSeg, dose:(dose==null||isNaN(dose))?null:dose, unit:unitCode, site:site });
      st.injLog.sort(function(a,b){return a.date<b.date?1:a.date>b.date?-1:0;});
      // Mounjaro: also feed the existing weekly ring source of truth.
      if(injSeg==="mounjaro" && st.jab.history.indexOf(today)===-1){ st.jab.history.push(today); st.jab.history.sort(); }
      injSel=null;
      STORE.save(); toast(I18N.t("common.saved")); viewInject();
    });
    $all(".injDel").forEach(function(b){ b.addEventListener("click",function(){
      if(!confirm(I18N.t("inj.confirmDel"))) return;
      var id=b.getAttribute("data-id");
      st.injLog=st.injLog.filter(function(e){return e.id!==id;});
      STORE.save(); viewInject();
    });});
  }

  /* ============ DASHBOARD (Pulpit) ============ */
  function rhythmRow(label, color, frac, right){
    return '<div style="margin-bottom:10px"><div class="slhead" style="display:flex;justify-content:space-between;font-size:14px;font-weight:700"><span>'+esc(label)+'</span><span class="muted tiny">'+esc(right||"")+'</span></div>'
      + progressBar(frac, color, "", "");
  }
  function viewDash(){
    var st=s(), today=todayISO();
    var html='<h1 class="page">'+esc(I18N.t("pulpit.title"))+'</h1>';

    // --- rhythm widgets ---
    html+='<div class="card"><h2>'+esc(I18N.t("pulpit.rhythm"))+'</h2>';
    // Mounjaro
    var hist=(st.jab.history||[]).slice().sort(), last=hist.length?hist[hist.length-1]:null, every=Math.max(1,st.calc.intervalDays||7);
    if(last){
      var el=daysBetweenISO(last,today), rem=every-el, frac=Math.max(0,Math.min(1,el/every));
      var r=rem>0?(I18N.t("inj.nextIn")+" "+rem+" "+I18N.t("inj.daysShort")):(rem===0?I18N.t("inj.due"):Math.abs(rem)+" "+I18N.t("inj.daysShort")+" "+I18N.t("inj.overdue"));
      html+=rhythmRow("Mounjaro", SUBSTANCE_COLORS.mounjaro, rem<=0?1:frac, r);
    } else { html+=rhythmRow("Mounjaro", SUBSTANCE_COLORS.mounjaro, 0, I18N.t("pulpit.todo")); }
    // TRT
    var ltrt=lastInjDate(st,"trt"), ip=DOMAIN.intervalProgress(ltrt, st.inj.trt.intervalDays, today);
    if(ip){ var rt=ip.remaining>0?(I18N.t("inj.nextIn")+" "+ip.remaining+" "+I18N.t("inj.daysShort")):(ip.remaining===0?I18N.t("inj.due"):Math.abs(ip.remaining)+" "+I18N.t("inj.daysShort")+" "+I18N.t("inj.overdue"));
      html+=rhythmRow("TRT", SUBSTANCE_COLORS.trt, ip.frac, rt); }
    else { html+=rhythmRow("TRT", SUBSTANCE_COLORS.trt, 0, I18N.t("pulpit.todo")); }
    // Peptide cycle
    var cp=DOMAIN.cycleProgress(st.inj.peptide, today);
    if(cp){ html+=rhythmRow(I18N.t("inj.seg.peptide"), SUBSTANCE_COLORS.peptide, cp.frac, I18N.t("inj.cycleDay")+" "+cp.dayN+"/"+cp.total); }
    else { html+=rhythmRow(I18N.t("inj.seg.peptide"), SUBSTANCE_COLORS.peptide, 0, I18N.t("inj.cycleNone")); }
    html+='</div>';

    // --- today status ---
    var diaryDone=(st.dailyLog||[]).some(function(e){return e.date===today;});
    var pepDone=(st.injLog||[]).some(function(e){return e.substance==="peptide" && e.date===today;});
    function chip(ok){ return '<span class="pill" style="background:'+(ok?"rgba(22,163,74,.12)":"var(--soft)")+';color:'+(ok?"#16a34a":"var(--muted)")+'">'+esc(ok?I18N.t("pulpit.done"):I18N.t("pulpit.todo"))+'</span>'; }
    html+='<div class="card"><h2>'+esc(I18N.t("pulpit.today"))+'</h2><div class="stats">'
      +'<div class="stat"><span class="k">'+esc(I18N.t("pulpit.diary"))+'</span><span class="v" style="font-size:15px">'+chip(diaryDone)+'</span></div>'
      +'<div class="stat"><span class="k">'+esc(I18N.t("pulpit.peptide"))+'</span><span class="v" style="font-size:15px">'+chip(pepDone)+'</span></div>'
      +'</div></div>';

    // --- latest readings: BP, weight + delta, BMI ---
    html+='<div class="card"><h2>'+esc(I18N.t("pulpit.latest"))+'</h2><div class="stats">';
    var bpL=(st.bp&&st.bp.log&&st.bp.log.length)?st.bp.log[0]:null;
    html+='<div class="stat"><span class="k">'+esc(I18N.t("pulpit.bp"))+'</span><span class="v">'+(bpL?esc(bpL.sys+"/"+bpL.dia+(bpL.pulse!=null?" · "+bpL.pulse:"")):I18N.t("pulpit.noData"))+'</span></div>';
    var wl=st.weightLog||[], curW=wl.length?wl[0].weightKg:null;
    var wtxt=curW!=null?fmtNum(curW,1)+" kg":I18N.t("pulpit.noData"), wcol="var(--ink)";
    if(wl.length>1){ var first=wl[wl.length-1].weightKg, d=curW-first; wcol=d<=0?"var(--good)":"var(--bad)"; wtxt+=" ("+(d>0?"+":"")+fmtNum(d,1)+")"; }
    html+='<div class="stat"><span class="k">'+esc(I18N.t("pulpit.weight"))+'</span><span class="v" style="color:'+wcol+';font-size:18px">'+wtxt+'</span></div>';
    var bmiV=DOMAIN.bmi(curW, st.profile.heightCm);
    if(bmiV){ var cat=DOMAIN.bmiCategory(bmiV);
      html+='<div class="stat"><span class="k">'+esc(I18N.t("pulpit.bmi"))+'</span><span class="v" style="color:'+cat.color+'">'+fmtNum(bmiV,1)+'</span></div>'; }
    else { html+='<div class="stat"><span class="k">'+esc(I18N.t("pulpit.bmi"))+'</span><span class="v" style="font-size:13px" class="muted">'+esc(I18N.t("pulpit.bmiNeed"))+'</span></div>'; }
    html+='</div></div>';

    // --- mini body map (link to injections) ---
    if((st.injLog||[]).length){
      html+='<div class="card"><a href="#inject" style="text-decoration:none;color:var(--brand);font-weight:700;font-size:13px">'+esc(I18N.t("pulpit.mapHint"))+'</a>'
        +'<div style="pointer-events:none">'+bodyMapSVG(st, null)+'</div></div>';
    }

    // --- quick actions ---
    html+='<div class="card"><h2>'+esc(I18N.t("pulpit.actions"))+'</h2><div class="row">'
      +'<a class="btn" href="#inject">💉 '+esc(I18N.t("pulpit.goInject"))+'</a>'
      +'<a class="btn ghost" href="#diary">📝 '+esc(I18N.t("pulpit.goDiary"))+'</a>'
      +'<a class="btn ghost" href="#bp">🩸 '+esc(I18N.t("pulpit.goBp"))+'</a>'
      +'<a class="btn ghost" href="#weight">⚖️ '+esc(I18N.t("pulpit.goWeight"))+'</a>'
      +'<a class="btn ghost" href="#correlate">📈 '+esc(I18N.t("pulpit.goCorr"))+'</a>'
      +'</div></div>';

    app.innerHTML=html;
  }

  /* ============ CORRELATIONS ============ */
  function seriesOptions(st){
    var opts=[];
    (st.metrics||[]).filter(function(m){return !m.archived;}).forEach(function(m){
      opts.push({ id:"metric:"+m.id, label:m.name });
    });
    ["mounjaro","trt","peptide"].forEach(function(k){
      if((st.injLog||[]).some(function(e){return e.substance===k && e.dose!=null;}))
        opts.push({ id:"inj:"+k, label:I18N.t("inj.seg."+k)+" "+I18N.t("corr.injDose") });
    });
    if((st.bp&&st.bp.log&&st.bp.log.length)){
      opts.push({ id:"vital:sys", label:I18N.t("corr.vital.sys") });
      opts.push({ id:"vital:dia", label:I18N.t("corr.vital.dia") });
      if(st.bp.log.some(function(e){return e.pulse!=null;})) opts.push({ id:"vital:pulse", label:I18N.t("corr.vital.pulse") });
    }
    if((st.weightLog||[]).length){
      opts.push({ id:"weight", label:I18N.t("corr.weight") });
      if(st.weightLog.some(function(e){return e.doseMg!=null;})) opts.push({ id:"mounjaroDose", label:I18N.t("corr.mjDose") });
    }
    return opts;
  }
  var corrA=null, corrB=null;
  function viewCorrelate(){
    var st=s(), opts=seriesOptions(st);
    var html='<h1 class="page">'+esc(I18N.t("corr.title"))+'</h1><div class="card"><p class="sub">'+esc(I18N.t("corr.sub"))+'</p>';
    if(opts.length<1){ html+='<div class="empty">'+esc(I18N.t("corr.noSeries"))+'</div></div>'; app.innerHTML=html; return; }
    var ids=opts.map(function(o){return o.id;});
    if(ids.indexOf(corrA)<0) corrA=ids[0];
    if(ids.indexOf(corrB)<0) corrB=ids[Math.min(1,ids.length-1)];
    function sel(id, cur){
      return '<select id="'+id+'">'+opts.map(function(o){
        return '<option value="'+esc(o.id)+'"'+(o.id===cur?" selected":"")+'>'+esc(o.label)+'</option>';
      }).join("")+'</select>';
    }
    html+='<div class="grid g2">'
      +'<div class="field"><label>'+esc(I18N.t("corr.seriesA"))+'</label>'+sel("corrSelA",corrA)+'</div>'
      +'<div class="field"><label>'+esc(I18N.t("corr.seriesB"))+'</label>'+sel("corrSelB",corrB)+'</div>'
      +'</div>';
    var labA=(opts.filter(function(o){return o.id===corrA;})[0]||{}).label||"";
    var labB=(opts.filter(function(o){return o.id===corrB;})[0]||{}).label||"";
    html+='<div id="chartHolder">'+CHART.renderDual(DOMAIN.seriesFor(st,corrA), DOMAIN.seriesFor(st,corrB), labA, labB, "#0ea5a4", "#6366f1")+'</div>';
    html+='</div>';
    app.innerHTML=html;
    $("#corrSelA").addEventListener("change",function(){ corrA=this.value; viewCorrelate(); });
    $("#corrSelB").addEventListener("change",function(){ corrB=this.value; viewCorrelate(); });
  }

    function progMethodHTML(){

          +'<input type="number" inputmode="decimal" step="0.05" id="oProgStepCustom" value="'+(onChip?"":pg.step)+'" placeholder="'+esc(I18N.t("prog.custom"))+'" style="margin-top:6px">'

        +'</div>';
