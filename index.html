<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0ea5a4">
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" href="icon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="icon.svg">
<title>Mounjaro Tracker</title>
<style>
  :root{
    --bg:#f3f5f7; --card:#ffffff; --soft:#f6f8fa; --input:#ffffff;
    --headbg:rgba(243,245,247,.92);
    --ink:#0f172a; --muted:#64748b; --line:#e2e8f0;
    --brand:#0ea5a4; --brand-dk:#0b827f; --accent:#6366f1;
    --good:#16a34a; --warn:#f59e0b; --bad:#dc2626; --info:#0284c7;
    --warnbg:#fff7ed; --warnline:#fed7aa; --warnink:#9a3412;
    --radius:16px; --shadow:0 1px 3px rgba(15,23,42,.08),0 8px 24px rgba(15,23,42,.05);
  }
  :root[data-theme="dark"]{
    --bg:#0b1220; --card:#16202e; --soft:#1c2838; --input:#1c2838;
    --headbg:rgba(11,18,32,.92);
    --ink:#e8eef5; --muted:#94a3b8; --line:#2b3a4d;
    --brand:#14b8b6; --brand-dk:#5eead4;
    --warnbg:#3a2a14; --warnline:#7c5418; --warnink:#fbbf24;
    --shadow:0 1px 3px rgba(0,0,0,.4),0 8px 24px rgba(0,0,0,.3);
  }
  html{transition:background .2s,color .2s}
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background:var(--bg); color:var(--ink); line-height:1.5;
    -webkit-text-size-adjust:100%; padding-bottom:84px;
  }
  a{color:var(--brand-dk)}
  .wrap{max-width:760px;margin:0 auto;padding:16px}
  header.app{
    position:sticky;top:0;z-index:20;background:var(--headbg);backdrop-filter:blur(8px);
    border-bottom:1px solid var(--line);
  }
  .head-inner{max-width:760px;margin:0 auto;padding:12px 16px;display:flex;align-items:center;gap:10px}
  .logo{display:flex;align-items:center;gap:8px;font-weight:800;font-size:18px;white-space:nowrap}
  #installBtn{padding:7px 10px;font-size:13px;white-space:nowrap;flex-shrink:0}
  @media(max-width:430px){ .head-inner{gap:7px} .logo{font-size:15px} .logo .dot{width:11px;height:11px} }
  .logo .dot{width:14px;height:14px;border-radius:50%;background:var(--brand);box-shadow:0 0 0 4px rgba(14,165,164,.18)}
  .spacer{flex:1}
  .iconbtn{border:1px solid var(--line);background:var(--card);color:var(--ink);width:38px;height:34px;border-radius:999px;cursor:pointer;font-size:16px;line-height:1}
  .lang{display:flex;border:1px solid var(--line);border-radius:999px;overflow:hidden;background:var(--card)}
  .lang button{border:0;background:transparent;padding:6px 12px;font-weight:700;color:var(--muted);cursor:pointer;font-size:13px}
  .lang button.on{background:var(--brand);color:#fff}

  .card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);padding:18px;margin:0 0 16px}
  .card h2{margin:0 0 4px;font-size:17px}
  .card .sub{margin:0 0 14px;color:var(--muted);font-size:13px}
  h1.page{font-size:22px;margin:4px 0 14px}

  label{display:block;font-size:13px;font-weight:600;color:var(--muted);margin:0 0 6px}
  input,select,textarea{
    width:100%;padding:11px 12px;border:1px solid var(--line);border-radius:12px;font-size:16px;
    background:var(--input);color:var(--ink);font-family:inherit;
  }
  input:focus,select:focus,textarea:focus{outline:2px solid rgba(14,165,164,.35);border-color:var(--brand)}
  .grid{display:grid;gap:12px}
  .g2{grid-template-columns:1fr 1fr}
  .g3{grid-template-columns:1fr 1fr 1fr}
  @media(max-width:600px){.g2,.g3{grid-template-columns:1fr}}
  .field{margin:0 0 12px}

  /* tap-to-choose chips (pen strength) */
  .chips{display:grid;grid-template-columns:repeat(6,1fr);gap:8px;margin:0 0 12px}
  @media(max-width:560px){.chips{grid-template-columns:repeat(3,1fr)}}
  .chip{appearance:none;cursor:pointer;border:1px solid var(--line);background:var(--soft);
    border-radius:12px;padding:10px 4px;text-align:center;color:var(--ink);
    transition:border-color .15s,background .15s,box-shadow .15s}
  .chip .cv{display:block;font-weight:800;font-size:16px;line-height:1.1}
  .chip .cu{display:block;font-size:11px;color:var(--muted);margin-top:2px}
  .chip.on{border-color:var(--brand);background:rgba(14,165,164,.10);box-shadow:0 0 0 1px var(--brand) inset}

  /* compact price tiles (per-pen costs) */
  .pcgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
  @media(max-width:560px){.pcgrid{grid-template-columns:repeat(2,1fr)}}
  .pcitem{display:flex;flex-direction:column;gap:4px;background:var(--soft);border:1px solid var(--line);border-radius:10px;padding:8px}
  .pcitem label{margin:0;font-size:12px;font-weight:700;color:var(--ink);display:flex;justify-content:space-between;align-items:baseline;gap:6px}
  .pcitem input{padding:7px 8px;font-size:14px;border-radius:8px}
  /* segmented toggle */
  .seg{display:inline-flex;border:1px solid var(--line);border-radius:10px;overflow:hidden;background:var(--soft);margin:0 0 12px}
  .seg button{border:0;background:transparent;padding:8px 14px;font-weight:700;font-size:13px;color:var(--muted);cursor:pointer}
  .seg button.on{background:var(--brand);color:#fff}

  /* travel comparison: full-width cards on mobile, multi-column on desktop */
  .tgrid{display:grid;gap:10px;grid-template-columns:1fr;margin:0 0 8px}
  @media(min-width:620px){ .tgrid{grid-template-columns:repeat(3,1fr)} .tgrid.two{grid-template-columns:repeat(2,1fr)} }
  .tcard{background:var(--soft);border:1px solid var(--line);border-radius:12px;padding:14px}
  .tcard h3{margin:0 0 6px;font-size:14px}
  .tcard .ex{margin:0 0 10px;font-size:12.5px;color:var(--muted);line-height:1.45}
  .tcard .big{font-size:21px;font-weight:800;line-height:1.1}
  .tcard .big small{font-size:12px;font-weight:600;color:var(--muted)}
  .tcard .meta{margin-top:6px;font-size:12px;color:var(--muted);line-height:1.5}
  .tcard.verdict{border-width:1px}
  .tcard .vmsg{font-size:15px;font-weight:800;margin:0 0 8px}
  /* per shot / week / month figure row */
  .pers{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin:8px 0 4px}
  .pers.two{grid-template-columns:repeat(2,1fr)}
  .per{background:var(--card);border:1px solid var(--line);border-radius:9px;padding:7px 6px;text-align:center}
  .per b{display:block;font-size:14px;font-weight:800;line-height:1.15}
  .per span{display:block;font-size:10.5px;color:var(--muted);margin-top:2px}
  .tsub{font-size:13px;font-weight:700;color:var(--muted);margin:6px 0 8px}
  /* faded currency code after an amount */
  .cur{color:var(--muted);font-weight:600;font-size:.82em;opacity:.85}
  .row{display:flex;gap:10px;flex-wrap:wrap;align-items:center}

  .btn{
    border:0;border-radius:12px;padding:12px 16px;font-size:15px;font-weight:700;cursor:pointer;
    background:var(--brand);color:#fff;transition:filter .15s,transform .05s;
    display:inline-flex;align-items:center;justify-content:center;gap:7px;text-decoration:none;
  }
  .btn svg{width:18px;height:18px;flex-shrink:0}
  .btn:hover{filter:brightness(1.05)}
  .btn:active{transform:translateY(1px)}
  .btn.ghost{background:var(--soft);color:var(--ink);border:1px solid var(--line)}
  .btn.danger{background:#fee2e2;color:var(--bad)}
  .btn.sm{padding:8px 12px;font-size:13px}
  .btn.sm svg{width:15px;height:15px}
  /* Full/Half pattern toggles: fixed width so switching label never shifts layout */
  button.fracBtn{min-width:104px;text-align:center}

  .toggle{display:inline-flex;align-items:center;gap:8px;cursor:pointer;user-select:none}
  .switch{width:44px;height:26px;border-radius:999px;background:#cbd5e1;position:relative;transition:background .2s}
  .switch::after{content:"";position:absolute;top:3px;left:3px;width:20px;height:20px;border-radius:50%;background:#fff;transition:left .2s;box-shadow:0 1px 2px rgba(0,0,0,.2)}
  .toggle input{display:none}
  .toggle input:checked + .switch{background:var(--brand)}
  .toggle input:checked + .switch::after{left:21px}

  /* range sliders for the daily symptom diary */
  .slider{margin:10px 0 4px}
  .slider .slhead{display:flex;justify-content:space-between;align-items:baseline;gap:8px;font-size:14px;font-weight:700}
  .slider .slval{font-variant-numeric:tabular-nums;font-weight:800;color:var(--brand);min-width:2ch;text-align:right}
  .slider input[type=range]{width:100%;margin:6px 0 0;accent-color:var(--brand);height:26px}
  /* 1-tap wellbeing check-in dots */
  .staterow{display:flex;align-items:center;gap:10px;padding:6px 0}
  .staterow .sname{flex:1;font-size:14px;font-weight:700;display:flex;align-items:center;gap:6px}
  .staterow .sdots{display:flex;gap:8px}
  .sdot{width:30px;height:30px;border-radius:50%;border:2px solid transparent;cursor:pointer;padding:0;
    opacity:.5;transition:opacity .15s,transform .1s,box-shadow .15s}
  .sdot.on{opacity:1;box-shadow:0 0 0 3px var(--card),0 0 0 5px currentColor;transform:scale(1.08)}
  .sdot:active{transform:scale(.92)}
  .statepill{display:inline-flex;align-items:center;gap:3px;padding:2px 8px 2px 3px;border-radius:999px;font-size:12px;font-weight:800;color:#fff;margin-right:4px}
  .statepill .pemoji{display:inline-flex;align-items:center;justify-content:center;width:17px;height:17px;
    border-radius:50%;background:rgba(0,0,0,.32);font-size:11px;filter:drop-shadow(0 0 1px rgba(0,0,0,.7))}
  /* injection-day marker (syringe next to dates) */
  .injmark{display:inline-flex;vertical-align:-2px;margin-left:4px}
  .injmark svg{width:13px;height:13px}
  .daymarks{margin-top:1px;line-height:1}
  .daymarks .injmark{margin-left:0;margin-right:5px}
  /* journal day grouping: quiet uppercase date + compact context pills on one line */
  .dayhead{display:flex;gap:6px;align-items:center;flex-wrap:wrap;font-size:12px;font-weight:800;
    text-transform:uppercase;letter-spacing:.04em;color:var(--muted);
    margin:16px 0 2px;padding-bottom:5px;border-bottom:1px solid var(--line)}
  .dayhead:first-child{margin-top:2px}
  .dayhead .pill{padding:2px 7px;font-size:10.5px;text-transform:none;letter-spacing:0}
  .dayhead .injmark svg{width:12px;height:12px}

  /* free-text journal entries (log style) */
  .logentry{display:flex;gap:10px;align-items:flex-start;padding:10px 0;border-bottom:1px solid var(--line)}
  .logentry:last-child{border-bottom:0}
  .logentry .lbody{flex:1;min-width:0}
  .logentry .lmeta{font-size:12px;color:var(--muted);margin-bottom:3px;display:flex;gap:6px;flex-wrap:wrap;align-items:center}
  .logentry .ltext{font-size:14.5px;white-space:pre-wrap;overflow-wrap:break-word}
  /* segment switcher (substances) */
  .seg{display:flex;gap:6px;background:var(--soft);border:1px solid var(--line);border-radius:12px;padding:4px;margin-bottom:14px}
  .seg button{flex:1;border:0;background:transparent;color:var(--muted);font-weight:700;font-size:14px;padding:9px 6px;border-radius:9px;cursor:pointer}
  .seg button.on{background:var(--card);color:var(--ink);box-shadow:0 1px 3px rgba(0,0,0,.08)}
  /* progress bar (TRT cadence / peptide cycle) */
  .pbar{height:14px;border-radius:999px;background:var(--soft);border:1px solid var(--line);overflow:hidden;margin:6px 0}
  .pbar>span{display:block;height:100%;border-radius:999px;transition:width .3s}
  .pbwrap .pblabels{display:flex;justify-content:space-between;font-size:13px;font-weight:700;margin-top:2px}
  /* body map */
  .bodymap{max-width:280px;margin:6px auto 2px;display:block}
  .bodymap .site{cursor:pointer}
  /* abdomen close-up spot picker */
  .bellymap{max-width:360px;width:100%;margin:6px auto 2px;display:block;cursor:crosshair;touch-action:manipulation}
  .maplegend{display:flex;gap:14px;justify-content:center;flex-wrap:wrap;font-size:12px;color:var(--muted);margin-top:4px}
  .maplegend i{display:inline-block;width:10px;height:10px;border-radius:50%;margin-right:4px;vertical-align:middle}
  /* cross-links to twin tabs */
  .rellinks{margin-top:12px}
  .rellinks .btn{width:100%}
  .pill{display:inline-block;padding:3px 10px;border-radius:999px;font-size:12px;font-weight:700}
  .muted{color:var(--muted)}
  .small{font-size:13px}
  .tiny{font-size:12px}
  .center{text-align:center}
  .stat{display:flex;flex-direction:column;gap:2px;background:var(--soft);border:1px solid var(--line);border-radius:12px;padding:12px}
  .stat .k{font-size:12px;color:var(--muted);font-weight:600}
  .stat .v{font-size:20px;font-weight:800}
  .stats{display:grid;gap:10px;grid-template-columns:repeat(auto-fit,minmax(120px,1fr))}

  table{width:100%;border-collapse:collapse;font-size:14px}
  th,td{text-align:left;padding:8px 6px;border-bottom:1px solid var(--line);overflow-wrap:break-word}
  th{font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:.03em}
  td.num,th.num{text-align:right;font-variant-numeric:tabular-nums}
  .nowrap{white-space:nowrap}
  .scroll{overflow-x:auto}
  /* narrow screens: tighten tables so rows always fit without horizontal scroll */
  @media(max-width:480px){
    table{font-size:12.5px}
    th,td{padding:6px 2px}
    th{font-size:10.5px;letter-spacing:0}
    td .btn.sm{padding:6px 8px}
  }

  /* history pagination */
  .pager{display:flex;align-items:center;justify-content:center;gap:14px;margin-top:10px}
  .pager span{font-variant-numeric:tabular-nums}
  .pager button{min-width:44px}
  .pager button:disabled{opacity:.35;cursor:default}

  .note{background:var(--soft);border:1px solid var(--line);border-radius:12px;padding:10px 12px;font-size:13px;color:var(--muted)}
  .warnbox{background:var(--warnbg);border:1px solid var(--warnline);color:var(--warnink);border-radius:12px;padding:10px 12px;font-size:13px}
  .banner{background:var(--warnbg);border:1px solid var(--warnline);color:var(--warnink);border-radius:12px;padding:10px 12px;font-size:13px;margin-bottom:12px}

  /* tabs */
  nav.tabs{position:fixed;bottom:0;left:0;right:0;z-index:30;background:var(--card);border-top:1px solid var(--line);
    display:flex;padding:6px max(8px,env(safe-area-inset-left)) calc(6px + env(safe-area-inset-bottom));}
  nav.tabs a{flex:1;text-decoration:none;color:var(--muted);text-align:center;font-size:11px;font-weight:700;
    padding:6px 2px;border-radius:12px;display:flex;flex-direction:column;align-items:center;gap:3px}
  nav.tabs a .ic{display:flex;align-items:center;justify-content:center}
  nav.tabs a .ic svg{width:23px;height:23px;display:block}
  nav.tabs a.on{color:var(--brand);background:rgba(14,165,164,.10)}

  /* On wider screens the tab bar moves to the top, sitting directly under the
     header as a self-contained segmented bar (instead of a fixed bottom bar). */
  @media(min-width:760px){
    body{padding-bottom:24px;display:flex;flex-direction:column;min-height:100vh}
    header.app{order:1}
    nav.tabs{order:2;position:static;width:100%;max-width:760px;margin:16px auto 4px;border:1px solid var(--line);
      border-radius:var(--radius);box-shadow:var(--shadow);padding:8px}
    nav.tabs a{font-size:12px}
    main.wrap{order:3}
  }

  /* BMI gauge */
  .gauge{margin:6px 0 4px}
  .gauge .track{position:relative;height:26px;border-radius:999px;overflow:hidden;display:flex;border:1px solid var(--line)}
  .gauge .seg{height:100%}
  .gauge .marker{position:absolute;top:-8px;transform:translateX(-50%);transition:left .6s cubic-bezier(.22,1,.36,1)}
  .gauge .marker .tri{width:0;height:0;border-left:9px solid transparent;border-right:9px solid transparent;border-top:12px solid var(--ink);margin:0 auto}
  .gauge .marker .bubble{position:absolute;bottom:14px;left:50%;transform:translateX(-50%);background:var(--ink);color:var(--bg);
    font-size:12px;font-weight:800;padding:3px 8px;border-radius:8px;white-space:nowrap}
  .gauge .ticks{display:flex;justify-content:space-between;font-size:10px;color:var(--muted);margin-top:8px}
  .gauge .labels{display:flex;font-size:10px;color:var(--muted);margin-top:4px;text-align:center}
  .gauge .labels span{flex:1}

  svg.ring{width:min(260px,72%);height:auto;display:block;margin:8px auto 4px}
  svg.chart{width:100%;height:auto;display:block;touch-action:pan-y}
  .legend{display:flex;gap:14px;flex-wrap:wrap;font-size:12px;color:var(--muted);margin-top:8px}
  .legend i{display:inline-block;width:12px;height:12px;border-radius:3px;margin-right:5px;vertical-align:-1px}
  .empty{padding:30px 10px;text-align:center;color:var(--muted)}

  footer.app{max-width:760px;margin:8px auto 0;padding:14px 16px 0;color:var(--muted);font-size:12px}
  .hidden{display:none !important}
</style>
</head>
<body>
<header class="app">
  <div class="head-inner">
    <div class="logo"><span class="dot"></span><span>Mounjaro Tracker</span></div>
    <div class="spacer"></div>
    <button class="btn sm" id="installBtn" hidden><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 15V3"/><path d="m7 10 5 5 5-5"/><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/></svg> <span data-i="install.btn">Zainstaluj</span></button>
    <button class="iconbtn" id="themeBtn" title="Dark / light" aria-label="Toggle dark mode">🌙</button>
    <div class="lang" id="langSwitch">
      <button data-lang="pl">PL</button>
      <button data-lang="en">EN</button>
    </div>
  </div>
</header>

<main class="wrap">
  <div id="storeBanner" class="banner hidden"></div>
  <div id="app"></div>
  <footer class="app" id="footer"></footer>
</main>

<nav class="tabs" id="tabs">
  <a href="#pulpit" data-tab="pulpit"><span class="ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><path d="M9 22V12h6v10"/></svg></span><span data-i="tab.pulpit">Pulpit</span></a>
  <a href="#inject" data-tab="inject"><span class="ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="m18 2 4 4"/><path d="m17 7 3-3"/><path d="M19 9 8.7 19.3c-1 1-2.5 1-3.4 0l-.6-.6c-1-1-1-2.5 0-3.4L15 5"/><path d="m9 11 4 4"/><path d="m5 19-3 3"/><path d="m14 4 6 6"/></svg></span><span data-i="tab.inject">Zastrzyki</span></a>
  <a href="#diary" data-tab="diary"><span class="ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M2 6h4"/><path d="M2 12h4"/><path d="M2 18h4"/><rect width="14" height="18" x="6" y="3" rx="2"/><path d="M10 8h6M10 12h6M10 16h3"/></svg></span><span data-i="tab.diary">Dziennik</span></a>
  <a href="#weight" data-tab="weight"><span class="ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="5" r="2"/><path d="M5 21 7 9h10l2 12z"/><path d="M9 13h6"/></svg></span><span data-i="tab.weight">Waga</span></a>
  <a href="#bp" data-tab="bp"><span class="ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.29 1.51 4.04 3 5.5l7 7Z"/><path d="m4 12 3 .5 1.5-3 2 5 1.5-2.5h6"/></svg></span><span data-i="tab.bp">Ciśnienie</span></a>
  <a href="#settings" data-tab="settings"><span class="ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><line x1="21" x2="14" y1="4" y2="4"/><line x1="10" x2="3" y1="4" y2="4"/><line x1="21" x2="12" y1="12" y2="12"/><line x1="8" x2="3" y1="12" y2="12"/><line x1="21" x2="16" y1="20" y2="20"/><line x1="12" x2="3" y1="20" y2="20"/><line x1="14" x2="14" y1="2" y2="6"/><line x1="8" x2="8" y1="10" y2="14"/><line x1="16" x2="16" y1="18" y2="22"/></svg></span><span data-i="tab.settings">Ustawienia</span></a>
</nav>

<script>
"use strict";
/* =========================================================================
   I18N — Polish + English dictionary

    } else if(sourceId==="weight"){

function doseColor(mg){
  if(mg==null) return "#94a3b8";
  var t = Math.max(0, Math.min(1, mg/15));
  // interpolate teal -> amber -> red
  var stops=[[14,165,164],[245,158,11],[220,38,38]];
  var seg = t*(stops.length-1), i=Math.floor(seg), f=seg-i;
  if(i>=stops.length-1){ i=stops.length-2; f=1; }
  var a=stops[i], b=stops[i+1];
  var r=Math.round(a[0]+(b[0]-a[0])*f), g=Math.round(a[1]+(b[1]-a[1])*f), bl=Math.round(a[2]+(b[2]-a[2])*f);
  return "rgb("+r+","+g+","+bl+")";
}

var CHART = (function(){

    opts=opts||{};

                  .sort(function(a,b){ return a.date<b.date?-1:a.date>b.date?1:0; });

    var waistPts = showWaist ? data.filter(function(e){ return e.waistCm!=null; }) : [];
    var hasWaist = waistPts.length>0;
    if((showWeight && data.length===0) || (!showWeight && !hasWaist)){
      return '<div class="empty">'+esc(I18N.t("weight.empty"))+'</div>';
    }
    // waist series colour: brightened in the dark theme for contrast
    var dark=document.documentElement.getAttribute("data-theme")==="dark";
    var WC=dark?"#818cf8":"#6366f1", HALO=dark?"#16202e":"#ffffff";
    var W=320, H=200, mL=showWeight?38:14, mR=hasWaist?38:14, mT=14, mB=26;

    var ys = data.map(function(e){ return e.weightKg; });
    var minY=Math.min.apply(null,ys), maxY=Math.max.apply(null,ys);
    if(minY===maxY){ minY-=1; maxY+=1; }
    var padY=(maxY-minY)*0.12; minY-=padY; maxY+=padY;
    function X(t){ return maxX===minX ? mL+iw/2 : mL + (t-minX)/(maxX-minX)*iw; }

    // weights on the all-history view). The right axis stays linear — labels
    // are just read off the remapped scale.

      if(minW===maxW){ minW-=1; maxW+=1; }

        data.forEach(function(e){ if(e.date>=d0 && e.date<=d1) band.push(e.weightKg); });
        if(band.length){
          var bTop=Y(Math.max.apply(null,band)), bBot=Y(Math.min.apply(null,band));
          var bandH=Math.max(Math.min(bBot-bTop, ih*0.5), ih*0.28), gap=7;
          var roomBelow=(mT+ih)-(bBot+gap), roomAbove=(bTop-gap)-mT;

      }
    }
    // x labels (first, mid, last)
    function dlabel(t){ var d=new Date(t); return (d.getDate())+"."+(d.getMonth()+1); }
    var idxs = xsrc.length<=3 ? xsrc.map(function(_,i){return i;}) : [0, Math.floor((xsrc.length-1)/2), xsrc.length-1];
    idxs.forEach(function(i){
      var x=X(xs[i]);
      svg+='<text x="'+x.toFixed(1)+'" y="'+(H-8)+'" font-size="9" fill="#94a3b8" text-anchor="middle">'+dlabel(xs[i])+'</text>';
    });

      if(data.length>1){

      }

        svg+='<circle cx="'+x+'" cy="'+y+'" r="4.5" fill="'+c+'" stroke="#fff" stroke-width="1.5">'
           +'<title>'+esc(tip)+'</title></circle>';
      });
    }

  }

      t.style.cssText="position:fixed;left:50%;bottom:96px;transform:translateX(-50%);background:#0f172a;color:#fff;padding:10px 16px;border-radius:999px;font-size:14px;font-weight:700;z-index:99;opacity:0;transition:opacity .2s";
    }
    t.textContent=msg; t.style.opacity="1";
    clearTimeout(t._t); t._t=setTimeout(function(){ t.style.opacity="0"; },1500);

  /* ---- history pagination: PAGE_SIZE rows per page + prev/next arrows ---- */
  var PAGE_SIZE=5;
  function pageClamp(page, total){ var pages=Math.max(1, Math.ceil(total/PAGE_SIZE)); return Math.max(0, Math.min(page, pages-1)); }
  function pageSlice(list, page){ return list.slice(page*PAGE_SIZE, page*PAGE_SIZE+PAGE_SIZE); }
  function pagerHTML(cls, page, total){
    var pages=Math.max(1, Math.ceil(total/PAGE_SIZE));
    if(pages<2) return "";
    return '<div class="pager">'
      +'<button type="button" class="btn ghost sm '+cls+'" data-d="-1"'+(page<=0?' disabled':'')+'>&lsaquo;</button>'
      +'<span class="muted small">'+(page+1)+' / '+pages+'</span>'
      +'<button type="button" class="btn ghost sm '+cls+'" data-d="1"'+(page>=pages-1?' disabled':'')+'>&rsaquo;</button>'
      +'</div>';
  }
  function bindPager(cls, getP, setP, rerender){
    $all("."+cls).forEach(function(b){ b.addEventListener("click",function(){
      setP(getP()+parseInt(b.getAttribute("data-d"),10)); rerender();
    });});

  /* ---- chart zoom: "+" narrows to the last N readings, "−" restores full history ---- */
  var CHART_ZOOM_N=7;
  function zoomHeader(titleKey, cls, zoomed, total){
    // "+" is always shown (heavily faded once active); "−" appears only while zoomed
    var btns = total>CHART_ZOOM_N
      ? '<div class="row" style="gap:6px;flex-wrap:nowrap">'
        +'<button type="button" class="btn ghost sm '+cls+'" data-z="1" style="min-width:40px'+(zoomed?';opacity:.25;cursor:default':'')+'" title="'+esc(I18N.t("chart.zoom7"))+'"'+(zoomed?' disabled':'')+'>+</button>'
        +(zoomed?'<button type="button" class="btn ghost sm '+cls+'" data-z="0" style="min-width:40px" title="'+esc(I18N.t("chart.zoomAll"))+'">&minus;</button>':'')
        +'</div>'
      : '';
    return '<div class="row" style="justify-content:space-between;align-items:center;flex-wrap:nowrap;margin-bottom:4px">'
      +'<h2 style="margin:0">'+esc(I18N.t(titleKey))
      +(zoomed&&btns?' <span class="muted tiny" style="font-weight:600">('+esc(I18N.t("chart.last7"))+')</span>':'')+'</h2>'
      +btns+'</div>';
  }
  function bindZoom(cls, setZ, rerender){
    $all("."+cls).forEach(function(b){ b.addEventListener("click",function(){
      if(b.disabled) return;
      setZ(b.getAttribute("data-z")==="1"); rerender();
    });});

  /* ============ JAB (next-shot countdown ring) ============ */
  // Urgency palette: green (just injected) -> amber -> red (shot due).
  var RING_GREEN="#16a34a", RING_AMBER="#f59e0b", RING_RED="#dc2626";
  function hex2rgb(h){ h=h.replace("#",""); return [parseInt(h.slice(0,2),16),parseInt(h.slice(2,4),16),parseInt(h.slice(4,6),16)]; }
  function lerpRGB(a,b,t){ return [Math.round(a[0]+(b[0]-a[0])*t),Math.round(a[1]+(b[1]-a[1])*t),Math.round(a[2]+(b[2]-a[2])*t)]; }
  function rgbCss(c){ return "rgb("+c[0]+","+c[1]+","+c[2]+")"; }
  var GREEN_RGB=hex2rgb(RING_GREEN), AMBER_RGB=hex2rgb(RING_AMBER), RED_RGB=hex2rgb(RING_RED);
  // Continuous green -> amber -> red. Input 0 = green, 0.5 = amber, 1 = red.
  function urgencyColor(m){
    m=Math.max(0,Math.min(1,m));
    return m<0.5 ? lerpRGB(GREEN_RGB,AMBER_RGB,m/0.5)
                 : lerpRGB(AMBER_RGB,RED_RGB,(m-0.5)/0.5);
  }
  function ringSVG(frac, big, sub){
    frac=Math.max(0,Math.min(1,frac));
    // Hot colour tracks frac directly so the cap is a live progress readout:
    // it shifts a little every day (green -> amber -> red), never flat-green.
    var R=85, cx=100, cy=100, hot=urgencyColor(frac), hotCss=rgbCss(hot);
    // The blend runs ALONG the arc (relative to the ring's own path), not across
    // the screen: green on the freshly-injected trailing end, fluidly blending
    // to the hot colour at the moving leading cap. Built from many short arc
    // segments coloured by position p in [0,1] along the drawn arc — an SVG
    // linearGradient can only interpolate along a straight screen line.
    function pt(t){ var ang=(-90+t*frac*360)*Math.PI/180; return [cx+R*Math.cos(ang),cy+R*Math.sin(ang)]; }
    function colorAt(p){ return rgbCss(lerpRGB(GREEN_RGB,hot,p)); }
    var arc="";
    if(frac>0){
      var N=Math.max(2,Math.ceil(frac*96));
      for(var i=0;i<N;i++){
        var t0=i/N, t1=(i+1)/N, p0=pt(t0), p1=pt(t1);
        arc+='<path d="M'+p0[0].toFixed(2)+' '+p0[1].toFixed(2)+'A'+R+' '+R+' 0 0 1 '+p1[0].toFixed(2)+' '+p1[1].toFixed(2)+'" '
          +'fill="none" stroke="'+colorAt((t0+t1)/2)+'" stroke-width="14" stroke-linecap="round"/>';
      }
    }
    return '<svg class="ring" viewBox="0 0 200 200" role="img">'
      +'<circle cx="100" cy="100" r="85" fill="none" stroke="var(--line)" stroke-width="14"/>'
      +arc
      +'<text x="100" y="98" text-anchor="middle" font-size="46" font-weight="800" fill="'+hotCss+'" '
        +'style="transition:fill .8s ease">'+esc(big)+'</text>'
      +'<text x="100" y="126" text-anchor="middle" font-size="12" fill="var(--muted)">'+esc(sub)+'</text>'
      +'</svg>';
  }
  function viewJab(){
    var st=s();
    var every = Math.max(1, st.calc.intervalDays||7);
    var hist = (st.jab.history||[]).slice().sort();
    var last = hist.length ? hist[hist.length-1] : null;
    var today = todayISO();

    var html='<h1 class="page">'+esc(I18N.t("jab.title"))+'</h1>'
    + '<div class="card"><p class="sub">'+esc(I18N.t("jab.sub"))+'</p>'
    + '<div class="field" style="max-width:220px"><label>'+esc(I18N.t("jab.freq"))+'</label><input type="number" inputmode="numeric" id="jEvery" min="1" value="'+every+'"></div>';

    if(last){
      var elapsed = daysBetweenISO(last, today);
      var remaining = every - elapsed;
      var next = addDaysISO(last, every);
      var frac = elapsed/every;
      var big, sub;
      if(remaining > 0){ big=String(remaining); sub=I18N.t("jab.daysLeft"); }
      else if(remaining === 0){ big="0"; sub=I18N.t("jab.dueToday"); frac=1; }
      else { big=String(remaining); sub=Math.abs(remaining)+" "+I18N.t("opt.days")+" "+I18N.t("jab.overdue"); frac=1; }
      html+= ringSVG(frac, big, sub);
      html+='<div class="stats" style="margin-top:6px">'
        + '<div class="stat"><span class="k">'+esc(I18N.t("jab.nextOn"))+'</span><span class="v" style="font-size:16px">'+esc(next)+'</span></div>'
        + '<div class="stat"><span class="k">'+esc(I18N.t("jab.lastOn"))+'</span><span class="v" style="font-size:16px">'+esc(last)+'</span></div>'
        + '</div>';
    } else {
      html+='<div class="empty">'+esc(I18N.t("jab.firstHint"))+'</div>';
    }
    html+='<div class="row" style="margin-top:14px"><button class="btn" id="jToday">💉 '+esc(I18N.t("jab.logToday"))+'</button>';
    if(last) html+='<button class="btn ghost" id="jUndo">'+esc(I18N.t("jab.undo"))+'</button>';
    html+='</div>';
    html+='<div class="row" style="margin-top:10px;align-items:flex-end">'
      +'<div class="field" style="margin:0;flex:1;min-width:160px"><label>'+esc(I18N.t("jab.logDate"))+'</label><input type="date" id="jDate" value="'+today+'"></div>'
      +'<button class="btn ghost" id="jAdd">'+esc(I18N.t("jab.add"))+'</button></div>';
    html+='</div>';

    if(hist.length){
      html+='<div class="card"><h2>'+esc(I18N.t("jab.history"))+'</h2><div class="scroll"><table><tbody>';
      hist.slice().reverse().forEach(function(dt){
        html+='<tr><td>'+esc(dt)+'</td><td class="num"><button class="btn ghost sm jDel" data-d="'+esc(dt)+'">✕</button></td></tr>';
      });
      html+='</tbody></table></div></div>';
    }
    app.innerHTML=html;

    function addJab(dt){
      if(!dt) return;
      if(st.jab.history.indexOf(dt)===-1) st.jab.history.push(dt);
      st.jab.history.sort();
      STORE.save(); toast(I18N.t("common.saved")); viewJab();
    }
    $("#jEvery").addEventListener("change",function(){ st.calc.intervalDays=Math.max(1,parseInt(this.value,10)||7); STORE.save(); viewJab(); });
    $("#jToday").addEventListener("click",function(){ addJab(todayISO()); });
    $("#jAdd").addEventListener("click",function(){ addJab($("#jDate").value); });
    if($("#jUndo")) $("#jUndo").addEventListener("click",function(){ st.jab.history.pop(); STORE.save(); viewJab(); });
    $all(".jDel").forEach(function(b){ b.addEventListener("click",function(){
      if(!confirm(I18N.t("jab.confirmDel"))) return;
      var dt=b.getAttribute("data-d");
      st.jab.history = st.jab.history.filter(function(x){return x!==dt;});
      STORE.save(); viewJab();
    });});
  }

  /* ============ WEIGHT ============ */
  var weightEdit=null;  // id of the entry being edited (null = adding a new one)
  var weightPage=0;     // history page (5 rows each)
  var weightZoom=false; // chart: true = last 7 readings, false = full history
  var weightShow={w:true, g:true}; // chart series filter: w = weight, g = waist (girth)
  function viewWeight(){
    var st=s();
    var editing=null;
    if(weightEdit){
      for(var wi=0;wi<st.weightLog.length;wi++){ if(st.weightLog[wi].id===weightEdit){ editing=st.weightLog[wi]; break; } }
      if(!editing) weightEdit=null;
    }
    // default the dose to the most recently injected Mounjaro dose
    var lastD = DOMAIN.lastDoseAsOf(st, "mounjaro");
    var last = lastD ? lastD.dose : null;
    var html=''
    + '<h1 class="page">'+esc(I18N.t("weight.title"))+'</h1>';

    // chart card (on top); "+" zooms to the last 7 readings so recent trends
    // (e.g. waist, measured only recently) are readable
    var chartLog = (weightZoom && st.weightLog.length>CHART_ZOOM_N) ? st.weightLog.slice(0,CHART_ZOOM_N) : st.weightLog;
    var anyWaist = st.weightLog.some(function(e){ return e.waistCm!=null; });
    function serChip(key, on, label, color){
      return '<button type="button" class="pill wSer" data-s="'+key+'" style="cursor:pointer;border:0;background:'
        +(on?color+'22':'var(--soft)')+';color:'+(on?color:'var(--muted)')+'">'+esc(label)+'</button>';
    }
    html+='<div class="card">'+zoomHeader("weight.chartTitle","wZoom",weightZoom,st.weightLog.length)
        + (anyWaist ? '<div class="row" style="gap:6px;margin:0 0 8px">'
            + serChip("w", weightShow.w, I18N.t("common.weight"), "#0ea5a4")
            + serChip("g", weightShow.g, I18N.t("weight.waist"), "#6366f1")
            + '</div>' : '')
        + '<div id="chartHolder">'+CHART.render(chartLog, {showWeight:weightShow.w, showWaist:weightShow.g})+'</div>';
    if(st.weightLog.length){
      var first=st.weightLog[st.weightLog.length-1].weightKg, cur=st.weightLog[0].weightKg;
      var diff=cur-first;
      var pct = first>0 ? diff/first*100 : 0;
      var col = diff<=0?"var(--good)":"var(--bad)";
      var waistLog = st.weightLog.filter(function(e){ return e.waistCm!=null; }); // newest first
      html+='<div class="legend">'
          + (weightShow.w?'<span>'+esc(I18N.t("weight.legendDose"))+'</span>':'')
          + (weightShow.g&&waistLog.length?'<span style="color:#6366f1">'+esc(I18N.t("weight.legendWaist"))+'</span>':'')
          + '</div>'
          + '<div class="stats" style="margin-top:12px">'
          + '<div class="stat"><span class="k">'+esc(I18N.t("common.weight"))+'</span><span class="v">'+fmtNum(cur,1)+' kg</span></div>'
          + '<div class="stat"><span class="k">'+esc(I18N.t("weight.total"))+'</span><span class="v" style="color:'+col+'">'+(diff>0?"+":"")+fmtNum(diff,1)+' kg</span></div>'
          + '<div class="stat"><span class="k">'+esc(I18N.t("weight.totalPct"))+'</span><span class="v" style="color:'+col+'">'+(pct>0?"+":"")+fmtNum(pct,1)+'%</span></div>';
      if(waistLog.length){
        var wCur=waistLog[0].waistCm, wFirst=waistLog[waistLog.length-1].waistCm, wDiff=wCur-wFirst;
        var wCol = wDiff<=0?"var(--good)":"var(--bad)";
        html+='<div class="stat"><span class="k">'+esc(I18N.t("weight.waist"))+'</span><span class="v">'+fmtNum(wCur,1)+' cm</span></div>'
            + '<div class="stat"><span class="k">'+esc(I18N.t("weight.waistTotal"))+'</span><span class="v" style="color:'+wCol+'">'+(wDiff>0?"+":"")+fmtNum(wDiff,1)+' cm</span></div>';
      }
      html+='</div>';
    }
    html+='</div>';

    // logging form card (below the chart)
    html+= '<div class="card">'
    +   '<p class="sub">'+esc(I18N.t("weight.sub"))+'</p>'
    +   (editing?'<div class="note" style="margin:0 0 12px">'+esc(I18N.t("common.editing"))+'</div>':'')
    +   '<div class="grid g2">'
    +     '<div class="field"><label>'+esc(I18N.t("common.date"))+'</label><input type="date" id="wDate" value="'+esc(editing?editing.date:todayISO())+'"></div>'
    +     '<div class="field"><label>'+esc(I18N.t("bmi.weight"))+'</label><input type="number" inputmode="decimal" step="0.1" id="wKg" placeholder="80.0" value="'+(editing?esc(editing.weightKg):'')+'"></div>'
    +     '<div class="field"><label>'+esc(I18N.t("weight.waistCm"))+' <span class="muted tiny">('+esc(I18N.t("common.optional"))+')</span></label><input type="number" inputmode="decimal" step="0.5" id="wWaist" placeholder="100" value="'+(editing&&editing.waistCm!=null?esc(editing.waistCm):'')+'"></div>'
    +     '<div class="field"><label>'+esc(I18N.t("weight.doseMg"))+' <span class="muted tiny">('+esc(I18N.t("common.optional"))+')</span></label><input type="number" inputmode="decimal" step="0.25" id="wDose" placeholder="7.5" value="'+(editing?(editing.doseMg!=null?esc(editing.doseMg):''):(last!=null?esc(last):''))+'"></div>'
    +   '</div>'
    +   '<div class="field"><label>'+esc(I18N.t("common.note"))+' <span class="muted tiny">('+esc(I18N.t("common.optional"))+')</span></label><input type="text" id="wNote" maxlength="80" value="'+(editing?esc(editing.note||""):'')+'"></div>'
    +   '<div class="row"><button class="btn" id="wAdd">'+esc(editing?I18N.t("common.update"):I18N.t("weight.add"))+'</button>'
    +   (editing?'<button class="btn ghost" id="wCancel">'+esc(I18N.t("common.cancel"))+'</button>':'')
    +   '</div>'
    + '</div>';
    html+='<div class="rellinks"><a class="btn ghost" href="#bp">'+icon("bp")+esc(I18N.t("rel.toBp"))+icon("arrow")+'</a></div>';

    // history
    if(st.weightLog.length){
      // injections-style rows: no header, bold primary value, details underneath
      html+='<div class="card"><h2>'+esc(I18N.t("weight.history"))+'</h2><div class="scroll"><table><tbody>';
      weightPage=pageClamp(weightPage, st.weightLog.length);
      pageSlice(st.weightLog, weightPage).forEach(function(e){
        html+='<tr><td style="width:29%"><span class="nowrap">'+esc(fmtDate(e.date))+'</span>'+injDayMarkersBlock(st, e.date)
            + (e.note?'<span class="muted tiny" style="display:block">'+esc(e.note)+'</span>':'')+'</td>'
            + '<td style="width:25%"><b class="nowrap">'+fmtNum(e.weightKg,1)+' kg</b>'
            + (e.waistCm!=null?'<br><span class="tiny nowrap" style="color:#6366f1">'+fmtNum(e.waistCm,1).replace(/\.0$/,'')+' cm</span>':'')+'</td>'
            + '<td style="width:24%">'+dosePillsAsOf(st, e.date, e.doseMg)+'</td>'
            + '<td class="num"><button class="btn ghost sm wEdit" title="'+esc(I18N.t("common.edit"))+'" data-id="'+esc(e.id)+'">'+icon("edit")+'</button> '
            + '<button class="btn ghost sm wDel" title="'+esc(I18N.t("common.delete"))+'" data-id="'+esc(e.id)+'">'+icon("trash")+'</button></td></tr>';
      });
      html+='</tbody></table></div>'+pagerHTML("wPg", weightPage, st.weightLog.length)+'</div>';
    }

    // BMI — display only; pulls weight from the log and height/age/sex from Settings
    var bmiW = st.weightLog.length ? st.weightLog[0].weightKg : null;
    var bmiH = st.profile.heightCm;
    var bmiBody = (bmiW==null) ? '<div class="empty">'+esc(I18N.t("bmi.needWeight"))+'</div>'
                : (!bmiH)      ? '<div class="empty">'+esc(I18N.t("bmi.setHeight"))+'</div>'
                :                renderBMI(bmiH, bmiW);
    html+='<div class="card"><h2>'+esc(I18N.t("bmi.title"))+'</h2>'
      +'<p class="sub">'+esc(I18N.t("bmi.autoSub"))+'</p>'
      +((bmiW!=null&&bmiH)?'<p class="tiny muted" style="margin:0 0 8px">'+esc(I18N.t("bmi.usingWeight"))+': <b>'+fmtNum(bmiW,1)+' kg</b></p>':'')
      +'<div id="bmiResult">'+bmiBody+'</div>'
      +'</div>';

    app.innerHTML=html;

    $("#wAdd").addEventListener("click",function(){
      var kg=parseFloat($("#wKg").value);
      if(isNaN(kg)||kg<=0){ $("#wKg").focus(); return; }
      var dose=$("#wDose").value===""?null:parseFloat($("#wDose").value);
      var waist=$("#wWaist").value===""?null:parseFloat($("#wWaist").value);
      var fields={ date:$("#wDate").value||todayISO(), weightKg:kg,
                   waistCm:(waist==null||isNaN(waist)||waist<=0)?null:waist,
                   doseMg:(dose==null||isNaN(dose))?null:dose, note:($("#wNote").value||"").trim() };
      if(editing){
        editing.date=fields.date; editing.weightKg=fields.weightKg; editing.waistCm=fields.waistCm;
        editing.doseMg=fields.doseMg; editing.note=fields.note;
        weightEdit=null;
      } else {
        fields.id=uid();
        st.weightLog.push(fields);
      }
      st.weightLog.sort(function(a,b){ return a.date<b.date?1:a.date>b.date?-1:0; });
      weightPage=0;
      STORE.save(); toast(I18N.t("common.saved")); viewWeight();
    });
    if($("#wCancel")) $("#wCancel").addEventListener("click",function(){ weightEdit=null; viewWeight(); });
    bindPager("wPg", function(){return weightPage;}, function(v){weightPage=v;}, viewWeight);
    bindZoom("wZoom", function(v){weightZoom=v;}, viewWeight);

    $all(".wSer").forEach(function(b){ b.addEventListener("click",function(){

      if(!confirm(I18N.t("weight.confirmDel"))) return;
      var id=b.getAttribute("data-id");
