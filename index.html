  function runTravel(){
    var st=s(), tv=st.settings.travel;
    var S=st.calc.strengthMg||5, D=(tv.dose!=null?tv.dose:S);
    var homeCur=st.settings.currency;
    var rxStr=rxPenFor(D);
    var destSame=(tv.penCosts?tv.penCosts[String(S)]:null);
    var destRx = rxStr==null ? null : (rxStr===S ? destSame : (tv.penCosts?tv.penCosts[String(rxStr)]:null));
    var homePrice = st.settings.penCosts ? st.settings.penCosts[String(S)] : null;
    // A "month" here means 4 weeks (28 days) — the natural unit for a weekly pen,
    // where one standard pen = 4 doses = 4 weeks ≈ one monthly supply.
    var tripDays = (tv.tripValue>0) ? (tv.tripUnit==="months" ? tv.tripValue*28 : tv.tripValue*7) : 0;
    var r=DOMAIN.travelCompare({ homeStrength:S, dose:D, intervalDays:st.calc.intervalDays||7,
      golden:st.settings.goldenDose, rate:tv.rate, homePrice:homePrice, monthDays:28,
      destPriceSame:destSame, destPriceRx:destRx, rxStrength:rxStr, tripDays:tripDays });
    if(!r.home || (!r.same && !r.rx)){
      $("#optResult").innerHTML='<div class="card"><div class="empty">'+esc(I18N.t("trv.needInputs"))+'</div></div>'; return;
    }
    var destCur=tv.currency||"";
    function money(n){ return fmtMoney(n,homeCur); }
    function moneyTxt(n){ return fmtMoneyTxt(n,homeCur); }
    function destOrig(n){ return fmtNum(n,0); }
    function tx(key,map){ var t=I18N.t(key); for(var k in map){ t=t.split("{"+k+"}").join(map[k]); } return t; }
    // a row of period figures. When dosing is weekly, one shot == one week, so we
    // show just per week + per month (no redundant per-shot). Otherwise all three.
    var weekly=((st.calc.intervalDays||7)===7);
    function periods(perShot, perWeek, perMonth, col){
      var c=col?' style="color:'+col+'"':'';
      function cell(amt, unitKey){ return '<div class="per"><b'+c+'>'+money(amt)+'</b><span>'+esc(I18N.t(unitKey))+'</span></div>'; }
      if(weekly) return '<div class="pers two">'+cell(perWeek,"trv.perWeek")+cell(perMonth,"trv.perMonth2")+'</div>';
      return '<div class="pers">'+cell(perShot,"trv.perShot2")+cell(perWeek,"trv.perWeek")+cell(perMonth,"trv.perMonth2")+'</div>';
    }
    // one full-width breakdown card: title, plain explanation, big pen price,
    // the three period costs and how long one pen lasts.
    function scCard(title, ex, sc){
      if(!sc) return "";
      return '<div class="tcard"><h3>'+esc(title)+'</h3><p class="ex">'+esc(ex)+'</p>'
        +'<div class="big">'+money(sc.priceHome)+' <small>'+esc(I18N.t("trv.perPen"))+'</small></div>'
        + periods(sc.perShot, sc.perWeek, sc.perMonth)
        +'<div class="meta">'+esc(tx("trv.lasts",{w:fmtNum(sc.coverWeeks,1),m:fmtNum(sc.coverMonths,1)}))+'</div></div>';
    }
    // trip planner card (only when a trip length is given)
    function tripCard(){
      var t=r.trip; if(!t || !t.home) return "";
      var tripTxt=(tv.tripUnit==="months"?tv.tripValue+" "+I18N.t("trv.months"):tv.tripValue+" "+I18N.t("trv.weeks"));
      var h='<div class="tcard" style="border-color:var(--brand)"><h3>'+esc(I18N.t("trv.tripTitle"))+'</h3>'
        +'<div class="big">'+esc(tx("trv.tripBring",{k:t.home.pens}))+'</div>'
        +'<div class="meta">'+esc(tx("trv.tripShotsOver",{n:t.shots,t:tripTxt}))+' · '+esc(tx("trv.tripHomeCost",{c:moneyTxt(t.home.cost)}))+'</div>';
      function leg(label, lg, save){
        if(!lg) return "";
        var verdict = save==null?"" : (save>0?tx("trv.tripSave",{c:moneyTxt(Math.abs(save))}):tx("trv.tripMore",{c:moneyTxt(Math.abs(save))}));
        var col=save==null?"var(--muted)":(save>0?"var(--good)":"var(--bad)");
        return '<div class="meta" style="margin-top:8px">'+esc(label)+(verdict?' — <b style="color:'+col+'">'+esc(verdict)+'</b>':'')+'</div>';
      }
      h+=leg(tx("trv.tripSame",{k:t.same?t.same.pens:0,c:t.same?moneyTxt(t.same.cost):"—"}), t.same, t.saveSame);
      if(rxStr!==S) h+=leg(tx("trv.tripRx",{k:t.rx?t.rx.pens:0,c:t.rx?moneyTxt(t.rx.cost):"—"}), t.rx, t.saveRx);
      return h+'</div>';
    }
    var rateNote="";
    if(tv.rate!=null && tv.rate>0 && destCur){
      rateNote='<p class="tiny muted" style="margin:-4px 0 12px">'+esc(tx("trv.rateUsed",{home:homeCur,rate:fmtNum(tv.rate,4),dest:destCur}))+'</p>';
    }
    var pensNeeded = (r.rx&&r.home)?Math.max(1,Math.ceil(r.home.shotsPerPen/r.rx.shotsPerPen)):0;
    var exHome=tx("trv.exHome",{s:S,d:D,n:r.home.shotsPerPen,m:fmtNum(r.home.coverMonths,1)});
    var exSame=r.same?tx("trv.exSame",{s:S,orig:destOrig(destSame),cur:destCur,pln:moneyTxt(r.same.priceHome),n:r.same.shotsPerPen}):"";
    var exRx=r.rx?tx("trv.exRx",{s:rxStr,orig:destOrig(destRx),cur:destCur,pln:moneyTxt(r.rx.priceHome),n:r.rx.shotsPerPen,k:pensNeeded}):"";
    var trip=tripCard();
    var html='<div class="card"><h2>'+esc(I18N.t("opt.modeTravel"))+'</h2>'+rateNote
      + (trip?'<div class="tgrid" style="margin-bottom:14px">'+trip+'</div>':'')
      +'<div class="tsub">'+esc(tx("trv.whatPay",{home:homeCur}))+'</div>'
      +'<div class="tgrid">'
      + scCard(tx("trv.rowHome",{s:S}), exHome, r.home)
      + scCard(tx("trv.rowSame",{s:S}), exSame, r.same)
      + (r.rx && rxStr!==S ? scCard(tx("trv.rowRx",{s:rxStr}), exRx, r.rx) : "")
      +'</div>';
    if(rxStr==null) html+='<div class="warnbox" style="margin-top:8px">'+esc(I18N.t("trv.rxNA"))+'</div>';
    html+='</div>';
    $("#optResult").innerHTML=html;
  }
  function runPlan(){
    var st=s();
    var S=st.calc.strengthMg||5;
    var base=parseFloat($("#oBase").value);
    var interval=Math.max(1, parseInt($("#oInterval").value,10)||7);
    var pattern=(st.calc.pattern&&st.calc.pattern.length)?st.calc.pattern:[1];
    var P=(st.settings.penCosts?st.settings.penCosts[String(S)]:null), cur=st.settings.currency;
    var r=DOMAIN.planRegimen(S, base, pattern, interval, P, st.settings.goldenDose);
    if(r.error){ $("#optResult").innerHTML='<div class="card"><div class="warnbox">'+esc(I18N.t("opt.targetGt"))+'</div></div>'; return; }
    function stat(k,v,col){ return '<div class="stat"><span class="k">'+esc(k)+'</span><span class="v"'+(col?' style="color:'+col+'"':'')+'>'+v+'</span></div>'; }
    if(r.infeasible){
      $("#optResult").innerHTML='<div class="card"><div class="warnbox">'+esc(I18N.t("opt.planInfeasible"))+'</div></div>';
      return;
    }
    var html='<div class="card"><h2>'+esc(I18N.t("opt.modeStretch"))+'</h2>';
    // per-shot table
    html+='<div class="scroll"><table><thead><tr><th>'+esc(I18N.t("opt.shot"))+'</th><th>'+esc(I18N.t("common.dose"))+'</th>'
        +'<th class="num">'+esc(I18N.t("common.clicks"))+'</th>'
        +(P!=null?'<th class="num">'+esc(I18N.t("opt.perShot"))+'</th>':'')+'</tr></thead><tbody>';
    r.shots.forEach(function(sh,i){
      html+='<tr><td>#'+(i+1)+' <span class="muted tiny">'+esc(sh.fraction===0.5?I18N.t("opt.half"):I18N.t("opt.full"))+'</span></td>'
          +'<td><span class="pill" style="background:'+doseColor(sh.dose)+'22;color:'+doseColor(sh.dose)+'">'+fmtNum(sh.actualMg,2)+' mg</span></td>'
          +'<td class="num">'+sh.clicks+'</td>'
          +(P!=null?'<td class="num">'+fmtMoney(sh.costPerShot,cur)+'</td>':'')+'</tr>';
    });
    html+='</tbody></table></div>';
    html+='<div class="stats" style="margin-top:14px">'
      + stat(I18N.t("opt.shotsPerPen"), r.totalShots)
      + stat(I18N.t("opt.lasts"), r.totalDays+" "+I18N.t("opt.days")+" · "+fmtNum(r.weeks,1)+" "+I18N.t("common.weeks"))
      + stat(I18N.t("opt.avgWeeklyMg"), fmtNum(r.avgWeeklyMg,2)+" mg")
      + stat(I18N.t("opt.leftover"), r.leftover+" "+I18N.t("common.clicks"))
      + '</div>';
    html+='<div class="note" style="margin-top:12px">'+esc(I18N.t("opt.budget"))+': <b>'+r.budget+' '+I18N.t("common.clicks")+'</b> · '+fmtNum(r.months,1)+' '+I18N.t("opt.months")+'</div>';
    if(P!=null){
      html+='<div class="stats" style="margin-top:12px">'
        + stat(I18N.t("opt.costPerWeek"), fmtMoney(r.weeklyCost,cur))
        + stat(I18N.t("opt.monthlyCost"), fmtMoney(r.monthlyCost,cur))
        + stat(I18N.t("opt.extraDays"), (r.extraDays>=0?"+":"")+r.extraDays+" "+I18N.t("opt.days"), r.extraDays>0?"var(--good)":"")
        + stat(I18N.t("opt.savingsMoney"), fmtMoney(r.savingPerWeek,cur), r.savingPerWeek>0?"var(--good)":"")
        + '</div>';
    } else {
      html+='<div class="note" style="margin-top:10px">'+esc(I18N.t("opt.enterPrice"))+'</div>';
    }
    html+='</div>';
    $("#optResult").innerHTML=html;
  }
  function runProg(){
    var st=s(), pg=st.calc.prog;
    var S=st.calc.strengthMg||5, from=pg.from, to=pg.to, cur=st.settings.currency;
    var P=(st.settings.penCosts?st.settings.penCosts[String(S)]:null);
    function warn(msg){ $("#optResult").innerHTML='<div class="card"><div class="warnbox">'+esc(msg)+'</div></div>'; }
    var levels=null, computedStep=null, wps=1;
    if(pg.method==="manual"){
      levels=(pg.manual||"").split(/[\s,;]+/).map(parseFloat).filter(function(x){return !isNaN(x)&&x>0;});
      if(!levels.length){ warn(I18N.t("prog.needManual")); return; }
    } else if(pg.method==="time"){
      if(!(to>from)){ warn(I18N.t("prog.needTarget")); return; }
      var rl=DOMAIN.rampLevelsByWeeks(from,to,pg.weeks); levels=rl.levels; computedStep=rl.step;
    } else {
      if(!(to>from)){ warn(I18N.t("prog.needTarget")); return; }
      wps=Math.max(1,pg.weeksPerStep||1);
      levels=DOMAIN.rampLevelsByStep(from,to,pg.step);
    }
    var r=DOMAIN.rampSchedule(levels, wps, S, st.settings.goldenDose, P);
    if(r.error){ warn(I18N.t("prog.needTarget")); return; }
    var infeasible=r.schedule.filter(function(d){return !d.feasible;});
    function stat(k,v,col){ return '<div class="stat"><span class="k">'+esc(k)+'</span><span class="v"'+(col?' style="color:'+col+'"':'')+'>'+v+'</span></div>'; }
    var html='<div class="card"><h2>'+esc(I18N.t("prog.planTitle"))+'</h2>'
      +'<div class="note" style="margin-bottom:12px">'+esc(I18N.t("prog.reachesIn").replace("{to}",fmtNum(r.target,2)).replace("{n}",r.weeksToTarget))
        +(computedStep!=null?' · '+esc(I18N.t("prog.computedStep").replace("{s}",fmtNum(computedStep,2))):'')+'</div>'
      +'<div class="stats" style="margin-bottom:12px">'
      + stat(I18N.t("prog.totalWeeks"), r.totalWeeks+" "+I18N.t("common.weeks"))
      + stat(I18N.t("prog.totalMg"), fmtNum(r.totalMg,1)+" mg")
      + (r.totalCost!=null?stat(I18N.t("opt.totalCost"), fmtMoney(r.totalCost,cur)):"")
      +'</div>';
    if(infeasible.length){
      html+='<div class="warnbox" style="margin-bottom:12px">'+esc(I18N.t("opt.planInfeasible"))+'</div>';
    }
    // week-by-week schedule (one row per week)
    html+='<div class="scroll"><table><thead><tr><th>'+esc(I18N.t("prog.week"))+'</th><th>'+esc(I18N.t("common.dose"))+'</th><th class="num">'+esc(I18N.t("common.clicks"))+'</th>'
      +(P!=null&&!isNaN(P)?'<th class="num">'+esc(I18N.t("opt.costPerWeek"))+'</th>':'')+'</tr></thead><tbody>';
    var wk=0;
    r.schedule.forEach(function(d){
      for(var i=0;i<d.weeks;i++){ wk++;
        html+='<tr><td>'+wk+'</td>'
          +'<td><span class="pill" style="background:'+doseColor(d.mg)+'22;color:'+doseColor(d.mg)+'">'+fmtNum(d.mg,2)+' mg</span></td>'
          +'<td class="num">'+d.clicks+(d.feasible?'':' ⚠')+'</td>'
          +(P!=null&&!isNaN(P)?'<td class="num">'+fmtMoney(d.costPerWeek,cur)+'</td>':'')+'</tr>';
      }
    });
    html+='</tbody></table></div></div>';
    $("#optResult").innerHTML=html;
  }

  /* ============ SETTINGS ============ */
  function linkCardHTML(){
    var info = STORE.linkInfo();
    var h = '<div class="card"><h2>'+esc(I18N.t("set.linkTitle"))+'</h2>';
    if(!info.supported){
      return h + '<div class="warnbox">'+esc(I18N.t("set.linkUnsupported"))+'</div></div>';
    }
    h += '<p class="sub">'+esc(I18N.t("set.linkDesc"))+'</p>';
    if(info.linked){
      h += '<div class="note" style="margin-bottom:12px">'+esc(I18N.t("set.linkStatusOn"))+' <b>'+esc(info.name||"")+'</b>'
         + (info.ready ? ' ✓' : '<br><span style="color:var(--warn)">'+esc(I18N.t("set.linkReadyNo"))+'</span>') + '</div>';
      h += '<div class="row">';
      if(!info.ready) h += '<button class="btn" id="linkReconnect">'+esc(I18N.t("set.linkReconnect"))+'</button>';
      h += '<button class="btn ghost" id="linkExisting">'+esc(I18N.t("set.linkExisting"))+'</button>'
         + '<button class="btn danger" id="linkUnlink">'+esc(I18N.t("set.linkUnlink"))+'</button></div>';
    } else {
      h += '<div class="note" style="margin-bottom:12px">'+esc(I18N.t("set.linkStatusOff"))+'</div>'
         + '<div class="row"><button class="btn" id="linkNew">'+esc(I18N.t("set.linkNew"))+'</button>'
         + '<button class="btn ghost" id="linkExisting">'+esc(I18N.t("set.linkExisting"))+'</button></div>';
    }
    h += '<p class="tiny muted" style="margin-top:10px">'+esc(I18N.t("set.linkNote"))+'</p>';
    return h + '</div>';
  }
  function bindLinkCard(){
    function done(ok){ if(ok){ updateBanner(); toast(I18N.t("set.linkReconnected")); } viewSettings(); }
    var b;
    if((b=$("#linkNew"))) b.addEventListener("click",function(){ STORE.linkFileNew(function(ok){ done(ok); }); });
    if((b=$("#linkExisting"))) b.addEventListener("click",function(){ STORE.linkFileExisting(function(ok, name, status){
      if(ok && status==="loaded"){
        I18N.setLang(STORE.state.settings.lang); document.documentElement.lang=STORE.state.settings.lang;
        applyTheme(); applyStatic(); updateBanner(); toast(I18N.t("set.importOk")); render(); return;
      }
      if(ok && status==="empty"){ toast(I18N.t("set.linkEmpty")); }
      done(ok);
    }); });
    if((b=$("#linkReconnect"))) b.addEventListener("click",function(){ STORE.reconnect(function(st2){
      if(st2==="loaded"||st2==="kept-local"){ I18N.setLang(STORE.state.settings.lang); document.documentElement.lang=STORE.state.settings.lang; applyStatic(); done(true); }
      else viewSettings();
    }); });
    if((b=$("#linkUnlink"))) b.addEventListener("click",function(){ STORE.unlinkFile(function(){ updateBanner(); viewSettings(); }); });
  }
  function fxStatusHTML(){
    if(!s().settings.fxAuto) return "";
    var fx=s().settings.fx, when=(fx&&fx.updated)?fx.updated:(fx&&fx.fetchedAt?new Date(fx.fetchedAt).toLocaleString():"—");
    return '<div class="note" style="margin-top:10px">🌐 '+esc(I18N.t("fx.online"))
      +'<br><span class="muted">'+esc(I18N.t("fx.lastUpdate"))+': '+esc(when)+'</span>'
      +'<div style="margin-top:8px"><button class="btn ghost sm" id="setFxRefresh">'+esc(I18N.t("fx.refresh"))+'</button></div></div>';
  }
  function viewSettings(){
    var st=s();
    var html=''
    +'<h1 class="page">'+esc(I18N.t("set.title"))+'</h1>'
    +'<div class="card"><p class="sub">'+esc(I18N.t("set.sub"))+'</p>'
    +'<div class="grid g2">'
    +'<div class="field"><label>'+esc(I18N.t("set.language"))+'</label><select id="setLang">'
      +'<option value="pl"'+(st.settings.lang==="pl"?" selected":"")+'>Polski</option>'
      +'<option value="en"'+(st.settings.lang==="en"?" selected":"")+'>English</option>'
    +'</select></div>'
    +'<div class="field"><label>'+esc(I18N.t("set.currency"))+'</label>'+currencyInput("setCur",st.settings.currency)+'</div>'
    +'</div></div>'
    +'<div class="card"><h2>'+esc(I18N.t("set.profile"))+'</h2><p class="sub">'+esc(I18N.t("set.profileHint"))+'</p>'
    +'<div class="grid g3">'
    +'<div class="field"><label>'+esc(I18N.t("bmi.height"))+'</label><input type="number" inputmode="decimal" id="setH" value="'+(st.profile.heightCm!=null?st.profile.heightCm:"")+'" placeholder="170"></div>'
    +'<div class="field"><label>'+esc(I18N.t("bmi.age"))+' <span class="muted tiny">('+esc(I18N.t("common.optional"))+')</span></label><input type="number" inputmode="numeric" id="setAge" value="'+(st.profile.age!=null?st.profile.age:"")+'" placeholder="40"></div>'
    +'<div class="field"><label>'+esc(I18N.t("bmi.sex"))+' <span class="muted tiny">('+esc(I18N.t("common.optional"))+')</span></label><select id="setSex">'
      +'<option value=""></option>'
      +'<option value="f"'+(st.profile.sex==="f"?" selected":"")+'>'+esc(I18N.t("bmi.female"))+'</option>'
      +'<option value="m"'+(st.profile.sex==="m"?" selected":"")+'>'+esc(I18N.t("bmi.male"))+'</option>'
    +'</select></div>'
    +'</div></div>'
    +'<div class="card"><h2>'+esc(I18N.t("set.penCosts"))+'</h2>'
    +'<div class="seg" id="pcSeg">'
      +'<button type="button" class="on" data-pc="home">'+esc(I18N.t("set.pcHome"))+'</button>'
      +'<button type="button" data-pc="dest">'+esc(I18N.t("set.pcDest"))+'</button>'
    +'</div>'
    +'<div id="pcBody"></div></div>'
    +'<div class="card"><h2>'+esc(I18N.t("fx.toggle"))+'</h2><p class="sub">'+esc(I18N.t("fx.desc"))+'</p>'
    +'<label class="toggle"><input type="checkbox" id="setFxAuto"'+(st.settings.fxAuto?" checked":"")+'><span class="switch"></span><span>'+esc(I18N.t("fx.toggle"))+'</span></label>'
    + fxStatusHTML()
    +'</div>'
    + linkCardHTML()
    +'<div class="card"><h2>'+esc(I18N.t("set.data"))+'</h2>'
    +'<p class="sub">'+esc(I18N.t("set.exportHint"))+'</p>'
    +'<div class="row">'
      +'<button class="btn" id="setExport">⬇ '+esc(I18N.t("set.export"))+'</button>'
      +'<button class="btn ghost" id="setImportBtn">⬆ '+esc(I18N.t("set.import"))+'</button>'
      +'<input type="file" id="setImport" accept="application/json,.json" class="hidden">'
    +'</div>'
    +'<div style="margin-top:14px"><button class="btn danger" id="setClear">'+esc(I18N.t("set.clear"))+'</button></div>'
    +'</div>'
    +'<div class="card"><h2>'+esc(I18N.t("set.privacy"))+'</h2><p class="small muted">'+esc(I18N.t("set.privacyTxt"))+'</p></div>';
    app.innerHTML=html;

    $("#setLang").addEventListener("change",function(){
      st.settings.lang=this.value; I18N.setLang(this.value); STORE.save();
      document.documentElement.lang=this.value; applyStatic(); render();
    });
    $("#setCur").addEventListener("change",function(){ st.settings.currency=(this.value||"PLN").toUpperCase(); STORE.save(); renderPenCosts(pcMode); });
    $("#setH").addEventListener("input",function(){ st.profile.heightCm=this.value===""?null:parseFloat(this.value); STORE.save(); });
    $("#setAge").addEventListener("input",function(){ st.profile.age=this.value===""?null:parseInt(this.value,10); STORE.save(); });
    $("#setSex").addEventListener("change",function(){ st.profile.sex=this.value||null; STORE.save(); });
    // Pen-costs card: Home (settings.penCosts) vs Destination (settings.travel.penCosts + currency)
    var pcMode="home";
    function renderPenCosts(mode){
      pcMode=mode;
      var dest=(mode==="dest"), costs=dest?st.settings.travel.penCosts:st.settings.penCosts;
      var cur=dest?(st.settings.travel.currency||""):st.settings.currency;
      var h=dest ? '<p class="sub">'+esc(I18N.t("set.pcDestHint"))+'</p>'
                     +'<div class="field" style="max-width:220px"><label>'+esc(I18N.t("trv.destCur"))+'</label>'+currencyInput("pcDestCur",st.settings.travel.currency)+'</div>'
                 : '<p class="sub">'+esc(I18N.t("set.penCostsHint"))+'</p>';
      var curTag=cur?'<span class="cur">'+esc(cur)+'</span>':'';
      h+='<div class="pcgrid">'+STRENGTHS.map(function(v){
        var pc=costs?costs[String(v)]:null;
        return '<div class="pcitem"><label><span>'+v+' mg</span>'+curTag+'</label><input type="number" inputmode="decimal" class="penCost" data-v="'+v+'" value="'+(pc!=null?pc:"")+'" placeholder="'+esc(cur)+'"></div>';
      }).join("")+'</div>';
      $("#pcBody").innerHTML=h;
      $all(".penCost").forEach(function(inp){
        inp.addEventListener("input",function(){
          var store=dest?st.settings.travel.penCosts:st.settings.penCosts;
          store[inp.getAttribute("data-v")] = inp.value===""?null:parseFloat(inp.value);
          STORE.save();
        });
      });
      var dc=$("#pcDestCur"); if(dc) dc.addEventListener("change",function(){ st.settings.travel.currency=(this.value||"").toUpperCase(); STORE.save(); renderPenCosts("dest"); });
    }
    $all("#pcSeg button").forEach(function(b){
      b.addEventListener("click",function(){
        $all("#pcSeg button").forEach(function(x){ x.classList.remove("on"); });
        b.classList.add("on"); renderPenCosts(b.getAttribute("data-pc"));
      });
    });
    renderPenCosts("home");
    $("#setFxAuto").addEventListener("change",function(){
      if(this.checked){
        if(!confirm(I18N.t("fx.consent"))){ this.checked=false; return; }
        st.settings.fxAuto=true; STORE.save();
        fetchFx(st.settings.currency,function(err){ if(err) toast(I18N.t("fx.error")); render(); });
        render();
      } else { st.settings.fxAuto=false; STORE.save(); render(); }
    });
    var fxr=$("#setFxRefresh"); if(fxr) fxr.addEventListener("click",function(){
      fetchFx(st.settings.currency,function(err){ if(err) toast(I18N.t("fx.error")); render(); });
    });
    $("#setExport").addEventListener("click",function(){ STORE.exportFile(); });
    $("#setImportBtn").addEventListener("click",function(){ $("#setImport").click(); });
    $("#setImport").addEventListener("change",function(){
      if(!this.files||!this.files[0]) return;
      STORE.importFile(this.files[0],function(ok){
        if(ok){ I18N.setLang(STORE.state.settings.lang); document.documentElement.lang=STORE.state.settings.lang;
          applyStatic(); updateBanner(); toast(I18N.t("set.importOk")); render(); }
        else toast(I18N.t("set.importErr"));
      });
    });
    $("#setClear").addEventListener("click",function(){
      if(!confirm(I18N.t("set.clearConfirm"))) return;
      STORE.clearAll(); I18N.setLang(STORE.state.settings.lang); document.documentElement.lang=STORE.state.settings.lang;
      applyStatic(); render();
    });
    bindLinkCard();
  }

  /* ---- router & static text ---- */
  var routes={ pulpit:viewDash, inject:viewInject, weight:viewWeight, bp:viewBP, diary:viewDiary, correlate:viewCorrelate, optimizer:viewOpt, settings:viewSettings };
  function currentTab(){
    var h=(location.hash||"#pulpit").replace("#","");
    if(h==="jab") h="inject";          // legacy hash / PWA shortcut -> injections view
    return routes[h]?h:"pulpit";
  }
  function render(){
    var tab=currentTab();
    $all("nav.tabs a").forEach(function(a){ a.classList.toggle("on", a.getAttribute("data-tab")===tab); });
    routes[tab]();
    window.scrollTo(0,0);
  }
  function applyStatic(){
    $all("[data-i]").forEach(function(n){ n.textContent=I18N.t(n.getAttribute("data-i")); });
    $("#footer").textContent=I18N.t("footer.disclaimer");
    $all("#langSwitch button").forEach(function(b){ b.classList.toggle("on", b.getAttribute("data-lang")===I18N.lang); });
  }
  var linkBannerOn=false;
  function updateBanner(){
    var b=$("#storeBanner");
    b.style.cursor=""; b.onclick=null;
    if(STORE.memoryOnly){ b.textContent=I18N.t("set.noStore"); b.classList.remove("hidden"); return; }
    if(linkBannerOn){
      b.textContent=I18N.t("set.linkBanner"); b.style.cursor="pointer"; b.classList.remove("hidden");
      b.onclick=function(){ STORE.reconnect(function(st2){
        if(st2==="loaded"||st2==="kept-local"){ linkBannerOn=false; updateBanner();
          I18N.setLang(STORE.state.settings.lang); document.documentElement.lang=STORE.state.settings.lang;
          applyTheme(); applyStatic(); render(); }
      }); };
      return;
    }
    b.classList.add("hidden");
  }
  function applyTheme(){
    var dark = STORE.state.settings.theme==="dark";
    document.documentElement.setAttribute("data-theme", dark?"dark":"light");
    var btn=$("#themeBtn"); if(btn) btn.textContent = dark?"☀️":"🌙";
    var meta=document.querySelector('meta[name="theme-color"]'); if(meta) meta.setAttribute("content", dark?"#0b1220":"#0ea5a4");
  }

  // PWA install: capture the deferred prompt (Android/Chromium) and surface a
  // visible Install button; on iOS Safari there's no prompt, so show how-to.
  var deferredInstall=null;
  function setupInstall(){
    var btn=$("#installBtn"); if(!btn) return;
    var ua=navigator.userAgent||"";
    var isIOS=/iphone|ipad|ipod/i.test(ua);
    var standalone=(window.matchMedia&&window.matchMedia("(display-mode: standalone)").matches)||navigator.standalone===true;
    if(standalone){ btn.hidden=true; }
    else if(isIOS){ btn.hidden=false; }
    window.addEventListener("beforeinstallprompt",function(e){ e.preventDefault(); deferredInstall=e; btn.hidden=false; });
    window.addEventListener("appinstalled",function(){ deferredInstall=null; btn.hidden=true; });
    btn.addEventListener("click",function(){
      if(deferredInstall){ deferredInstall.prompt(); deferredInstall.userChoice.then(function(){ deferredInstall=null; btn.hidden=true; }); }
      else { alert(I18N.t("install.ios")); }
    });
  }
  function init(){
    app=$("#app");
    ensureCurrencyList();
    // language
    I18N.setLang(STORE.state.settings.lang||"pl");
    document.documentElement.lang=I18N.lang;
    applyTheme();
    applyStatic(); updateBanner();
    setupInstall();
    $("#themeBtn").addEventListener("click",function(){
      STORE.state.settings.theme = (STORE.state.settings.theme==="dark")?"light":"dark";
      STORE.save(); applyTheme();
    });
    // lang switch buttons
    $all("#langSwitch button").forEach(function(btn){
      btn.addEventListener("click",function(){
        var l=btn.getAttribute("data-lang");
        STORE.state.settings.lang=l; I18N.setLang(l); STORE.save();
        document.documentElement.lang=l; applyStatic(); render();
      });
    });
    window.addEventListener("hashchange",render);
    // When the tab becomes visible/focused again, re-read the linked file: a
    // cloud sync (MEGA/Dropbox) may have pulled in a newer copy while we were
    // away, and the File System Access handle is otherwise only read at startup.
    function refreshLinked(){
      if(document.visibilityState!=="visible") return;
      STORE.refreshFromHandle(function(status){
        if(status==="loaded"){
          I18N.setLang(STORE.state.settings.lang); document.documentElement.lang=STORE.state.settings.lang;
          applyTheme(); applyStatic(); render();
        } else if(status==="needsPermission"){
          linkBannerOn=true; updateBanner();
        }
      });
    }
    document.addEventListener("visibilitychange",refreshLinked);
    window.addEventListener("focus",refreshLinked);
    if(!location.hash) location.hash="#pulpit";
    render();
    // Restore a previously linked file (async; Chromium only). May pull in newer data.
    STORE.restoreLink(function(status){
      if(status==="loaded"){
        I18N.setLang(STORE.state.settings.lang); document.documentElement.lang=STORE.state.settings.lang;
        applyTheme(); applyStatic(); render();
      } else if(status==="needsPermission"){
        linkBannerOn=true; updateBanner();
      }
    });
  }
  return { init:init };
})();

/* ===== bootstrap ===== */
STORE.load();
UI.init();

/* PWA: register the service worker only when served over http(s) (not file://).
   Auto-update: when a new version is deployed, the new SW (which calls
   skipWaiting + clients.claim) takes control and we reload once so an
   already-open app shows the fresh version without the user tapping refresh.
   We only reload if a SW was already controlling the page (so the very first
   install on a fresh visit doesn't trigger a needless reload). */
if("serviceWorker" in navigator && location.protocol.indexOf("http")===0){
  if(navigator.serviceWorker.controller){
    var __reloading=false;
    navigator.serviceWorker.addEventListener("controllerchange",function(){
      if(__reloading) return; __reloading=true; window.location.reload();
    });
  }
  window.addEventListener("load",function(){
    navigator.serviceWorker.register("sw.js").then(function(reg){
      // Proactively look for a new deploy: on focus/return to the tab and hourly.
      function checkUpdate(){ if(reg && reg.update) reg.update()["catch"](function(){}); }
      window.addEventListener("focus",checkUpdate);
      document.addEventListener("visibilitychange",function(){ if(document.visibilityState==="visible") checkUpdate(); });
      setInterval(checkUpdate, 60*60*1000);
    })["catch"](function(){ /* offline mode unavailable; app still works */ });
  });
}
