    });});
  }

  function renderBMI(h,w){
    if(!h||!w||h<=0||w<=0) return '<div class="empty">'+esc(I18N.t("bmi.needHeight"))+'</div>';
    var b = DOMAIN.bmi(w,h);
    var cat = DOMAIN.bmiCategory(b);
    var range = DOMAIN.healthyWeightRange(h);
    // gauge maps BMI 15..40 -> 0..100%
    var lo=15, hi=40;
    var pct = Math.max(0, Math.min(100, (b-lo)/(hi-lo)*100));
    // segment widths across 15..40: under(15-18.5),normal(18.5-25),over(25-30),ob1(30-35),ob2/3(35-40)
    function segW(a,bnd){ return (bnd-a)/(hi-lo)*100; }
    var segs=[
      {w:segW(15,18.5),c:"#0284c7"},
      {w:segW(18.5,25),c:"#16a34a"},
      {w:segW(25,30),c:"#f59e0b"},
      {w:segW(30,35),c:"#f97316"},
      {w:segW(35,40),c:"#dc2626"}
    ];
    var segHtml = segs.map(function(x){ return '<div class="seg" style="width:'+x.w+'%;background:'+x.c+'"></div>'; }).join("");
    var html=''
    +'<div class="stats" style="margin-bottom:14px">'
    +'<div class="stat"><span class="k">'+esc(I18N.t("bmi.your"))+'</span><span class="v" style="color:'+cat.color+'">'+fmtNum(b,1)+'</span></div>'
    +'<div class="stat"><span class="k">'+esc(I18N.t("bmi.category"))+'</span><span class="v" style="font-size:16px;color:'+cat.color+'">'+esc(I18N.t(cat.key))+'</span></div>'
    +'</div>'
    +'<div class="gauge">'
    +'<div class="track">'+segHtml
    +'<div class="marker" style="left:'+pct.toFixed(1)+'%"><div class="bubble">'+fmtNum(b,1)+'</div><div class="tri"></div></div>'
    +'</div>'
    +'<div class="ticks"><span>15</span><span>18.5</span><span>25</span><span>30</span><span>35</span><span>40</span></div>'
    +'<div class="labels"><span>'+esc(I18N.t("bmi.cat.under"))+'</span><span>'+esc(I18N.t("bmi.cat.normal"))+'</span><span>'+esc(I18N.t("bmi.cat.over"))+'</span><span>'+esc(I18N.t("bmi.cat.ob1"))+'</span><span>'+esc(I18N.t("bmi.cat.ob2"))+'+</span></div>'
    +'</div>';
    if(range){
      html+='<div class="note" style="margin-top:14px">'+esc(I18N.t("bmi.healthyRange"))+': <b>'+fmtNum(range.min,1)+'–'+fmtNum(range.max,1)+' kg</b></div>';
    }
    return html;
  }

  /* ============ COST ============ */
  /* ============ BLOOD PRESSURE ============ */
  var bpEdit=null;  // id of the reading being edited (null = adding a new one)
  var bpPage=0;     // history page (5 rows each)
  var bpZoom=false; // chart: true = last 7 readings, false = full history
  function viewBP(){
    var st=s();
    var log = st.bp.log || [];
    var editing=null;
    if(bpEdit){
      for(var bi=0;bi<log.length;bi++){ if(log[bi].id===bpEdit){ editing=log[bi]; break; } }
      if(!editing) bpEdit=null;
    }
    var morning = new Date().getHours() < 12;   // sensible default: morning = fasting
    // current Mounjaro/TRT dose pills (same context as the journal composer)
    function bpCtxHtml(dISO){ var tags=weekTags(st, dISO); return tags.length?weekPills(tags):''; }
    // doses in effect on a reading's date (shared pill renderer)
    function doseCell(e){ return dosePillsAsOf(st, String(e.ts).slice(0,10), e.doseMg); }
    var html=''
    + '<h1 class="page">'+esc(I18N.t("bp.title"))+'</h1>';

    // chart card (on top); "+" zooms to the last 7 readings for a closer trend
    var chartLog = (bpZoom && log.length>CHART_ZOOM_N) ? log.slice(0,CHART_ZOOM_N) : log;
    html+='<div class="card">'+zoomHeader("bp.chartTitle","bpZoom",bpZoom,log.length)
        + '<div id="bpChart">'+CHART.renderBP(chartLog)+'</div>';
    if(log.length){
      var L=log[0];
      // colour key matching the chart lines: red=systolic, blue=diastolic, grey=pulse
      html+='<div class="legend">'
          + '<span><i style="background:#dc2626;border-radius:50%"></i>'+esc(I18N.t("bp.legSys"))+'</span>'
          + '<span><i style="background:#0284c7;border-radius:50%"></i>'+esc(I18N.t("bp.legDia"))+'</span>'
          + '<span><i style="background:#94a3b8;border-radius:50%"></i>'+esc(I18N.t("bp.legPulse"))+'</span>'
          + '</div>'
          + '<div class="stats" style="margin-top:12px">'
          + '<div class="stat"><span class="k">'+esc(I18N.t("bp.latest"))+'</span><span class="v">'+L.sys+'/'+L.dia+'</span></div>'
          + (L.pulse!=null?'<div class="stat"><span class="k">'+esc(I18N.t("bp.pulse"))+'</span><span class="v">'+L.pulse+'</span></div>':'')
          + '<div class="stat"><span class="k">'+esc(I18N.t("bp.when"))+'</span><span class="v" style="font-size:14px">'+esc(fmtDateTime(L.ts))+'</span></div>'
          + '</div>';
    }
    html+='</div>';

    // entry form
    var bpCtx0=bpCtxHtml((editing?toLocalDT(editing.ts):nowLocalDT()).slice(0,10));
    html+='<div class="card"><p class="sub">'+esc(I18N.t("bp.sub"))+'</p>'
    + (editing?'<div class="note" style="margin:0 0 12px">'+esc(I18N.t("common.editing"))+'</div>':'')
    + '<div class="row" id="bpCtx" style="margin:0 0 10px'+(bpCtx0?'':';display:none')+'">'+bpCtx0+'</div>'
    + '<div class="grid g3">'
    +   '<div class="field"><label>'+esc(I18N.t("bp.sys"))+'</label><input type="number" inputmode="numeric" id="bpSys" placeholder="120" value="'+(editing?esc(editing.sys):'')+'"></div>'
    +   '<div class="field"><label>'+esc(I18N.t("bp.dia"))+'</label><input type="number" inputmode="numeric" id="bpDia" placeholder="80" value="'+(editing?esc(editing.dia):'')+'"></div>'
    +   '<div class="field"><label>'+esc(I18N.t("bp.pulse"))+' <span class="muted tiny">('+esc(I18N.t("common.optional"))+')</span></label><input type="number" inputmode="numeric" id="bpPulse" placeholder="70" value="'+(editing&&editing.pulse!=null?esc(editing.pulse):'')+'"></div>'
    + '</div>'
    + '<div class="grid g2"><div class="field"><label>'+esc(I18N.t("bp.when"))+' <span class="muted tiny">('+esc(I18N.t("bp.whenHint"))+')</span></label><input type="date" id="bpDate" value="'+(editing?toLocalDT(editing.ts):nowLocalDT()).slice(0,10)+'"></div>'
    + '<div class="field"><label>'+esc(I18N.t("common.time"))+'</label><input type="time" id="bpTime" value="'+(editing?toLocalDT(editing.ts):nowLocalDT()).slice(11,16)+'"></div></div>'
    + '<label class="toggle" style="margin:4px 0 12px"><input type="checkbox" id="bpFast"'+((editing?editing.fasting:morning)?" checked":"")+'><span class="switch"></span><span>'+esc(I18N.t("bp.fasting"))+'</span></label>'
    + '<div class="field"><label>'+esc(I18N.t("common.note"))+' <span class="muted tiny">('+esc(I18N.t("common.optional"))+')</span></label><input type="text" id="bpNote" maxlength="80" value="'+(editing?esc(editing.note||""):'')+'"></div>'
    + '<div class="row"><button class="btn" id="bpAdd">'+esc(editing?I18N.t("common.update"):I18N.t("bp.add"))+'</button>'
    + (editing?'<button class="btn ghost" id="bpCancel">'+esc(I18N.t("common.cancel"))+'</button>':'')
    + '</div>'
    + '<div class="rellinks"><a class="btn ghost" href="#weight">'+icon("weight")+esc(I18N.t("rel.toWeight"))+icon("arrow")+'</a></div>'
    + '</div>';

    // history
    if(log.length){
      // injections-style rows: no header, bold reading, pulse/notes underneath
      html+='<div class="card"><h2>'+esc(I18N.t("bp.history"))+'</h2><div class="scroll"><table><tbody>';
      bpPage=pageClamp(bpPage, log.length);
      pageSlice(log, bpPage).forEach(function(e){
        html+='<tr><td style="width:33%">'+esc(fmtDateTime(e.ts))+injDayMarkersBlock(st, String(e.ts).slice(0,10))
            +(e.fasting?'<span class="pill" style="display:inline-block;margin-top:2px;background:#0ea5a422;color:var(--brand-dk)">'+esc(I18N.t("bp.fastingTag"))+'</span>':'')
            +(e.note?'<span class="muted tiny" style="display:block">'+esc(e.note)+'</span>':'')+'</td>'
            + '<td style="width:20%"><b class="nowrap">'+e.sys+'/'+e.dia+'</b>'
            + (e.pulse!=null?'<br><span class="muted tiny nowrap">'+e.pulse+' bpm</span>':'')+'</td>'
            + '<td style="width:25%">'+doseCell(e)+'</td>'
            + '<td class="num"><button class="btn ghost sm bpEdit" title="'+esc(I18N.t("common.edit"))+'" data-id="'+esc(e.id)+'">'+icon("edit")+'</button> '
            + '<button class="btn ghost sm bpDel" title="'+esc(I18N.t("common.delete"))+'" data-id="'+esc(e.id)+'">'+icon("trash")+'</button></td></tr>';
      });
      html+='</tbody></table></div>'+pagerHTML("bpPg", bpPage, log.length)+'</div>';
    }
    app.innerHTML=html;

    $("#bpAdd").addEventListener("click",function(){
      var sys=parseInt($("#bpSys").value,10), dia=parseInt($("#bpDia").value,10);
      if(isNaN(sys)||sys<=0){ $("#bpSys").focus(); return; }
      if(isNaN(dia)||dia<=0){ $("#bpDia").focus(); return; }
      var pulse=$("#bpPulse").value===""?null:parseInt($("#bpPulse").value,10);
      var whenVal=$("#bpDate").value ? $("#bpDate").value+"T"+($("#bpTime").value||"12:00") : "";
      var when=whenVal?new Date(whenVal):new Date();
      if(isNaN(when.getTime())) when=new Date();
      var fields={ ts:when.toISOString(), sys:sys, dia:dia,
                   pulse:(pulse==null||isNaN(pulse))?null:pulse, fasting:$("#bpFast").checked,
                   note:($("#bpNote").value||"").trim() };
      if(editing){
        // doseMg (legacy manual field) is left untouched on edit
        editing.ts=fields.ts; editing.sys=fields.sys; editing.dia=fields.dia; editing.pulse=fields.pulse;
        editing.fasting=fields.fasting; editing.note=fields.note;
        bpEdit=null;
      } else {
        fields.id=uid(); fields.doseMg=null;
        st.bp.log.push(fields);
      }
      st.bp.log.sort(function(a,b){ return a.ts<b.ts?1:a.ts>b.ts?-1:0; });
      bpPage=0;
      STORE.save(); toast(I18N.t("common.saved")); viewBP();
    });
    if($("#bpCancel")) $("#bpCancel").addEventListener("click",function(){ bpEdit=null; viewBP(); });
    bindPager("bpPg", function(){return bpPage;}, function(v){bpPage=v;}, viewBP);
    bindZoom("bpZoom", function(v){bpZoom=v;}, viewBP);
    // backfilling? recompute the dose/week pills for the picked date
    $("#bpDate").addEventListener("input",function(){
      var c=$("#bpCtx"); if(!c) return;
      var h=bpCtxHtml(this.value||todayISO());
      c.innerHTML=h; c.style.display=h?"":"none";
    });
    $all(".bpEdit").forEach(function(b){ b.addEventListener("click",function(){
      bpEdit=b.getAttribute("data-id"); viewBP(); window.scrollTo(0,0);
    });});
    $all(".bpDel").forEach(function(b){ b.addEventListener("click",function(){
      if(!confirm(I18N.t("bp.confirmDel"))) return;
      var id=b.getAttribute("data-id");
      st.bp.log = st.bp.log.filter(function(e){return e.id!==id;});
      if(bpEdit===id) bpEdit=null;
      STORE.save(); viewBP();
    });});
  }

  /* ---- 1-tap wellbeing check-ins (energy / mood / clarity, 1-5) ----
     Dots are a DRAFT: tapping selects (tap again deselects) without saving or
     re-rendering, so composed note text is never lost. Everything commits
     together with the "Save note" button — note alone, dots alone, or both. */
  var STATE_PARAMS=[{key:"energy",icon:"⚡"},{key:"mood",icon:"🙂"},{key:"clarity",icon:"🧠"}];
  var STATE_COLORS=["#dc2626","#f97316","#fbbf24","#84cc16","#16a34a"];
  var stateDraft={ energy:null, mood:null, clarity:null };
  function stateDraftHasValues(){
    return STATE_PARAMS.some(function(p){ return stateDraft[p.key]!=null; });
  }
  function hasStateVals(e){
    return !!e && STATE_PARAMS.some(function(p){ return e[p.key]!=null; });
  }
  function statePillsHTML(e){
    return STATE_PARAMS.map(function(p){
      var v=e[p.key];
      return v==null ? '' : '<span class="statepill" style="background:'+STATE_COLORS[v-1]+'"><span class="pemoji">'+p.icon+'</span>'+v+'</span>';
    }).join('');
  }
  function stateRowsHTML(){
    var h='<div style="margin:0 0 10px"><div style="font-size:14px;font-weight:800;color:var(--ink);margin:0 0 2px">'+esc(I18N.t("state.title"))
      +' <span class="muted tiny" style="font-weight:400">— '+esc(I18N.t("state.hint"))+'</span></div>';
    STATE_PARAMS.forEach(function(p){
      h+='<div class="staterow"><span class="sname">'+p.icon+' '+esc(I18N.t("state."+p.key))+'</span><span class="sdots">';
      for(var v=1; v<=5; v++){
        h+='<button type="button" class="sdot'+(stateDraft[p.key]===v?" on":"")+'" data-sp="'+p.key+'" data-v="'+v
          +'" style="background:'+STATE_COLORS[v-1]+';color:'+STATE_COLORS[v-1]+'" aria-label="'+esc(I18N.t("state."+p.key))+' '+v+'/5"></button>';
      }
      h+='</span></div>';
    });
    return h+'</div>';
  }
  function bindStateDots(){
    $all(".sdot").forEach(function(b){ b.addEventListener("click",function(){
      var k=b.getAttribute("data-sp"), v=parseInt(b.getAttribute("data-v"),10);
      stateDraft[k] = (stateDraft[k]===v) ? null : v;   // tap again = deselect
      $all('.sdot[data-sp="'+k+'"]').forEach(function(x){
        x.classList.toggle("on", parseInt(x.getAttribute("data-v"),10)===stateDraft[k]);
      });
    });});
  }

  /* ============ DIARY (free-text journal / log) ============ */
  // Therapy-week context (Mounjaro / TRT) for a given date, counted from the
  // first logged shot of each substance. Empty until a first shot exists.
  function weekTags(st, dateISO){
    var out=[];
    ["mounjaro","trt"].forEach(function(sub){
      var w=DOMAIN.therapyWeek(DOMAIN.firstInjDateFor(st,sub), dateISO);
      if(w==null) return;
      out.push({ label:(sub==="mounjaro"?"MJ":"TRT"), week:w,
                 dose:DOMAIN.lastDoseAsOf(st,sub,dateISO),
                 doseWeek:doseWeekAsOf(st,sub,dateISO), color:SUBSTANCE_COLORS[sub] });
    });
    return out;
  }
  // Same notation as the history dose pills: "Mounjaro 2.5 mg t5 · d5"
  function weekPills(tags){
    return tags.map(function(t){
      return '<span class="pill" style="background:'+t.color+'22;color:'+t.color+'">'
        +esc(t.label)
        +(t.dose?' '+esc(t.dose.dose+" "+t.dose.unit):'')
        +' '+esc(I18N.t("common.weekLetter"))+t.week
        +(t.dose&&t.doseWeek!=null?' &middot; '+esc(I18N.t("common.doseWeekLetter"))+t.doseWeek:'')+'</span>';
    }).join(" ");
  }
  var journalEdit=null;  // id of the note being edited (null = composing a new one)
  var journalPage=0;     // notes list page (5 each)
  function viewDiary(){
    var st=s(), today=todayISO();
    var editing=null;
    if(journalEdit){
      for(var ji=0;ji<(st.journal||[]).length;ji++){ if(st.journal[ji].id===journalEdit){ editing=st.journal[ji]; break; } }
      if(!editing) journalEdit=null;
    }
    var html='<h1 class="page">'+esc(I18N.t("diary.title"))+'</h1>';

    // composer: therapy-week + dose context, textarea, editable timestamp (backfill)
    var whenVal = editing ? toLocalDT(editing.ts) : nowLocalDT();
    function ctxHtml(dISO){
      var tags=weekTags(st, dISO);
      return tags.length ? weekPills(tags) : '<span class="muted tiny">'+esc(I18N.t("diary.ctxNone"))+'</span>';
    }
    html+='<div class="card"><p class="sub">'+esc(I18N.t("diary.sub"))+'</p>'
      + (editing?'<div class="note" style="margin:0 0 10px">'+esc(I18N.t("diary.editing"))+'</div>':'')
      + '<div class="row" id="jCtx" style="margin:0 0 10px">'+ctxHtml(whenVal.slice(0,10))+'</div>'
      + stateRowsHTML()
      + '<div class="field"><textarea id="jText" rows="3" maxlength="2000" placeholder="'+esc(I18N.t("diary.ph"))+'">'+(editing?esc(editing.text):'')+'</textarea></div>'
      + '<div class="grid g2"><div class="field"><label>'+esc(I18N.t("diary.when"))+' <span class="muted tiny">('+esc(I18N.t("diary.whenHint"))+')</span></label><input type="date" id="jDate" value="'+whenVal.slice(0,10)+'"></div>'
      + '<div class="field"><label>'+esc(I18N.t("common.time"))+'</label><input type="time" id="jTime" value="'+whenVal.slice(11,16)+'"></div></div>'
      + '<div class="row"><button class="btn" id="jAdd">'+esc(I18N.t(editing?"diary.update":"diary.add"))+'</button>'
      + (editing?'<button class="btn ghost" id="jCancel">'+esc(I18N.t("common.cancel"))+'</button>':'')
      + '<span class="muted tiny">'+esc(I18N.t("diary.ctrlEnter"))+'</span></div>'
      + '</div>';

    // log list: journal entries (text and/or wellbeing), legacy standalone
    // check-ins and old slider-diary notes, newest first
    var items=(st.journal||[]).map(function(e){ return {id:e.id, key:String(e.ts), ts:e.ts, text:e.text, vals:(hasStateVals(e)?e:null), legacy:false}; });
    (st.stateLog||[]).forEach(function(e){
      items.push({id:e.id, key:String(e.ts), ts:e.ts, state:e, legacy:false});
    });
    (st.dailyLog||[]).forEach(function(e){
      if(e && e.note) items.push({id:e.id, key:e.date+"T12:00", date:e.date, text:e.note, legacy:true});
    });
    items.sort(function(a,b){ return a.key<b.key?1:a.key>b.key?-1:0; });

    html+='<div class="card"><h2>'+esc(I18N.t("diary.list"))+'</h2>';
    if(!items.length){
      html+='<div class="empty">'+esc(I18N.t("diary.empty"))+'</div>';
    } else {
      // entries stay separate, but the list groups them under one day header
      // that carries the day-level context (t/d pills + injection markers) once
      function dayLabel(dISO){
        if(dISO===today) return I18N.t("diary.today");
        if(dISO===addDaysISO(today,-1)) return I18N.t("diary.yesterday");
        return fmtDate(dISO);
      }
      journalPage=pageClamp(journalPage, items.length);
      var lastDay=null;
      pageSlice(items, journalPage).forEach(function(it){
        var dISO=it.legacy?it.date:String(it.ts).slice(0,10);
        if(dISO!==lastDay){
          lastDay=dISO;
          html+='<div class="dayhead"><span>'+esc(dayLabel(dISO))+injDayMarkers(st,dISO)+'</span>'+weekPills(weekTags(st,dISO))+'</div>';
        }
        var meta=(it.legacy
          ? '<span class="pill" style="background:var(--soft);color:var(--muted)">'+esc(I18N.t("diary.legacyTag"))+'</span>'
          : '<span>'+esc(fmtTime(it.ts))+'</span>');
        var body = it.state ? statePillsHTML(it.state)
          : (it.vals?statePillsHTML(it.vals):'')
            + (it.text ? ((it.vals?'<div style="margin-top:3px">':'')+esc(it.text)+(it.vals?'</div>':'')) : '');
        html+='<div class="logentry"><div class="lbody"><div class="lmeta">'+meta+'</div>'
          +'<div class="ltext">'+body+'</div></div>'
          +(it.legacy?'':(it.state
            ?'<button class="btn ghost sm sDel" title="'+esc(I18N.t("common.delete"))+'" data-id="'+esc(it.id)+'">'+icon("trash")+'</button>'
            :'<button class="btn ghost sm jEdit" title="'+esc(I18N.t("common.edit"))+'" data-id="'+esc(it.id)+'">'+icon("edit")+'</button>'
            +'<button class="btn ghost sm jDel" title="'+esc(I18N.t("common.delete"))+'" data-id="'+esc(it.id)+'">'+icon("trash")+'</button>'))
          +'</div>';
      });
      html+=pagerHTML("jPg", journalPage, items.length);
    }
    html+='</div>';
    html+='<div class="rellinks"><a class="btn ghost" href="#inject">'+icon("inject")+esc(I18N.t("rel.toInject"))+icon("arrow")+'</a></div>';

    app.innerHTML=html;

    function saveNote(){
      // one entry carries both the text and the wellbeing dots — either alone is fine
      var txt=($("#jText").value||"").trim();
      var hasState=stateDraftHasValues();
      if(!txt && !hasState){ $("#jText").focus(); return; }
      var wv=$("#jDate").value ? $("#jDate").value+"T"+($("#jTime").value||"12:00") : "";
      var when=wv?new Date(wv):new Date();
      if(isNaN(when.getTime())) when=new Date();
      if(!st.journal) st.journal=[];
      if(editing){
        editing.text=txt; editing.ts=when.toISOString();
        STATE_PARAMS.forEach(function(p){ editing[p.key]=stateDraft[p.key]; });
        journalEdit=null;
      } else {
        var entry={ id:uid(), ts:when.toISOString(), text:txt,
                    energy:stateDraft.energy, mood:stateDraft.mood, clarity:stateDraft.clarity };
        st.journal.push(entry);
      }
      st.journal.sort(function(a,b){ return a.ts<b.ts?1:a.ts>b.ts?-1:0; });
      stateDraft={ energy:null, mood:null, clarity:null };
      journalPage=0;
      STORE.save(); toast(I18N.t("common.saved")); viewDiary();
    }
    $("#jAdd").addEventListener("click", saveNote);
    if($("#jCancel")) $("#jCancel").addEventListener("click",function(){
      journalEdit=null; stateDraft={ energy:null, mood:null, clarity:null }; viewDiary();
    });
    bindPager("jPg", function(){return journalPage;}, function(v){journalPage=v;}, viewDiary);
    // backfilling? recompute the therapy-week/dose pills for the picked date
    $("#jDate").addEventListener("input",function(){
      var c=$("#jCtx"); if(c) c.innerHTML=ctxHtml(this.value||today);
    });
    $("#jText").addEventListener("keydown",function(ev){
      if(ev.key==="Enter" && (ev.ctrlKey||ev.metaKey)) saveNote();
    });
    $all(".jEdit").forEach(function(b){ b.addEventListener("click",function(){
      journalEdit=b.getAttribute("data-id");
      var en=(st.journal||[]).filter(function(e){ return e.id===journalEdit; })[0];
      STATE_PARAMS.forEach(function(p){ stateDraft[p.key]=(en&&en[p.key]!=null)?en[p.key]:null; });
      viewDiary(); window.scrollTo(0,0);
    });});
    $all(".jDel").forEach(function(b){ b.addEventListener("click",function(){
      if(!confirm(I18N.t("diary.confirmDel"))) return;
      var id=b.getAttribute("data-id");
      st.journal=(st.journal||[]).filter(function(e){ return e.id!==id; });
      if(journalEdit===id) journalEdit=null;
      STORE.save(); viewDiary();
    });});
    $all(".sDel").forEach(function(b){ b.addEventListener("click",function(){
      if(!confirm(I18N.t("state.confirmDel"))) return;
      var id=b.getAttribute("data-id");
      st.stateLog=(st.stateLog||[]).filter(function(e){ return e.id!==id; });
      STORE.save(); viewDiary();
    });});
    bindStateDots();
  }

  /* ============ INJECTIONS (Mounjaro / TRT / peptides) + abdomen spot map ============ */
  var SUBSTANCE_COLORS={ mounjaro:"#0ea5a4", trt:"#6366f1", peptide:"#f59e0b" };

  // Compact substance-coloured dose pills (MJ/TRT) in effect on a given date,
  // shared by the BP and weight histories. Each pill ends with the therapy
  // week on that substance as of that date ("t5"), styled exactly like the
  // rest of the pill text. manualMg is a legacy, manually entered Mounjaro
  // dose shown only when no injection data covers the date.
  function dosePill(label, txt, color, week, doseWeek){
    return '<span class="pill" style="background:'+color+'22;color:'+color+';padding:2px 7px;font-size:11px;white-space:nowrap">'+(label?label+' ':'')+esc(txt)
      +(week!=null?' '+esc(I18N.t("common.weekLetter"))+week:'')
      +(doseWeek!=null?' &middot; '+esc(I18N.t("common.doseWeekLetter"))+doseWeek:'')+'</span>';
  }
  // Injection-day marker: a small syringe per substance injected on that date,
  // shown next to dates in the weight/BP/diary histories so shot days stand
  // out at a glance. Legacy jab.history dates count as Mounjaro.
  function injDayMarkers(st, dISO){
    var subs=[];
    (st.injLog||[]).forEach(function(e){ if(e && e.date===dISO && subs.indexOf(e.substance)<0) subs.push(e.substance); });
    if(subs.indexOf("mounjaro")<0 && st.jab && (st.jab.history||[]).indexOf(dISO)>=0) subs.push("mounjaro");
    if(!subs.length) return "";
    return subs.map(function(sub){
      return '<span class="injmark" title="'+esc(I18N.t("inj.seg."+sub))+'" style="color:'+(SUBSTANCE_COLORS[sub]||"#94a3b8")+'">'+icon("inject")+'</span>';
    }).join('');
  }
  // same markers on their own line (for narrow date columns in history tables)
  function injDayMarkersBlock(st, dISO){
    var m=injDayMarkers(st, dISO);
    return m ? '<div class="daymarks">'+m+'</div>' : '';
  }

  // single-substance pill for "now": "2.5 mg t5 · d5" (no label — context names it)
  function nowDosePill(st, sub, todayISOstr){
    var ld=DOMAIN.lastDoseAsOf(st, sub, todayISOstr); if(!ld) return "";
    var w=DOMAIN.therapyWeek(DOMAIN.firstInjDateFor(st,sub), todayISOstr);
    return dosePill("", ld.dose+" "+ld.unit, SUBSTANCE_COLORS[sub]||"#94a3b8", w, doseWeekAsOf(st,sub,todayISOstr));
  }
  // week on the current dose, only when the setting is on
  function doseWeekAsOf(st, sub, dISO){
    if(!st.settings.showDoseWeeks) return null;
    var s=DOMAIN.doseStreakAsOf(st, sub, dISO);
    return s?s.weeks:null;
  }
  function dosePillsAsOf(st, dISO, manualMg){
    var mj=DOMAIN.lastDoseAsOf(st,"mounjaro",dISO), trt=DOMAIN.lastDoseAsOf(st,"trt",dISO);
    var wm=DOMAIN.therapyWeek(DOMAIN.firstInjDateFor(st,"mounjaro"), dISO);
    var wt=DOMAIN.therapyWeek(DOMAIN.firstInjDateFor(st,"trt"), dISO);
    var parts=[];
    if(mj) parts.push(dosePill("MJ", mj.dose+" "+mj.unit, SUBSTANCE_COLORS.mounjaro, wm, doseWeekAsOf(st,"mounjaro",dISO)));
    if(trt) parts.push(dosePill("TRT", trt.dose+" "+trt.unit, SUBSTANCE_COLORS.trt, wt, doseWeekAsOf(st,"trt",dISO)));
    if(!parts.length && manualMg!=null) parts.push(dosePill("MJ", manualMg+" mg", SUBSTANCE_COLORS.mounjaro, wm, doseWeekAsOf(st,"mounjaro",dISO)));
    return parts.length?'<span style="display:inline-flex;gap:4px;flex-wrap:wrap">'+parts.join('')+'</span>':'—';
  }

  // Approximate cm-from-navel positions for the legacy fixed sites, so old
  // entries still show on the abdomen close-up. Thigh sites have no place on
  // this map and are skipped (their history rows keep their labels).
  var LEGACY_SITE_CM={
    belly_ul:{x:-4,y:-4}, belly_ur:{x:4,y:-4}, belly_ll:{x:-4,y:4}, belly_lr:{x:4,y:4},
    love_l1:{x:-13,y:-2}, love_l2:{x:-13,y:3}, love_r1:{x:13,y:-2}, love_r2:{x:13,y:3}
  };

  // Abdomen close-up map: 6 svg units = 1 cm, navel at the centre. Stored
  // positions stay in cm-from-navel, so this scale is presentation-only.
  var BELLY_W=220, BELLY_H=160, BELLY_CX=110, BELLY_CY=78, BELLY_CM=6;
  function cmToSvg(p){ return { x:BELLY_CX+p.x*BELLY_CM, y:BELLY_CY+p.y*BELLY_CM }; }
  function svgToCm(x,y){ return { x:(x-BELLY_CX)/BELLY_CM, y:(y-BELLY_CY)/BELLY_CM }; }
  function bellyQuadrant(p){ return "belly_"+(p.y<0?"u":"l")+(p.x<0?"l":"r"); }
  // "4 cm w lewo · 2 cm w górę od pępka"
  function posLabel(p){
    if(!p) return "";
    function n(v){ v=Math.abs(v); return (Math.round(v*10)/10).toString().replace(/\.0$/,""); }
    var parts=[];
    if(Math.abs(p.x)>=0.3) parts.push(n(p.x)+" cm "+I18N.t(p.x<0?"inj.cmLeft":"inj.cmRight"));
    if(Math.abs(p.y)>=0.3) parts.push(n(p.y)+" cm "+I18N.t(p.y<0?"inj.cmUp":"inj.cmDown"));
    return parts.length ? parts.join(" · ")+" "+I18N.t("inj.fromNavel") : I18N.t("inj.navel");
  }
  function recentSpots(st){ return DOMAIN.recentInjPos(st, todayISO(), 14, LEGACY_SITE_CM); }
  function bellyMapSVG(st, selPos, withSuggest){
    var recent=recentSpots(st);
    var sug = (withSuggest && !selPos) ? DOMAIN.suggestSpot(recent) : null;
    var minR=DOMAIN.SPOT_MIN_CM*BELLY_CM, navR=DOMAIN.SPOT_NAVEL_CM*BELLY_CM;
    var svg='<svg class="bellymap" id="bellyMap" viewBox="0 0 '+BELLY_W+' '+BELLY_H+'" role="img" aria-label="abdomen injection map">';
    // skin area
    svg+='<rect x="6" y="6" width="'+(BELLY_W-12)+'" height="'+(BELLY_H-12)+'" rx="26" fill="var(--soft)" stroke="var(--line)" stroke-width="1.6"/>';
    // faint 5 cm grid to help judge distances
    for(var gx=BELLY_CX%(5*BELLY_CM); gx<BELLY_W; gx+=5*BELLY_CM)
      svg+='<line x1="'+gx+'" y1="8" x2="'+gx+'" y2="'+(BELLY_H-8)+'" stroke="var(--line)" stroke-width="0.5" opacity="0.5"/>';
    for(var gy=BELLY_CY%(5*BELLY_CM); gy<BELLY_H; gy+=5*BELLY_CM)
      svg+='<line x1="8" y1="'+gy+'" x2="'+(BELLY_W-8)+'" y2="'+gy+'" stroke="var(--line)" stroke-width="0.5" opacity="0.5"/>';
    // navel + 5 cm exclusion zone
    svg+='<g><circle cx="'+BELLY_CX+'" cy="'+BELLY_CY+'" r="'+navR+'" fill="rgba(220,38,38,.07)" stroke="#dc2626" stroke-width="1.4" stroke-dasharray="5 4"/>'
      +'<circle cx="'+BELLY_CX+'" cy="'+BELLY_CY+'" r="3.4" fill="var(--muted)"/>'
      +'<title>'+esc(I18N.t("inj.navel"))+' · 5 cm</title></g>';
    // recent shots (last 14 days): dot + 3 cm ring + per-substance order badge
    recent.forEach(function(r){
      var p=cmToSvg(r.pos), c=SUBSTANCE_COLORS[r.substance]||"#94a3b8";
      var op=Math.max(0.35, 1-(r.ageDays/14)*0.65);
      var tip=(r.ts?fmtDateTime(r.ts):r.date)+" · "+I18N.t("inj.seg."+r.substance)
        +(r.dose!=null?" · "+r.dose+" "+(r.unit||""):"");
      svg+='<g opacity="'+op.toFixed(2)+'">'
        +'<circle cx="'+p.x.toFixed(1)+'" cy="'+p.y.toFixed(1)+'" r="'+minR+'" fill="none" stroke="'+c+'" stroke-width="1" stroke-dasharray="3 3" opacity="0.6"/>'
        +'<circle cx="'+p.x.toFixed(1)+'" cy="'+p.y.toFixed(1)+'" r="6.5" fill="'+c+'" stroke="#fff" stroke-width="1.4"/>'
        +'<text x="'+p.x.toFixed(1)+'" y="'+(p.y+2.6).toFixed(1)+'" font-size="7.5" font-weight="800" fill="#fff" text-anchor="middle">'+r.order+'</text>'
        +'<title>'+esc(tip)+'</title></g>';
    });
    // suggested spot (dashed, brand) when nothing is selected
    if(sug){
      var sp=cmToSvg(sug);
      svg+='<g><circle cx="'+sp.x.toFixed(1)+'" cy="'+sp.y.toFixed(1)+'" r="9" fill="none" stroke="var(--brand)" stroke-width="2" stroke-dasharray="3 3"/>'
        +'<circle cx="'+sp.x.toFixed(1)+'" cy="'+sp.y.toFixed(1)+'" r="2.6" fill="var(--brand)"/>'
        +'<title>'+esc(I18N.t("inj.suggested"))+'</title></g>';
    }
    // selected spot: crosshair, red when it breaks the rules
    if(selPos){
      var sel=cmToSvg(selPos), ok=DOMAIN.spotCheck(selPos, recent).ok, sc=ok?"var(--brand)":"#dc2626";
      svg+='<g pointer-events="none"><circle cx="'+sel.x.toFixed(1)+'" cy="'+sel.y.toFixed(1)+'" r="9" fill="none" stroke="'+sc+'" stroke-width="2.6"/>'
        +'<line x1="'+(sel.x-13).toFixed(1)+'" y1="'+sel.y.toFixed(1)+'" x2="'+(sel.x-5).toFixed(1)+'" y2="'+sel.y.toFixed(1)+'" stroke="'+sc+'" stroke-width="2"/>'
        +'<line x1="'+(sel.x+5).toFixed(1)+'" y1="'+sel.y.toFixed(1)+'" x2="'+(sel.x+13).toFixed(1)+'" y2="'+sel.y.toFixed(1)+'" stroke="'+sc+'" stroke-width="2"/>'
        +'<line x1="'+sel.x.toFixed(1)+'" y1="'+(sel.y-13).toFixed(1)+'" x2="'+sel.x.toFixed(1)+'" y2="'+(sel.y-5).toFixed(1)+'" stroke="'+sc+'" stroke-width="2"/>'
        +'<line x1="'+sel.x.toFixed(1)+'" y1="'+(sel.y+5).toFixed(1)+'" x2="'+sel.x.toFixed(1)+'" y2="'+(sel.y+13).toFixed(1)+'" stroke="'+sc+'" stroke-width="2"/>'
        +'</g>';
    }
    svg+='</svg>';
    var leg='<div class="maplegend">'
      +'<span><i style="background:'+SUBSTANCE_COLORS.mounjaro+'"></i>Mounjaro</span>'
      +'<span><i style="background:'+SUBSTANCE_COLORS.trt+'"></i>TRT</span>'
      +'<span><i style="background:'+SUBSTANCE_COLORS.peptide+'"></i>'+esc(I18N.t("inj.seg.peptide"))+'</span>'
      +'<span><i style="background:transparent;border:1.5px dashed #dc2626"></i>'+esc(I18N.t("inj.navel"))+' 5 cm</span>'
      +(sug?'<span><i style="background:transparent;border:1.5px dashed var(--brand)"></i>'+esc(I18N.t("inj.suggested"))+'</span>':'')
      +'</div>';
    return svg+leg;
  }
  function progressBar(frac, color, leftLabel, rightLabel){
    frac=Math.max(0,Math.min(1,frac||0));
    return '<div class="pbwrap"><div class="pbar"><span style="width:'+(frac*100).toFixed(1)+'%;background:'+color+'"></span></div>'
      +'<div class="pblabels"><span>'+esc(leftLabel||"")+'</span><span>'+esc(rightLabel||"")+'</span></div></div>';
  }
  function lastInjDate(st, substance){
    var d=null;
    (st.injLog||[]).forEach(function(e){ if(e.substance===substance && (!d || e.date>d)) d=e.date; });
    return d;
  }

  var injSeg="mounjaro", injSel=null, injEdit=null;  // injSel: picked spot {x,y} in cm from navel (null=>suggested); injEdit: id being edited
  var injPage=0;  // history page (5 rows each)
  var injDraft={dose:"",name:"",when:""};             // preserves typed dose/blend/time across the site-pick re-render
  /* ---- Mounjaro pen tracker: clicks + insulin-syringe golden dose ---- */
  // Shot at absolute 0-based index k in a repeating schedule: wraps the cycle
  // and offsets pen numbers by the completed cycles.
  function trkShotAt(ps, k){
    if(ps.cycleComplete && ps.shots.length){
      var cyc=Math.floor(k/ps.shots.length);
      return { sh:ps.shots[k%ps.shots.length], off:cyc*ps.pens };
    }
    return { sh:ps.shots[k]||null, off:0 };
  }
  function trkPill(txt, gold){
    return '<span class="pill" style="font-size:14px;font-weight:700;padding:6px 10px;background:'
      +(gold?'#f59e0b22;color:#d97706':'#0ea5a422;color:#0ea5a4')+'">'+txt+'</span>';
  }
  function mgLbl(s){ return fmtNum(s, (s%1)?1:0)+' mg'; }
  // Effective strength / dose given mid-plan prescription changes. Mirrors the
  // lookup DOMAIN.penSchedule does internally so the UI can label things.
  function trkStrengthOf(pt, p){
    var s=pt.strengthMg||5, ch=pt.strengthChanges||[];
    for(var i=0;i<ch.length;i++){ if(p>ch[i].afterPen) s=ch[i].s; }
    return s;
  }
  function trkDoseAt(pt, n){
    var d=pt.dose, ch=pt.doseChanges||[];
    for(var i=0;i<ch.length;i++){ if(n>=ch[i].fromShot) d=ch[i].dose; }
    return d;
  }
  function trkHasChanges(pt){ return (pt.strengthChanges||[]).length>0 || (pt.doseChanges||[]).length>0; }
  function trkSchedule(pt, cap){
    if(!(pt.dose>0)) return {error:"badInput"};
    return DOMAIN.penSchedule(pt.strengthMg||5, [pt.dose], cap,
      { strengthChanges:pt.strengthChanges||[], doseChanges:pt.doseChanges||[] });
  }
  // breakdown of one shot: clicks from the pen / syringe units / new-pen clicks.
  // Strengths are spelled out when the shot mixes two pen strengths.
  function trkParts(sh, off){
    var mixed = sh.newPenS!=null && sh.newPenS!==sh.penS;
    var sfx = mixed ? ' ('+mgLbl(sh.penS)+')' : '';
    var p=[];
    if(sh.clicks) p.push(trkPill('🖊 '+sh.clicks+' '+esc(I18N.t("trk.clicksPen"))+sfx,false));
    if(sh.syringeUnits) p.push(trkPill('💉 '+sh.syringeUnits+' '+esc(I18N.t("trk.syr"))+sfx,true));
    if(sh.newPenClicks) p.push(trkPill('🖊 '+sh.newPenClicks+' '+esc(I18N.t("trk.newPen"))+' ('+esc(I18N.t("trk.pen"))+' '+(sh.penNoNew+off)+(mixed?' · '+mgLbl(sh.newPenS):'')+')',false));
    return p.join(" ");
  }
  function trkCompact(sh, off){
    var mixed = sh.newPenS!=null && sh.newPenS!==sh.penS;
    var sfx = mixed ? ' ('+mgLbl(sh.penS)+')' : '';
    var p=[];
    if(sh.clicks) p.push('<b>'+sh.clicks+'</b> '+esc(I18N.t("trk.clicksPen"))+sfx);
    if(sh.syringeUnits) p.push('💉 <b style="color:#d97706">'+sh.syringeUnits+'</b> '+esc(I18N.t("trk.syr"))+sfx);
    if(sh.newPenClicks) p.push('<b>'+sh.newPenClicks+'</b> '+esc(I18N.t("trk.newPen"))+' ('+esc(I18N.t("trk.pen"))+' '+(sh.penNoNew+off)+(mixed?' · '+mgLbl(sh.newPenS):'')+')');
    return p.join(" + ");
  }
  // breakdown of the shot the tracker expects NEXT (used to stamp log entries)
  function trkCurrentDraw(st){
    var pt=st.penTracker;
    var ps=trkSchedule(pt, pt.shotsDone+2);
    if(ps.error) return null;
    var cur=trkShotAt(ps, pt.shotsDone);
    if(!cur.sh) return null;
    return { c:cur.sh.clicks, s:cur.sh.syringeUnits, n:cur.sh.newPenClicks,
             p:cur.sh.penNo+cur.off, pn:cur.sh.penNoNew!=null?cur.sh.penNoNew+cur.off:null,
             cS:cur.sh.penS, nS:cur.sh.newPenS };
  }
  function penDrawLabel(d){
    var mixed = d.nS!=null && d.cS!=null && d.nS!==d.cS;
    var sfx = mixed ? ' ('+mgLbl(d.cS)+')' : '';
    var p=[];
    if(d.c) p.push(d.c+' '+I18N.t("trk.clicksShort")+sfx);
    if(d.s) p.push('💉 '+d.s+' '+I18N.t("sch.units")+sfx);
    if(d.n) p.push(d.n+' '+I18N.t("trk.clicksShort")+' ('+I18N.t("trk.pen")+' '+d.pn+(mixed?' · '+mgLbl(d.nS):'')+')');
    return p.join(' + ');
  }
  // fuel-gauge of the current pen: 240-click section + 60-unit golden section
  function penBarHTML(penClicks, goldenLeft){
    var C=DOMAIN.CLICKS_PER_PEN, G=DOMAIN.GOLDEN_UNITS;
    return '<div style="display:flex;gap:3px;height:14px;margin:12px 0 6px">'
      +'<div style="flex:'+C+';background:var(--soft);border:1px solid var(--line);border-radius:7px;overflow:hidden"><div style="height:100%;width:'+(penClicks/C*100)+'%;background:#0ea5a4"></div></div>'
      +'<div style="flex:'+G+';background:var(--soft);border:1px solid var(--line);border-radius:7px;overflow:hidden"><div style="height:100%;width:'+(goldenLeft/G*100)+'%;background:#f59e0b"></div></div>'
      +'</div>';
  }
  function penTrackerHTML(st){
    var pt=st.penTracker;
    var html='<div class="card">'
      +'<label class="toggle"><input type="checkbox" id="ptOn"'+(pt.enabled?" checked":"")+'><span class="switch"></span><span><b>'+esc(I18N.t("trk.toggle"))+'</b></span></label>';
    if(pt.enabled){
      var ps=trkSchedule(pt, pt.shotsDone+8);
      var cur=ps.error?null:trkShotAt(ps, pt.shotsDone);
      if(cur && !cur.sh) cur=null;
      var curPen = cur ? cur.sh.penNo+cur.off : 1;
      var curS = cur ? cur.sh.penS : (pt.strengthMg||5);
      var nextPenS = trkStrengthOf(pt, curPen+1);
      var doseNow = trkDoseAt(pt, pt.shotsDone);
      // the chips pick the strength of the NEXT pen to open — mid-plan the
      // current pen physically stays what it is
      html+='<div class="field" style="margin-top:12px"><label>'+esc(I18N.t("opt.penStrength"))+'</label>'+chipRow("ptStr",STRENGTHS,nextPenS,"mg")+'</div>';
      if(cur && nextPenS!==curS){
        html+='<div class="warnbox" style="margin:-4px 0 10px">'+esc(I18N.t("trk.strengthPending").replace("{old}",fmtNum(curS,(curS%1)?1:0)).replace("{new}",fmtNum(nextPenS,(nextPenS%1)?1:0)))+'</div>';
      } else if(pt.shotsDone>0 || trkHasChanges(pt)){
        html+='<p class="tiny muted" style="margin:-4px 0 10px">'+esc(I18N.t("trk.strengthHint"))+'</p>';
      }
      html+='<div class="field" style="max-width:240px"><label>'+esc(I18N.t("trk.dose"))+'</label><input type="number" inputmode="decimal" step="0.25" id="ptDose" value="'+(doseNow!=null?doseNow:"")+'"></div>';
      var dPend=(pt.doseChanges||[]).filter(function(e){return e.fromShot===pt.shotsDone;});
      if(dPend.length){
        var dpv=dPend[dPend.length-1].dose;
        html+='<p class="tiny" style="margin:-4px 0 10px;color:#d97706">'+esc(I18N.t("trk.dosePending").replace("{new}",fmtNum(dpv,(dpv%1)?2:0)))+'</p>';
      }
      if(!cur){
        html+='<div class="note">'+esc(I18N.t("trk.badDose"))+'</div>';
      } else {
        var sh=cur.sh, off=cur.off;
        var mixed = sh.newPenS!=null && sh.newPenS!==sh.penS;
        html+='<p class="tiny muted" style="margin:0 0 10px">'+esc(clickEqText(sh.penS))
          +(mixed?'<br>'+esc(clickEqText(sh.newPenS))+' — '+esc(I18N.t("trk.pen"))+' '+(sh.penNoNew+off):'')+'</p>';
        // pen state going INTO this shot (a drained pen was already swapped)
        var pen0=DOMAIN.CLICKS_PER_PEN, gold0=DOMAIN.GOLDEN_UNITS;
        if(pt.shotsDone>0){
          var prev=trkShotAt(ps, pt.shotsDone-1);
          pen0=prev.sh.penLeftAfter; gold0=prev.sh.goldenLeftAfter;
          if(pen0===0 && gold0===0){ pen0=DOMAIN.CLICKS_PER_PEN; gold0=DOMAIN.GOLDEN_UNITS; }
        }
        html+='<div style="border:2px solid #0ea5a4;border-radius:14px;padding:12px">'
          +'<div class="tiny" style="text-transform:uppercase;letter-spacing:.6px;color:#0ea5a4;font-weight:700">'
            +esc(I18N.t("trk.now").replace("{n}",pt.shotsDone+1))+' · '+esc(I18N.t("trk.pen"))+' '+(sh.penNo+off)+' ('+esc(mgLbl(sh.penS))+')</div>'
          +'<div class="row" style="gap:6px;margin-top:8px">'+trkParts(sh,off)+'</div>'
          +'<div class="tiny muted" style="margin-top:6px">= '+fmtNum(sh.mg,2)+' mg</div>'
        +'</div>';
        html+=penBarHTML(pen0, gold0);
        html+='<div class="tiny muted" style="margin:0 0 4px">'+esc(I18N.t("trk.beforeDose").replace("{n}",pt.shotsDone+1))+': <b style="color:var(--ink)">'+pen0+' '+esc(I18N.t("common.clicks"))+'</b> + <b style="color:#d97706">'+esc(I18N.t("trk.golden"))+' '+gold0+' '+esc(I18N.t("sch.units"))+'</b></div>';
        var nx='';
        for(var k=pt.shotsDone+1;k<=pt.shotsDone+3;k++){
          var it=trkShotAt(ps,k); if(!it.sh) break;
          nx+='<div style="display:flex;gap:8px;align-items:baseline;padding:5px 0;border-top:1px dashed var(--line)">'
            +'<span class="muted tiny" style="flex:0 0 36px">#'+(k+1)+'</span>'
            +'<span class="small">'+trkCompact(it.sh,it.off)
              +' <span class="muted tiny">· '+esc(I18N.t("trk.willLeave"))+' '+it.sh.penLeftAfter+' '+esc(I18N.t("trk.clicksShort"))+' + '+it.sh.goldenLeftAfter+' '+esc(I18N.t("sch.units"))+'</span></span></div>';
        }
        if(nx) html+='<div style="margin-top:10px"><div class="tiny muted" style="font-weight:600;margin-bottom:2px">'+esc(I18N.t("trk.next"))+'</div>'+nx+'</div>';
        html+='<div class="row" style="align-items:center;gap:8px;margin-top:12px">'
          +'<button class="btn ghost sm" id="ptMinus" style="min-width:42px" title="'+esc(I18N.t("trk.minus"))+'">−</button>'
          +'<span class="small"><b>'+pt.shotsDone+'</b> '+esc(I18N.t("trk.done"))+'</span>'
          +'<button class="btn ghost sm" id="ptPlus" style="min-width:42px" title="'+esc(I18N.t("trk.plus"))+'">+</button>'
          +'<button class="btn ghost sm" id="ptReset">'+esc(I18N.t("trk.reset"))+'</button>'
        +'</div>';
        html+='<p class="tiny muted" style="margin:8px 0 0">'+esc(I18N.t("trk.hint"))+'</p>';
        html+='<div class="rellinks" style="margin-top:10px"><a class="btn ghost" href="#optimizer">'+icon("calc")+esc(I18N.t("rel.toCalc"))+icon("arrow")+'</a></div>';
      }
    }
    html+='</div>';
    return html;
  }

  function viewInject(){
    var st=s(), today=todayISO();
    if(["mounjaro","trt","peptide"].indexOf(injSeg)<0) injSeg="mounjaro";
    var editing=null;
    if(injEdit){
      if(injEdit.indexOf("jab:")===0){   // legacy Mounjaro date with no injLog entry yet
        editing={ id:injEdit, date:injEdit.slice(4), substance:"mounjaro", dose:null, unit:"mg", site:null, jabOnly:true };
        injSeg="mounjaro";
      } else {
        for(var ei=0;ei<st.injLog.length;ei++){ if(st.injLog[ei].id===injEdit){ editing=st.injLog[ei]; break; } }
        if(editing) injSeg=editing.substance; else injEdit=null;
      }
    }
    var color=SUBSTANCE_COLORS[injSeg];

    var html='<h1 class="page">'+esc(I18N.t("inj.title"))+'</h1>';
    html+='<div class="seg" data-seg>'
      +['mounjaro','trt','peptide'].map(function(k){
          return '<button type="button" data-k="'+k+'" class="'+(injSeg===k?"on":"")+'">'+esc(I18N.t("inj.seg."+k))+'</button>';
        }).join("")
      +'</div>';

    html+='<div class="card">';

    // ---- rhythm widget per substance ----
    if(injSeg==="mounjaro"){
      var hist=(st.jab.history||[]).slice().sort(), last=hist.length?hist[hist.length-1]:null;
      var every=Math.max(1, st.calc.intervalDays||7);
      if(last){
        var elapsed=daysBetweenISO(last,today), remaining=every-elapsed, frac=Math.max(0,Math.min(1,elapsed/every));
        var big, sub;
        if(remaining>0){ big=String(remaining); sub=I18N.t("jab.daysLeft"); }
        else if(remaining===0){ big="0"; sub=I18N.t("jab.dueToday"); frac=1; }
        else { big=String(remaining); sub=Math.abs(remaining)+" "+I18N.t("inj.daysShort")+" "+I18N.t("inj.overdue"); frac=1; }
        html+=ringSVG(frac, big, sub);
      } else {
        html+='<div class="empty">'+esc(I18N.t("jab.firstHint"))+'</div>';
      }
      html+='<div class="field" style="max-width:220px;margin:8px auto 0"><label>'+esc(I18N.t("inj.intervalSet"))+'</label><input type="number" inputmode="numeric" id="mjEvery" min="1" value="'+every+'"></div>';
    } else if(injSeg==="trt"){
      var iv=Math.max(1, st.inj.trt.intervalDays||3), lt=lastInjDate(st,"trt");
      var ip=DOMAIN.intervalProgress(lt, iv, today);
      if(ip){
        var rl=ip.remaining>0?(I18N.t("inj.nextIn")+" "+ip.remaining+" "+I18N.t("inj.daysShort")):(ip.remaining===0?I18N.t("inj.due"):Math.abs(ip.remaining)+" "+I18N.t("inj.daysShort")+" "+I18N.t("inj.overdue"));
        html+=progressBar(ip.frac, color, lt, rl);
      } else { html+='<div class="empty">'+esc(I18N.t("inj.empty"))+'</div>'; }
      html+='<div class="field" style="max-width:220px"><label>'+esc(I18N.t("inj.intervalSet"))+'</label><input type="number" inputmode="numeric" id="trtEvery" min="1" value="'+iv+'"></div>';
    } else {
      var cfg=st.inj.peptide, cp=DOMAIN.cycleProgress(cfg, today);
      if(cp){
        html+=progressBar(cp.frac, color, I18N.t("inj.cycleDay")+" "+cp.dayN+"/"+cp.total, (cp.total-cp.dayN)+" "+I18N.t("inj.daysShort"));
      } else { html+='<div class="note">'+esc(I18N.t("inj.cycleNone"))+'</div>'; }
      html+='<div class="grid g2">'
        +'<div class="field"><label>'+esc(I18N.t("inj.cycleLen"))+'</label><input type="number" inputmode="numeric" id="pepLen" min="1" value="'+(cfg.cycleDays||56)+'"></div>'
        +'<div class="field"><label>'+esc(I18N.t("inj.cycleStart"))+'</label><input type="date" id="pepStart" value="'+(cfg.cycleStart||"")+'"></div>'
        +'</div>';
    }

    // ---- dose (+ peptide blend) + body map + log/update ----
    if(editing) html+='<div class="note" style="margin-bottom:10px">'+esc(I18N.t("inj.editing"))+'</div>';
    if(injSeg==="peptide"){
      var pepName=editing?(editing.name||""):(injDraft.name||st.inj.peptide.name||"");
      html+='<div class="field"><label>'+esc(I18N.t("inj.pepName"))+'</label>'
        +'<input type="text" id="injName" maxlength="60" value="'+esc(pepName)+'" placeholder="'+esc(I18N.t("inj.pepNamePh"))+'"></div>';
    }
    var unit=(injSeg==="peptide")?I18N.t("inj.unitsUnit"):I18N.t("inj.mgUnit");
    var dosePh=(injSeg==="mounjaro"&&st.calc.strengthMg!=null)?st.calc.strengthMg:(injSeg==="peptide"?"10":"");
    // default the dose to the previous shot of this substance for one-tap logging
    var lastD=DOMAIN.lastDoseAsOf(st, injSeg);
    var doseVal=editing?(editing.dose!=null?editing.dose:""):(injDraft.dose||(lastD?lastD.dose:""));
    html+='<div class="field"><label>'+esc(I18N.t("inj.dose"))+' ('+esc(unit)+') <span class="muted tiny">('+esc(I18N.t("common.optional"))+')</span></label>'
      +'<input type="number" inputmode="decimal" step="0.1" id="injDose" value="'+esc(String(doseVal))+'" placeholder="'+esc(String(dosePh))+'"></div>';
    // when given: captured as "now" by default, editable to backfill (parity with BP)
    function tsToLocal(ts){ var d=new Date(ts); d.setMinutes(d.getMinutes()-d.getTimezoneOffset()); return d.toISOString().slice(0,16); }
    var whenVal = injDraft.when || (editing ? (editing.ts ? tsToLocal(editing.ts) : (editing.date?editing.date+"T12:00":nowLocalDT())) : nowLocalDT());
    html+='<div class="grid g2"><div class="field"><label>'+esc(I18N.t("inj.when"))+' <span class="muted tiny">('+esc(I18N.t("inj.whenHint"))+')</span></label>'
      +'<input type="date" id="injDate" value="'+esc(whenVal.slice(0,10))+'"></div>'
      +'<div class="field"><label>'+esc(I18N.t("common.time"))+'</label><input type="time" id="injTime" value="'+esc(whenVal.slice(11,16))+'"></div></div>';
    var selForMap = injSel || (editing ? (editing.pos || (editing.site&&LEGACY_SITE_CM[editing.site]) || null) : null);
    html+='<p class="sub" style="margin-bottom:0">'+esc(I18N.t("inj.pickSite"))+'</p>';
    html+=bellyMapSVG(st, selForMap, true);
    var shownPos = selForMap || DOMAIN.suggestSpot(recentSpots(st));
    if(shownPos){
      html+='<div class="center small muted">'+esc(I18N.t("inj.selected"))+': <b style="color:var(--ink)">'+esc(posLabel(shownPos))+'</b>'
        +(!selForMap?' <span class="muted tiny">('+esc(I18N.t("inj.suggested"))+')</span>':'')+'</div>';
    }
    html+='<div class="center tiny muted" style="margin-top:4px">'+esc(I18N.t("inj.mapHint"))+'</div>';
    html+='<div class="row" style="margin-top:10px"><button class="btn" id="injLog">'+esc(editing?I18N.t("inj.update"):I18N.t("inj.logBtn"))+'</button>';
    if(editing) html+='<button class="btn ghost" id="injCancel">'+esc(I18N.t("inj.cancel"))+'</button>';
    html+='</div>';
    // twin-tab link: from injections, jump to the daily symptom diary
    html+='<div class="rellinks" style="margin-top:12px"><a class="btn ghost" href="#diary">'+icon("diary")+esc(I18N.t("rel.toDiary"))+icon("arrow")+'</a></div>';
    html+='</div>';

    // ---- pen tracker: what to draw now (clicks / insulin syringe) ----
    if(injSeg==="mounjaro") html+=penTrackerHTML(st);

    // ---- history for this substance (editable) ----
    // Mounjaro: union of injLog entries and legacy jab.history dates (which predate injLog).
    var hlist=(st.injLog||[]).filter(function(e){return e.substance===injSeg;}).slice();
    if(injSeg==="mounjaro"){
      var haveDate={}; hlist.forEach(function(e){ haveDate[e.date]=true; });
      (st.jab.history||[]).forEach(function(d){
        if(!haveDate[d]) hlist.push({ id:"jab:"+d, date:d, substance:"mounjaro", dose:null, unit:"mg", site:null, jabOnly:true });
      });
    }
    hlist.sort(function(a,b){var ka=a.ts||a.date,kb=b.ts||b.date;return ka<kb?1:ka>kb?-1:0;});
    if(hlist.length){
      html+='<div class="card"><h2>'+esc(I18N.t("inj.history"))+'</h2><div class="scroll"><table><tbody>';
      injPage=pageClamp(injPage, hlist.length);
      pageSlice(hlist, injPage).forEach(function(e){
        var siteLbl=e.site?I18N.t("site."+e.site):"—"; if(siteLbl==="site."+e.site) siteLbl=e.site;
        var whenLbl=e.ts?fmtDateTime(e.ts):fmtDate(e.date);
        html+='<tr><td>'+esc(whenLbl)+(e.name?'<br><span class="muted tiny">'+esc(e.name)+'</span>':'')
          +(e.penDraw?'<br><span class="muted tiny">'+esc(penDrawLabel(e.penDraw))+'</span>':'')+'</td>'
          +'<td>'+esc(siteLbl)+(e.pos?'<br><span class="muted tiny">'+esc(posLabel(e.pos))+'</span>':'')+'</td>'
          +'<td class="num">'+(e.dose!=null
            ? dosePill("", e.dose+" "+(e.unit||""), SUBSTANCE_COLORS[e.substance]||"#94a3b8",
                DOMAIN.therapyWeek(DOMAIN.firstInjDateFor(st,e.substance), e.date), doseWeekAsOf(st,e.substance,e.date))
            : "—")+'</td>'
          +'<td class="num"><button class="btn ghost sm injEdit" title="'+esc(I18N.t("inj.edit"))+'" data-id="'+esc(e.id)+'">'+icon("edit")+'</button> '
          +'<button class="btn ghost sm injDel" title="'+esc(I18N.t("inj.confirmDel"))+'" data-id="'+esc(e.id)+'">'+icon("trash")+'</button></td></tr>';
      });
      html+='</tbody></table></div>'+pagerHTML("injPg", injPage, hlist.length)+'</div>';
    }

    app.innerHTML=html;

    function captureDraft(){
      if($("#injDose")) injDraft.dose=$("#injDose").value;
      if($("#injName")) injDraft.name=$("#injName").value;
      if($("#injDate")) injDraft.when=$("#injDate").value ? $("#injDate").value+"T"+($("#injTime").value||"12:00") : "";
    }
    // segment switch
    $all('[data-seg] button').forEach(function(b){ b.addEventListener("click",function(){
      injSeg=b.getAttribute("data-k"); injSel=null; injEdit=null; injPage=0; injDraft={dose:"",name:"",when:""}; viewInject();
    });});
    bindPager("injPg", function(){return injPage;}, function(v){injPage=v;}, viewInject);
    // free-point spot pick: any tap on the abdomen map (preserves typed inputs)
    var bm=$("#bellyMap");
    if(bm) bm.addEventListener("click",function(ev){
      var pt=bm.createSVGPoint(); pt.x=ev.clientX; pt.y=ev.clientY;
      var ctm=bm.getScreenCTM(); if(!ctm) return;
      var loc=pt.matrixTransform(ctm.inverse());
      var pos=svgToCm(loc.x, loc.y);
      // clamp to the mapped skin area and keep 0.1 cm precision
      pos.x=Math.round(Math.max(-16.5,Math.min(16.5,pos.x))*10)/10;
      pos.y=Math.round(Math.max(-11.5,Math.min(11.5,pos.y))*10)/10;
      captureDraft();
      injSel=pos;
      var chk=DOMAIN.spotCheck(pos, recentSpots(st));
      if(chk.nearNavel) toast(I18N.t("inj.tooCloseNavel"));
      else if(chk.nearShot) toast(I18N.t("inj.tooClose"));
      viewInject();
    });
    // pen tracker bindings (Mounjaro only)
    if(injSeg==="mounjaro"){
      var pt=st.penTracker;
      if(!pt.strengthChanges) pt.strengthChanges=[];
      if(!pt.doseChanges) pt.doseChanges=[];
      var ptRerender=function(){ captureDraft(); viewInject(); };
      // current shot (for pen numbering when recording mid-plan changes)
      var ptCur=null;
      (function(){
        var ps=trkSchedule(pt, pt.shotsDone+8);
        if(!ps.error){ var c=trkShotAt(ps, pt.shotsDone); if(c.sh) ptCur=c; }
      })();
      if($("#ptOn")) $("#ptOn").addEventListener("change",function(){
        pt.enabled=this.checked;
        if(pt.enabled){   // seed from the calculator on first enable
          if(pt.strengthMg==null) pt.strengthMg=st.calc.strengthMg||5;
          if(pt.dose==null) pt.dose=(st.calc.baseDose!=null?st.calc.baseDose:pt.strengthMg);
        }
        STORE.save(); ptRerender();
      });
      bindChips("ptStr",function(v){
        if(pt.shotsDone===0 && !trkHasChanges(pt)){
          pt.strengthMg=v;                    // plan untouched — move the anchor
        } else if(ptCur){
          // mid-plan: record "the NEXT pen has strength v" without rewriting
          // history; picking the current strength back cancels a pending change
          var curPen=ptCur.sh.penNo+ptCur.off;
          pt.strengthChanges=pt.strengthChanges.filter(function(e){ return e.afterPen<curPen; });
          if(v!==trkStrengthOf(pt, curPen+1)) pt.strengthChanges.push({afterPen:curPen, s:v});
        } else {
          pt.strengthMg=v;                    // no valid schedule yet (dose empty)
        }
        STORE.save(); ptRerender();
      });
      if($("#ptDose")) $("#ptDose").addEventListener("change",function(){
        var v=this.value===""?null:parseFloat(this.value);
        if(pt.shotsDone===0 && !trkHasChanges(pt)){
          pt.dose=v;
        } else if(v>0){
          // mid-plan: the new dose applies from the upcoming shot onward
          pt.doseChanges=pt.doseChanges.filter(function(e){ return e.fromShot<pt.shotsDone; });
          if(v!==trkDoseAt(pt, pt.shotsDone)) pt.doseChanges.push({fromShot:pt.shotsDone, dose:v});
        }
        STORE.save(); ptRerender();
      });
      if($("#ptMinus")) $("#ptMinus").addEventListener("click",function(){ pt.shotsDone=Math.max(0,pt.shotsDone-1); STORE.save(); ptRerender(); });
      if($("#ptPlus")) $("#ptPlus").addEventListener("click",function(){ pt.shotsDone++; STORE.save(); ptRerender(); });
      if($("#ptReset")) $("#ptReset").addEventListener("click",function(){
        if(!confirm(I18N.t("trk.resetConfirm"))) return;
        // collapse recorded changes into the new anchor: a fresh full pen at
        // the latest strength and dose
        pt.strengthMg=trkStrengthOf(pt, Infinity);
        var dInf=trkDoseAt(pt, Infinity); if(dInf!=null) pt.dose=dInf;
        pt.strengthChanges=[]; pt.doseChanges=[]; pt.shotsDone=0;
        STORE.save(); ptRerender();
      });
    }
    // config inputs
    if($("#mjEvery")) $("#mjEvery").addEventListener("change",function(){ st.calc.intervalDays=Math.max(1,parseInt(this.value,10)||7); STORE.save(); viewInject(); });
    if($("#trtEvery")) $("#trtEvery").addEventListener("change",function(){ st.inj.trt.intervalDays=Math.max(1,parseInt(this.value,10)||3); STORE.save(); viewInject(); });
    if($("#pepLen")) $("#pepLen").addEventListener("change",function(){ st.inj.peptide.cycleDays=Math.max(1,parseInt(this.value,10)||56); STORE.save(); viewInject(); });
    if($("#pepStart")) $("#pepStart").addEventListener("change",function(){ st.inj.peptide.cycleStart=this.value||null; STORE.save(); viewInject(); });
    // log / update
    $("#injLog").addEventListener("click",function(){
      // spot: a user-picked point wins; otherwise an edited entry keeps its
      // stored spot untouched; a brand-new entry takes the suggested clear spot
      var pos=null, site=null;
      if(injSel){ pos=injSel; site=bellyQuadrant(injSel); }
      else if(editing){ pos=editing.pos||null; site=editing.site||null; }
      else { pos=DOMAIN.suggestSpot(recentSpots(st)); site=pos?bellyQuadrant(pos):null; }
      var dv=$("#injDose").value, dose=dv===""?null:parseFloat(dv);
      dose=(dose==null||isNaN(dose))?null:dose;
      var name=$("#injName")?($("#injName").value||"").trim():null;
      // when given: chosen datetime (defaults to now); ts is full datetime, date is the day part
      var wv=$("#injDate")&&$("#injDate").value ? $("#injDate").value+"T"+($("#injTime").value||"12:00") : "";
      var when=wv?new Date(wv):new Date(); if(isNaN(when.getTime())) when=new Date();
      var ts=when.toISOString(), dateStr=ts.slice(0,10);
      if(injSeg==="peptide") st.inj.peptide.name=name||"";   // remember last blend
      var mjDate;
      if(editing && editing.jabOnly){
        // materialise the legacy date into a real injLog entry (keep its original day)
        var mat={ id:uid(), ts:editing.date+"T"+ts.slice(11), date:editing.date, substance:"mounjaro", dose:dose, unit:"mg", site:site };
        if(pos) mat.pos=pos;
        st.injLog.push(mat);
        mjDate=editing.date;
      } else if(editing){
        editing.dose=dose; editing.ts=ts; editing.date=dateStr;
        if(injSel){ editing.site=site; editing.pos=pos; }  // spot only changes when re-picked
        if(injSeg==="peptide") editing.name=name||"";
        if(editing.substance==="mounjaro") mjDate=dateStr;
      } else {
        var unitCode=(injSeg==="peptide")?"j":"mg";
        var entry={ id:uid(), ts:ts, date:dateStr, substance:injSeg, dose:dose, unit:unitCode, site:site };
        if(pos) entry.pos=pos;
        if(injSeg==="peptide" && name) entry.name=name;
        // Only the FIRST Mounjaro entry of a day advances the pen tracker —
        // a second entry the same day is the extra needle of the same mixed
        // dose (insulin syringe + pen). The first entry is stamped with the
        // planned breakdown so history shows what came from where.
        if(injSeg==="mounjaro" && st.penTracker.enabled
           && st.jab.history.indexOf(dateStr)===-1
           && !st.injLog.some(function(e){return e.substance==="mounjaro"&&e.date===dateStr;})){
          var pd=trkCurrentDraw(st);
          if(pd) entry.penDraw=pd;
          st.penTracker.shotsDone++;
        }
        st.injLog.push(entry);
        if(injSeg==="mounjaro") mjDate=dateStr;
      }
      // Mounjaro: keep the weekly ring's source of truth (jab.history) in sync with the chosen day
      if(mjDate && st.jab.history.indexOf(mjDate)===-1){ st.jab.history.push(mjDate); st.jab.history.sort(); }
      st.injLog.sort(function(a,b){var ka=a.ts||a.date,kb=b.ts||b.date;return ka<kb?1:ka>kb?-1:0;});
      injSel=null; injEdit=null; injPage=0; injDraft={dose:"",name:"",when:""};
      STORE.save(); toast(I18N.t("common.saved")); viewInject();
    });
    if($("#injCancel")) $("#injCancel").addEventListener("click",function(){ injEdit=null; injSel=null; injDraft={dose:"",name:"",when:""}; viewInject(); });
    $all(".injEdit").forEach(function(b){ b.addEventListener("click",function(){
      injEdit=b.getAttribute("data-id"); injSel=null; viewInject(); window.scrollTo(0,0);
    });});
    $all(".injDel").forEach(function(b){ b.addEventListener("click",function(){
      if(!confirm(I18N.t("inj.confirmDel"))) return;
      var id=b.getAttribute("data-id"), lastMjOfDay=false;
      if(id.indexOf("jab:")===0){           // legacy Mounjaro date only
        var d=id.slice(4);
        st.jab.history=st.jab.history.filter(function(x){return x!==d;});
        lastMjOfDay=true;
      } else {
        var del=null;
        st.injLog=st.injLog.filter(function(e){ if(e.id===id){ del=e; return false; } return true; });
        // Mounjaro: also drop the date from jab.history if no other entry covers it
        if(del && del.substance==="mounjaro" && !st.injLog.some(function(e){return e.substance==="mounjaro"&&e.date===del.date;})){
          st.jab.history=st.jab.history.filter(function(x){return x!==del.date;});
          lastMjOfDay=true;
        }
      }
      // the pen tracker steps back only when a day loses its LAST Mounjaro
      // entry — mirrors the first-entry-of-the-day advance on logging
      if(lastMjOfDay && st.penTracker.enabled) st.penTracker.shotsDone=Math.max(0,st.penTracker.shotsDone-1);
      if(injEdit===id) injEdit=null;
      STORE.save(); viewInject();
    });});
  }

  /* ============ DASHBOARD (Pulpit) ============ */
  function rhythmRow(label, color, frac, right, pill){
    return '<div style="margin-bottom:10px"><div class="slhead" style="display:flex;justify-content:space-between;align-items:center;gap:8px;flex-wrap:wrap;font-size:14px;font-weight:700"><span>'+esc(label)+(pill?' '+pill:'')+'</span><span class="muted tiny">'+esc(right||"")+'</span></div>'
      + progressBar(frac, color, "", "") + '</div>';
  }
  function viewDash(){
    var st=s(), today=todayISO();
    var html='<h1 class="page">'+esc(I18N.t("pulpit.title"))+'</h1>';

    // --- rhythm widgets ---
    html+='<div class="card"><h2>'+esc(I18N.t("pulpit.rhythm"))+'</h2>';
    // Mounjaro
    var hist=(st.jab.history||[]).slice().sort(), last=hist.length?hist[hist.length-1]:null, every=Math.max(1,st.calc.intervalDays||7);
    if(last){
      var el=daysBetweenISO(last,today), rem=every-el, frac=Math.max(0,Math.min(1,el/every));
      var r=rem>0?(I18N.t("inj.nextIn")+" "+rem+" "+I18N.t("inj.daysShort")):(rem===0?I18N.t("inj.due"):Math.abs(rem)+" "+I18N.t("inj.daysShort")+" "+I18N.t("inj.overdue"));
      html+=rhythmRow("Mounjaro", SUBSTANCE_COLORS.mounjaro, rem<=0?1:frac, r, nowDosePill(st,"mounjaro",today));
    } else { html+=rhythmRow("Mounjaro", SUBSTANCE_COLORS.mounjaro, 0, I18N.t("pulpit.todo"), nowDosePill(st,"mounjaro",today)); }
    // TRT
    var ltrt=lastInjDate(st,"trt"), ip=DOMAIN.intervalProgress(ltrt, st.inj.trt.intervalDays, today);
    if(ip){ var rt=ip.remaining>0?(I18N.t("inj.nextIn")+" "+ip.remaining+" "+I18N.t("inj.daysShort")):(ip.remaining===0?I18N.t("inj.due"):Math.abs(ip.remaining)+" "+I18N.t("inj.daysShort")+" "+I18N.t("inj.overdue"));
      html+=rhythmRow("TRT", SUBSTANCE_COLORS.trt, ip.frac, rt, nowDosePill(st,"trt",today)); }
    else { html+=rhythmRow("TRT", SUBSTANCE_COLORS.trt, 0, I18N.t("pulpit.todo"), nowDosePill(st,"trt",today)); }
    // Peptide cycle
    var cp=DOMAIN.cycleProgress(st.inj.peptide, today);
    if(cp){ html+=rhythmRow(I18N.t("inj.seg.peptide"), SUBSTANCE_COLORS.peptide, cp.frac, I18N.t("inj.cycleDay")+" "+cp.dayN+"/"+cp.total, nowDosePill(st,"peptide",today)); }
    else { html+=rhythmRow(I18N.t("inj.seg.peptide"), SUBSTANCE_COLORS.peptide, 0, I18N.t("inj.cycleNone"), nowDosePill(st,"peptide",today)); }
    html+='</div>';

    // --- latest readings: BP, weight + delta, BMI --- (each dated: values come from different days)
    function statDate(iso){ return iso?'<span class="muted tiny" style="font-weight:600">'+esc(fmtDate(iso,true))+injDayMarkers(st,iso)+'</span>':''; }
    html+='<div class="card"><h2>'+esc(I18N.t("pulpit.latest"))+'</h2><div class="stats">';
    var bpL=(st.bp&&st.bp.log&&st.bp.log.length)?st.bp.log[0]:null;
    html+='<div class="stat"><span class="k">'+esc(I18N.t("pulpit.bp"))+'</span><span class="v">'+(bpL?esc(bpL.sys+"/"+bpL.dia+(bpL.pulse!=null?" · "+bpL.pulse:"")):I18N.t("pulpit.noData"))+'</span>'+(bpL?statDate(String(bpL.ts).slice(0,10)):'')+'</div>';
    var wl=st.weightLog||[], curW=wl.length?wl[0].weightKg:null;
    var wtxt=curW!=null?fmtNum(curW,1)+" kg":I18N.t("pulpit.noData"), wcol="var(--ink)";
    if(wl.length>1){ var first=wl[wl.length-1].weightKg, d=curW-first; wcol=d<=0?"var(--good)":"var(--bad)"; wtxt+=" ("+(d>0?"+":"")+fmtNum(d,1)+")"; }
    html+='<div class="stat"><span class="k">'+esc(I18N.t("pulpit.weight"))+'</span><span class="v" style="color:'+wcol+';font-size:18px">'+wtxt+'</span>'+(wl.length?statDate(wl[0].date):'')+'</div>';
    var waistL=wl.filter(function(e){return e.waistCm!=null;});
    if(waistL.length){
      var curWa=waistL[0].waistCm, watxt=fmtNum(curWa,1)+" cm", wacol="var(--ink)";
      if(waistL.length>1){ var dWa=curWa-waistL[waistL.length-1].waistCm; wacol=dWa<=0?"var(--good)":"var(--bad)"; watxt+=" ("+(dWa>0?"+":"")+fmtNum(dWa,1)+")"; }
      html+='<div class="stat"><span class="k">'+esc(I18N.t("weight.waist"))+'</span><span class="v" style="color:'+wacol+';font-size:18px">'+watxt+'</span>'+statDate(waistL[0].date)+'</div>';
    }
    // latest wellbeing values from today (notes with dots or legacy check-ins)
    var ckAll=(st.stateLog||[]).slice();

  /* ============ CORRELATIONS ============ */
  function seriesOptions(st){
    var opts=[];
    (st.metrics||[]).filter(function(m){return !m.archived;}).forEach(function(m){
      opts.push({ id:"metric:"+m.id, label:m.name });
    });
    ["mounjaro","trt","peptide"].forEach(function(k){
      if((st.injLog||[]).some(function(e){return e.substance===k && e.dose!=null;}))
        opts.push({ id:"inj:"+k, label:I18N.t("inj.seg."+k)+" "+I18N.t("corr.injDose") });
    });
    if((st.bp&&st.bp.log&&st.bp.log.length)){
      opts.push({ id:"vital:sys", label:I18N.t("corr.vital.sys") });
      opts.push({ id:"vital:dia", label:I18N.t("corr.vital.dia") });
      if(st.bp.log.some(function(e){return e.pulse!=null;})) opts.push({ id:"vital:pulse", label:I18N.t("corr.vital.pulse") });
    }
    if((st.weightLog||[]).length){
      opts.push({ id:"weight", label:I18N.t("corr.weight") });
      if(st.weightLog.some(function(e){return e.waistCm!=null;})) opts.push({ id:"waist", label:I18N.t("corr.waist") });
      if(st.weightLog.some(function(e){return e.doseMg!=null;})) opts.push({ id:"mounjaroDose", label:I18N.t("corr.mjDose") });
    }
    // wellbeing series hidden from correlations for now (user request);
    // DOMAIN.seriesFor still understands state:* when this comes back
    return opts;
  }
  var corrA=null, corrB=null;
  function viewCorrelate(){
    var st=s(), opts=seriesOptions(st);
    var html='<h1 class="page">'+esc(I18N.t("corr.title"))+'</h1><div class="card"><p class="sub">'+esc(I18N.t("corr.sub"))+'</p>';
    if(opts.length<1){ html+='<div class="empty">'+esc(I18N.t("corr.noSeries"))+'</div></div>'; app.innerHTML=html; return; }
    var ids=opts.map(function(o){return o.id;});
    if(ids.indexOf(corrA)<0) corrA=ids[0];
    if(ids.indexOf(corrB)<0) corrB=ids[Math.min(1,ids.length-1)];
    function sel(id, cur){
      return '<select id="'+id+'">'+opts.map(function(o){
        return '<option value="'+esc(o.id)+'"'+(o.id===cur?" selected":"")+'>'+esc(o.label)+'</option>';
      }).join("")+'</select>';
    }
    html+='<div class="grid g2">'
      +'<div class="field"><label>'+esc(I18N.t("corr.seriesA"))+'</label>'+sel("corrSelA",corrA)+'</div>'
      +'<div class="field"><label>'+esc(I18N.t("corr.seriesB"))+'</label>'+sel("corrSelB",corrB)+'</div>'
      +'</div>';
    var labA=(opts.filter(function(o){return o.id===corrA;})[0]||{}).label||"";
    var labB=(opts.filter(function(o){return o.id===corrB;})[0]||{}).label||"";
    html+='<div id="chartHolder">'+CHART.renderDual(DOMAIN.seriesFor(st,corrA), DOMAIN.seriesFor(st,corrB), labA, labB, "#0ea5a4", "#6366f1")+'</div>';
    html+='<div class="rellinks"><a class="btn ghost" href="#diary">'+icon("diary")+esc(I18N.t("rel.toDiary"))+icon("arrow")+'</a></div>';
    html+='</div>';
    app.innerHTML=html;
    $("#corrSelA").addEventListener("change",function(){ corrA=this.value; viewCorrelate(); });
    $("#corrSelB").addEventListener("change",function(){ corrB=this.value; viewCorrelate(); });
  }

          +'</div>'

        +'</div>';

    function renderProgMethod(){

          if(this.value!==""){ pg.step=parseFloat(this.value)||pg.step; $all('[data-chip="oProgStep"] .chip').forEach(function(x){x.classList.remove("on");}); STORE.save(); }

        $("#oProgWeeks").addEventListener("change",function(){ pg.weeks=Math.max(2,parseInt(this.value,10)||8); STORE.save(); });

      });});
      renderProgMethod();

    // ---- travel / import mode ----
    // Fields are built once and updated in place (no destructive re-render), so

    function fieldsTravel(){

        +'</div>';
    }
    function travelLabels(){
      var tv=st.settings.travel, destCur=tv.currency||"", homeCur=st.settings.currency;
      var hint=I18N.t("trv.rateHint").replace("{home}",homeCur).replace("{dest}",destCur||"?");
      if($("#oRateHint")) $("#oRateHint").textContent="("+hint+")";
      // prices come from Settings; prompt if the ones we need are missing
      var rxStr=rxStrength();
      var homeP=st.settings.penCosts?st.settings.penCosts[String(strength)]:null;
      var sameP=tv.penCosts?tv.penCosts[String(strength)]:null;
      var rxP=(rxStr!=null&&tv.penCosts)?tv.penCosts[String(rxStr)]:null;
      var missing=(homeP==null||sameP==null||(rxStr!=null&&rxStr!==strength&&rxP==null));
      var note=$("#oPricesNote"); if(note) note.textContent=I18N.t(missing?"trv.setPricesNote":"trv.pricesNote");
      // override editors (revealed by the toggle)
      if($("#oSameLbl")) $("#oSameLbl").textContent=I18N.t("trv.destPriceSame").replace("{s}",strength);
      if($("#oHomePrice")) $("#oHomePrice").value=(homeP!=null?homeP:"");

      ["oDestSame","oDestRx"].forEach(function(id){ if($("#"+id)) $("#"+id).placeholder=destCur||""; });

        if(wrap) wrap.style.display="";

    function bindRateInput(){
      var el=$("#oRate"); if(el) el.addEventListener("change",function(){ st.settings.travel.rate=this.value===""?null:parseFloat(this.value); STORE.save(); });

    function doFetchForTravel(){
      var note=$("#oFxNote"); if(note) note.textContent=I18N.t("fx.fetching");

        if(err){ var n=$("#oFxNote"); if(n) n.textContent=I18N.t("fx.error"); return; }
        updateRateField();
      });
    }
    // The exchange-rate control: read-only auto value when online FX is on and a
    // rate is cached, otherwise a manual input (with a fetch when the cache misses).
    function updateRateField(){
      var wrap=$("#oRateWrap"); if(!wrap) return;
      var tv=st.settings.travel, homeCur=st.settings.currency, destCur=tv.currency||"";
      if(!st.settings.fxAuto){
        wrap.innerHTML='<input type="number" inputmode="decimal" id="oRate" value="'+(tv.rate!=null?tv.rate:"")+'" placeholder="1.0">';
        bindRateInput(); return;
      }
      var rate=fxRate(homeCur,destCur);
      if(rate!=null){
        tv.rate=rate; STORE.save();
        var fx=st.settings.fx;
        wrap.innerHTML='<div class="row" style="gap:8px;align-items:center"><input type="text" value="'+rate+'" readonly style="max-width:140px;background:var(--soft)">'
          +'<span class="pill" style="background:rgba(14,165,164,.14);color:var(--brand)">'+esc(I18N.t("fx.badge"))+'</span>'
          +'<button type="button" class="btn ghost sm" id="oFxRefresh">'+esc(I18N.t("fx.refresh"))+'</button></div>'
          +'<div class="tiny muted" style="margin-top:5px">🌐 '+esc(I18N.t("fx.online"))+(fx&&fx.updated?' · '+esc(fx.updated):'')+'</div>';
      } else {
        wrap.innerHTML='<input type="number" inputmode="decimal" id="oRate" value="'+(tv.rate!=null?tv.rate:"")+'" placeholder="1.0">'

    // Picking a strength chip pre-fills the pen price from the per-pen cost saved
    // in Settings (when present); the inline value stays an editable per-calc override.
    function autofillPrice(v){
      var pc = st.settings.penCosts ? st.settings.penCosts[String(v)] : null;
      if(pc!=null){ var inp=$("#oPrice"); if(inp){ inp.value=pc; st.calc.costPerPen=pc; } }

    function bindStrengthChips(){
      bindChips("oStr",function(v){ strength=v; st.calc.strengthMg=v; autofillPrice(v); STORE.save(); });

    function renderTravelFields(){
      $("#oFields").innerHTML = fieldsTravel();

      $("#oTripUnit").addEventListener("change",function(){ st.settings.travel.tripUnit=this.value; STORE.save(); });
      $("#oOverride").addEventListener("change",function(){ $("#oOverrideWrap").className=this.checked?"":"hidden"; });
      $("#oHomePrice").addEventListener("input",function(){ st.settings.penCosts[String(strength)]=this.value===""?null:parseFloat(this.value); STORE.save(); });
      $("#oDestSame").addEventListener("input",function(){ st.settings.travel.penCosts[String(strength)]=this.value===""?null:parseFloat(this.value); STORE.save(); });
      $("#oDestRx").addEventListener("input",function(){
        var rxStr=rxStrength(); if(rxStr!=null) st.settings.travel.penCosts[String(rxStr)]=this.value===""?null:parseFloat(this.value); STORE.save();
      });
    }
    function renderFields(){
      var mode=$("#oMode").value, travel=(mode==="travel");
      // In travel mode the home price comes from Settings (or the inline override),
      // Pen price always comes from Settings (per-pen costs for the chosen

      if($("#oPriceField")) $("#oPriceField").style.display = "none";

      if($("#oCostShared")) $("#oCostShared").style.display = travel?"none":"";
      if(travel){ renderTravelFields(); return; }
      $("#oFields").innerHTML = fieldsStretch();
      bindStrengthChips();
      renderPattern();
      $("#oCycle").addEventListener("change",renderPattern);
      $("#oBase").addEventListener("change",function(){ st.calc.baseDose = this.value===""?null:parseFloat(this.value); STORE.save(); });
    }
    renderFields();
    autofillPrice(strength);
    $("#oMode").addEventListener("change",function(){ renderFields(); $("#optResult").innerHTML=""; });

    $("#oPrice").addEventListener("input",function(){ st.calc.costPerPen = this.value===""?null:parseFloat(this.value); STORE.save(); });
    $("#oCur").addEventListener("change",function(){ st.settings.currency=(this.value||"PLN").toUpperCase(); STORE.save(); });
    $("#oInterval").addEventListener("change",function(){ st.calc.intervalDays = Math.max(1, parseInt(this.value,10)||7); STORE.save(); });
    $("#oGold").addEventListener("change",function(){

  function runTravel(){
    var st=s(), tv=st.settings.travel;
    var S=st.calc.strengthMg||5, D=(tv.dose!=null?tv.dose:S);
    var homeCur=st.settings.currency;
    var rxStr=rxPenFor(D);
    var destSame=(tv.penCosts?tv.penCosts[String(S)]:null);
    var destRx = rxStr==null ? null : (rxStr===S ? destSame : (tv.penCosts?tv.penCosts[String(rxStr)]:null));
    var homePrice = st.settings.penCosts ? st.settings.penCosts[String(S)] : null;
    // A "month" here means 4 weeks (28 days) — the natural unit for a weekly pen,
    // where one standard pen = 4 doses = 4 weeks ≈ one monthly supply.
    var tripDays = (tv.tripValue>0) ? (tv.tripUnit==="months" ? tv.tripValue*28 : tv.tripValue*7) : 0;
    var r=DOMAIN.travelCompare({ homeStrength:S, dose:D, intervalDays:st.calc.intervalDays||7,
      golden:st.settings.goldenDose, rate:tv.rate, homePrice:homePrice, monthDays:28,
      destPriceSame:destSame, destPriceRx:destRx, rxStrength:rxStr, tripDays:tripDays });
    if(!r.home || (!r.same && !r.rx)){
      $("#optResult").innerHTML='<div class="card"><div class="empty">'+esc(I18N.t("trv.needInputs"))+'</div></div>'; return;
    }
    var destCur=tv.currency||"";
    function money(n){ return fmtMoney(n,homeCur); }
    function moneyTxt(n){ return fmtMoneyTxt(n,homeCur); }
    function destOrig(n){ return fmtNum(n,0); }
    function tx(key,map){ var t=I18N.t(key); for(var k in map){ t=t.split("{"+k+"}").join(map[k]); } return t; }
    // a row of period figures. When dosing is weekly, one shot == one week, so we
    // show just per week + per month (no redundant per-shot). Otherwise all three.
    var weekly=((st.calc.intervalDays||7)===7);
    function periods(perShot, perWeek, perMonth, col){
      var c=col?' style="color:'+col+'"':'';
      function cell(amt, unitKey){ return '<div class="per"><b'+c+'>'+money(amt)+'</b><span>'+esc(I18N.t(unitKey))+'</span></div>'; }
      if(weekly) return '<div class="pers two">'+cell(perWeek,"trv.perWeek")+cell(perMonth,"trv.perMonth2")+'</div>';
      return '<div class="pers">'+cell(perShot,"trv.perShot2")+cell(perWeek,"trv.perWeek")+cell(perMonth,"trv.perMonth2")+'</div>';
    }
    // one full-width breakdown card: title, plain explanation, big pen price,
    // the three period costs and how long one pen lasts.
    function scCard(title, ex, sc){
      if(!sc) return "";
      return '<div class="tcard"><h3>'+esc(title)+'</h3><p class="ex">'+esc(ex)+'</p>'
        +'<div class="big">'+money(sc.priceHome)+' <small>'+esc(I18N.t("trv.perPen"))+'</small></div>'
        + periods(sc.perShot, sc.perWeek, sc.perMonth)
        +'<div class="meta">'+esc(tx("trv.lasts",{w:fmtNum(sc.coverWeeks,1),m:fmtNum(sc.coverMonths,1)}))+'</div></div>';
    }
    // trip planner card (only when a trip length is given)
    function tripCard(){
      var t=r.trip; if(!t || !t.home) return "";
      var tripTxt=(tv.tripUnit==="months"?tv.tripValue+" "+I18N.t("trv.months"):tv.tripValue+" "+I18N.t("trv.weeks"));
      var h='<div class="tcard" style="border-color:var(--brand)"><h3>'+esc(I18N.t("trv.tripTitle"))+'</h3>'
        +'<div class="big">'+esc(tx("trv.tripBring",{k:t.home.pens}))+'</div>'
        +'<div class="meta">'+esc(tx("trv.tripShotsOver",{n:t.shots,t:tripTxt}))+' · '+esc(tx("trv.tripHomeCost",{c:moneyTxt(t.home.cost)}))+'</div>';
      function leg(label, lg, save){
        if(!lg) return "";
        var verdict = save==null?"" : (save>0?tx("trv.tripSave",{c:moneyTxt(Math.abs(save))}):tx("trv.tripMore",{c:moneyTxt(Math.abs(save))}));
        var col=save==null?"var(--muted)":(save>0?"var(--good)":"var(--bad)");
        return '<div class="meta" style="margin-top:8px">'+esc(label)+(verdict?' — <b style="color:'+col+'">'+esc(verdict)+'</b>':'')+'</div>';
      }
      h+=leg(tx("trv.tripSame",{k:t.same?t.same.pens:0,c:t.same?moneyTxt(t.same.cost):"—"}), t.same, t.saveSame);
      if(rxStr!==S) h+=leg(tx("trv.tripRx",{k:t.rx?t.rx.pens:0,c:t.rx?moneyTxt(t.rx.cost):"—"}), t.rx, t.saveRx);
      return h+'</div>';
    }
    var rateNote="";
    if(tv.rate!=null && tv.rate>0 && destCur){
      rateNote='<p class="tiny muted" style="margin:-4px 0 12px">'+esc(tx("trv.rateUsed",{home:homeCur,rate:fmtNum(tv.rate,4),dest:destCur}))+'</p>';
    }
    var pensNeeded = (r.rx&&r.home)?Math.max(1,Math.ceil(r.home.shotsPerPen/r.rx.shotsPerPen)):0;
    var exHome=tx("trv.exHome",{s:S,d:D,n:r.home.shotsPerPen,m:fmtNum(r.home.coverMonths,1)});
    var exSame=r.same?tx("trv.exSame",{s:S,orig:destOrig(destSame),cur:destCur,pln:moneyTxt(r.same.priceHome),n:r.same.shotsPerPen}):"";
    var exRx=r.rx?tx("trv.exRx",{s:rxStr,orig:destOrig(destRx),cur:destCur,pln:moneyTxt(r.rx.priceHome),n:r.rx.shotsPerPen,k:pensNeeded}):"";
    var trip=tripCard();
    var html='<div class="card"><h2>'+esc(I18N.t("opt.modeTravel"))+'</h2>'+rateNote
      + (trip?'<div class="tgrid" style="margin-bottom:14px">'+trip+'</div>':'')
      +'<div class="tsub">'+esc(tx("trv.whatPay",{home:homeCur}))+'</div>'
      +'<div class="tgrid">'
      + scCard(tx("trv.rowHome",{s:S}), exHome, r.home)
      + scCard(tx("trv.rowSame",{s:S}), exSame, r.same)
      + (r.rx && rxStr!==S ? scCard(tx("trv.rowRx",{s:rxStr}), exRx, r.rx) : "")
      +'</div>';
    if(rxStr==null) html+='<div class="warnbox" style="margin-top:8px">'+esc(I18N.t("trv.rxNA"))+'</div>';
    html+='</div>';
    $("#optResult").innerHTML=html;
  }
  function runPlan(){

      html+='<tr><td>#'+(i+1)+' <span class="muted tiny">'+esc(sh.fraction===0.5?I18N.t("opt.half"):I18N.t("opt.full"))+'</span></td>'
